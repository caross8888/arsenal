name: Test Football APIs

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test APIs
        run: |
          python3 << 'EOF'
          import urllib.request, json

          tests = [
            ('Fotmob squad', 'https://www.fotmob.com/api/teams?id=9825&tab=squad&type=player&season=2024%2F2025'),
            ('Sofascore seasons', 'https://api.sofascore.com/api/v1/team/42/seasons'),
            ('ESPN roster', 'https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/teams/359/roster'),
          ]

          for name, url in tests:
            try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=10) as r:
                j = json.loads(r.read())
                print(f"✅ {name}: 200 - {list(j.keys())[:3]}")
            except Exception as e:
              print(f"❌ {name}: {e}")
          EOF
