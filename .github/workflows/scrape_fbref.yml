name: Scrape FBref Stats

on:
  schedule:
    - cron: '0 23 * * *'  # UTC 23:00 = 영국 BST 자정
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install soccerdata pandas requests

      - name: Pre-warm soccerdata (TLS library download)
        run: |
          python3 -c "
          import soccerdata as sd
          import os
          # FBref 인스턴스 생성하면서 TLS 라이브러리 자동 다운로드 트리거
          try:
              fbref = sd.FBref(leagues='ENG-Premier League', seasons='2526')
              print('soccerdata ready')
          except Exception as e:
              print(f'init error (expected): {e}')
          "
        timeout-minutes: 5
        continue-on-error: true

      - name: Run scraper
        run: python scripts/scrape_fbref.py
        timeout-minutes: 12

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add arsenal-dashboard/public/data/players.json
          git diff --staged --quiet || git commit -m "📊 FBref stats update $(date +'%Y-%m-%d %H:%M UTC')"
          git push
