<!DOCTYPE html>
<html lang="ko">
<head><!-- Arsenal FC Dashboard v2 -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#EF0107">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arsenal">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="https://a.espncdn.com/i/teamlogos/soccer/500/359.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Arsenal FC · The Gunners Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{color-scheme:dark;--red:#EF0107;--red-dark:#b50004;--gold:#C8A84B;--navy:#0B0D12;--surface:#111318;--surface2:#181B22;--surface3:#1F2330;--border:rgba(255,255,255,0.07);--border-accent:rgba(200,168,75,0.3);--text:#F0F2F7;--text-muted:#7A8099;--text-dim:#4A5070;--green:#22C55E;--amber:#F59E0B;--fd:'Bebas Neue',sans-serif;--fb:'Noto Sans KR',sans-serif;--fm:'Fira Mono',monospace;--safe-bottom:env(safe-area-inset-bottom,0px);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--navy);color:var(--text);font-family:var(--fb);font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden;padding-bottom:calc(64px + var(--safe-bottom));}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(239,1,7,.1) 0%,transparent 60%);pointer-events:none;z-index:0}
.top-header{background:rgba(11,13,18,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:10px}
.logo-svg{width:34px;height:34px;flex-shrink:0}
.brand-text .name{font-family:var(--fd);font-size:20px;letter-spacing:3px;color:var(--red);line-height:1}
.brand-text .sub{font-size:8px;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(11,13,18,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;gap:4px;background:none;border:none;color:var(--text-dim);font-family:var(--fb);font-size:9px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:color .2s;position:relative;-webkit-tap-highlight-color:transparent;}
.nav-btn.active{color:var(--gold)}.nav-btn.active .nav-icon{color:var(--red)}
.nav-icon{font-size:18px;line-height:1}
.nav-live-dot{position:absolute;top:8px;right:calc(50% - 16px);width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s infinite}
.page{position:relative;z-index:1}
.section{display:none;padding:16px;max-width:600px;margin:0 auto}
.section.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.sec-title{font-family:var(--fd);font-size:30px;letter-spacing:3px}
.sec-badge{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);background:rgba(200,168,75,.12);border:1px solid var(--border-accent);padding:3px 9px;border-radius:20px}
.sec-badge.live{color:var(--green);background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);animation:pulse 2s infinite}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);font-weight:700}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:10px;color:var(--text-muted);font-size:12px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:14px 16px;font-size:12px;color:#F87171;display:flex;align-items:center;gap:8px}
.fix-section-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;margin-top:6px;padding-left:2px}
.fix-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.fix-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;}
.fix-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.fix-card.upcoming::before{background:var(--gold)}
.fix-card.live-match::before{background:var(--green)}
.fix-card.finished::before{background:var(--surface3)}
.fix-grid{display:grid;grid-template-columns:1fr 68px 1fr;grid-template-rows:auto auto;gap:2px 4px;align-items:center;padding:2px 0}
.fix-z1{grid-column:1;grid-row:1;display:flex;align-items:center;}
.fix-z2{grid-column:1;grid-row:2;display:flex;align-items:center;}
.fix-z3top{grid-column:2;grid-row:1;display:flex;align-items:center;justify-content:center;}
.fix-z3bot{grid-column:2;grid-row:2;display:flex;align-items:stretch;justify-content:center;}
.fix-z4{grid-column:3;grid-row:1;display:flex;align-items:center;justify-content:flex-end;}
.fix-z5{grid-column:3;grid-row:2;display:flex;align-items:center;justify-content:flex-end;}
.fix-live-clock{text-align:center;font-size:10px;font-weight:700;letter-spacing:1px;padding-top:4px;}
.fix-live-expand{overflow:hidden;max-height:0;transition:max-height 0.35s ease;}
.fix-live-expand.open{max-height:2000px;}
.live-progress-wrap{padding:10px 14px 8px;display:flex;align-items:center;gap:8px;}
.live-progress-bar-bg{flex:1;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.live-progress-bar{height:100%;background:var(--green);border-radius:2px;transition:width 1s linear;}
.live-progress-label{font-size:9px;color:var(--green);font-weight:700;min-width:30px;text-align:right;}
.fix-expand-btn{width:100%;background:none;border:none;border-top:1px solid rgba(255,255,255,0.06);color:var(--text-dim);font-size:10px;padding:6px;cursor:pointer;letter-spacing:1px;margin-top:6px;}
.fix-expand-btn:hover{color:var(--text);}
.comp-tag{display:inline-block;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:4px;flex-shrink:0}
.tag-pl{background:rgba(55,0,255,.15);color:#A78BFA;border:1px solid rgba(167,139,250,.2)}
.tag-cl{background:rgba(0,80,200,.15);color:#60A5FA;border:1px solid rgba(96,165,250,.2)}
.tag-fa{background:rgba(200,168,75,.15);color:var(--gold);border:1px solid var(--border-accent)}
.tag-ec{background:rgba(239,100,7,.15);color:#FB923C;border:1px solid rgba(251,146,60,.2)}
.tag-oth{background:rgba(100,100,100,.15);color:var(--text-muted);border:1px solid var(--border)}
.fix-date{font-size:10px;color:var(--text-muted);font-family:var(--fm);flex-shrink:0}
.fix-date.live-tag{color:var(--green);font-weight:700}
.fix-team-home{display:flex;align-items:center;gap:8px}
.fix-team-away{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.t-crest{width:30px;height:30px;border-radius:50%;object-fit:contain;background:var(--surface3);border:1px solid var(--border);padding:3px;flex-shrink:0}
.t-crest-ph{width:30px;height:30px;border-radius:50%;background:var(--surface3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:9px;color:var(--text-muted);flex-shrink:0}
.t-crest-ph.afc{background:rgba(239,1,7,.15);border-color:rgba(239,1,7,.4);color:var(--red)}
.t-name-home{font-weight:700;font-size:12px;line-height:1.3;min-width:0;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word}
.t-name-away{font-weight:700;font-size:12px;line-height:1.3;min-width:0;overflow:hidden;text-align:right;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word}
.fix-score-box{text-align:center;flex-shrink:0;width:68px;display:flex;align-items:center;justify-content:center;}
.fix-score{font-family:var(--fd);font-size:24px;letter-spacing:3px;line-height:1;color:var(--text)}
.fix-vs{font-family:var(--fd);font-size:16px;letter-spacing:2px;color:var(--text-dim);line-height:1;display:block;}
.fix-round-text{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);}
.fix-round-final{color:#D4AF37;font-weight:700;}
.fix-venue{font-size:10px;color:var(--text-dim);text-align:center}
.std-hdr,.std-row{display:grid;grid-template-columns:22px 1fr 24px 24px 24px 24px 36px;gap:4px;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px}
.std-row:last-child{border-bottom:none}
.std-row.afc-row{background:rgba(239,1,7,.05)}
.std-row.afc-row .std-pos{color:var(--red);font-weight:700}
.std-hdr{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim)}
.std-pos{font-family:var(--fm);font-size:11px;color:var(--text-muted)}
.std-team{font-weight:500;display:flex;align-items:center;gap:6px;font-size:12px;min-width:0}
.std-team span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.std-crest{width:16px;height:16px;border-radius:50%;object-fit:contain;border:1px solid var(--border);flex-shrink:0}
.std-s{font-family:var(--fm);color:var(--text-muted);text-align:center;font-size:11px}
.std-pts{font-family:var(--fm);font-weight:700;color:var(--text);text-align:right;font-size:12px}
.more-btn{width:100%;padding:12px;border:none;background:var(--surface2);color:var(--text-muted);font-family:var(--fb);font-size:11px;letter-spacing:1px;cursor:pointer;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px;transition:background .2s,color .2s;-webkit-tap-highlight-color:transparent;}
.more-btn:hover{background:var(--surface3);color:var(--text)}
.f-btns{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.f-btns
::-webkit-scrollbar{display:none}
.f-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font-family:var(--fb);font-size:11px;padding:6px 14px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.f-btn.active{background:var(--red);border-color:var(--red);color:#fff}
.sq-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.pl-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s}
.pl-card:active{transform:scale(.98)}
.pl-top{display:grid;grid-template-columns:70px 1fr;height:90px}
.pl-left{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.pl-left.fw{background:rgba(239,1,7,.75)}
.pl-left.mf{background:rgba(34,197,94,.60)}
.pl-left.df{background:rgba(59,130,246,.60)}
.pl-left.gk{background:rgba(234,179,8,.65)}
.pl-pos-txt{font-size:10px;font-weight:800;letter-spacing:1.5px;color:rgba(255,255,255,.95);text-transform:uppercase}
.pl-num-txt{font-family:var(--fd);font-size:32px;font-weight:900;line-height:1;color:#fff;opacity:.95}
.pl-photo-box{width:100%;height:90px;overflow:hidden;background:var(--surface3)}
.pl-photo-box img{width:100%;height:100%;object-fit:contain;object-position:top center;display:block}
.pl-photo-box.no-img{display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:18px}
.pl-card-divider{height:1px;background:var(--border)}
.pl-card-name{padding:7px 8px;font-size:11px;font-weight:700;letter-spacing:.5px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.inj-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border)}
.inj-row:last-child{border-bottom:none}
.inj-pos-badge{width:38px;height:38px;border-radius:50%;background:var(--surface3);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:11px;color:var(--text-muted)}
.inj-info{flex:1;min-width:0}
.inj-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inj-detail{font-size:11px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inj-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.inj-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap}
.inj-injury{background:rgba(239,68,68,.15);color:#F87171;border:1px solid rgba(239,68,68,.3)}
.inj-doubt{background:rgba(245,158,11,.15);color:#FCD34D;border:1px solid rgba(245,158,11,.3)}
.inj-miss{background:rgba(120,120,120,.15);color:var(--text-muted);border:1px solid var(--border)}
.inj-chance{font-size:10px;color:var(--text-dim)}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px}
.sum-stat{background:var(--surface2);border-radius:10px;padding:14px;text-align:center}
.sum-val{font-family:var(--fd);font-size:36px;line-height:1}
.sum-val.r{color:var(--red)}.sum-val.a{color:var(--amber)}.sum-val.g{color:var(--green)}
.sum-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-top:4px}
.news-list{display:flex;flex-direction:column;gap:10px}
.media-seg{display:flex;gap:0;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:14px;}
.media-seg-btn{flex:1;padding:7px 4px;border:none;background:none;border-radius:8px;font-size:11px;font-weight:700;color:var(--text-dim);cursor:pointer;transition:all .2s;letter-spacing:.3px;}
.media-seg-btn.active{background:var(--surface3);color:var(--gold);box-shadow:0 1px 4px rgba(0,0,0,.3);}
/* ── Timeline Section ───────────────────── */
.tl-wrap{position:relative;}
.tl-wrap::before{content:'';position:absolute;left:50%;transform:translateX(-50%);top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--red) 0%,#ff6b35 30%,var(--gold) 60%,#4CAF50 100%);opacity:.45;}
.tl-item{display:grid;grid-template-columns:1fr 18px 1fr;margin-bottom:28px;position:relative;align-items:start;}
.tl-left{padding-right:14px;display:flex;flex-direction:column;align-items:flex-end;gap:7px;}
.tl-year{font-size:18px;font-weight:900;line-height:1;font-family:var(--fd);letter-spacing:.5px;}
.tl-photo{width:85%;aspect-ratio:4/3;border-radius:8px;background:var(--surface2);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;color:rgba(255,255,255,.2);}
.tl-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.tl-dot-col{display:flex;justify-content:center;padding-top:4px;position:relative;z-index:2;}
.tl-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--navy);flex-shrink:0;}
.tl-right{padding-left:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.tl-right:active{opacity:.75;}
.tl-right-spacer{height:18px;margin-bottom:7px;}
.tl-title{font-size:13px;font-weight:800;color:var(--text);line-height:1.35;margin-bottom:6px;}
.tl-summary{font-size:11px;color:var(--text-muted);line-height:1.65;}
.tl-more{display:inline-block;margin-top:6px;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--red);}
/* ── History Tab ─────────────────────────── */
.hist-otd-wrap{margin-bottom:16px;}
.hist-otd-card{border-radius:14px;background:linear-gradient(135deg,#1a0a0a 0%,#0d0d18 100%);cursor:pointer;-webkit-tap-highlight-color:transparent;padding:14px 16px 16px;border:1px solid rgba(212,175,55,.18);}
.hist-otd-card:active{opacity:.88;}
.hist-otd-tag{font-size:9px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.hist-otd-date-row{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
.hist-otd-date{font-size:20px;font-weight:900;color:#fff;font-family:var(--fd);line-height:1;}
.hist-otd-years-ago{font-size:11px;color:rgba(255,255,255,.45);font-weight:600;}
.hist-otd-title{font-size:13px;font-weight:700;color:#fff;line-height:1.35;margin-bottom:4px;}
.hist-otd-summary{font-size:12px;color:var(--text-muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}

.hist-filter{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;}
.hist-filter::-webkit-scrollbar{display:none;}
.hist-filter-btn{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:6px 13px;border:1px solid var(--border);border-radius:20px;background:none;font-size:11px;font-weight:600;color:var(--text-dim);cursor:pointer;transition:all .18s;white-space:nowrap;}
.hist-filter-btn.active{background:var(--red);color:#fff;border-color:var(--red);}
.hist-filter-btn .hf-icon{font-size:13px;}
.hist-nav{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);margin-bottom:16px;}
.hist-nav::-webkit-scrollbar{display:none;}
.hist-nav-btn{flex-shrink:0;padding:10px 14px;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--text-dim);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .18s;}
.hist-nav-btn.active{color:var(--red);border-bottom-color:var(--red);}
.hist-section{animation:fadeIn .2s ease;}
/* Legends */
.lgd-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding-bottom:24px;}
.lgd-card{background:var(--card);border-radius:12px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform .15s,box-shadow .15s;position:relative;}
.lgd-card:active{transform:scale(.97);}
.lgd-card-img-wrap{position:relative;width:100%;aspect-ratio:2/3;overflow:hidden;}
.lgd-card-gradient{position:absolute;bottom:0;left:0;right:0;height:65%;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 100%);}
.lgd-card-rank{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.65);color:var(--gold);font-size:9px;font-weight:800;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid rgba(212,175,55,.4);}
.lgd-card-overlay{position:absolute;bottom:0;left:0;right:0;padding:8px 8px 9px;}
.lgd-card-name{font-size:11px;font-weight:800;color:#fff;line-height:1.2;}
.lgd-card-sub{font-size:9px;color:rgba(255,255,255,.5);margin-top:2px;letter-spacing:.2px;}
.lgd-section{margin-top:22px;}
.lgd-section-title{font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--red);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(239,1,7,.2);}
.lgd-section-body{font-size:13px;color:var(--text-muted);line-height:1.8;margin:0;}
.lgd-section-body strong{color:var(--gold);font-weight:800;}
/* Managers */
.mgr-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding-bottom:24px;}
.mgr-card{background:var(--card);border-radius:14px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform .15s,box-shadow .15s;position:relative;}
.mgr-card:active{transform:scale(.97);}

.mgr-card-img{width:100%;height:100%;object-fit:cover;object-position:top;}

.mgr-card-overlay{position:absolute;bottom:0;left:0;right:0;padding:10px 10px 10px;}
.mgr-card-period-badge{display:inline-block;font-size:9px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.3px;margin-bottom:4px;}

/* Trophy Cabinet */
.trophy-cab-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding-bottom:24px;}
.trophy-cab-card{background:var(--card);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;border:1px solid var(--border);transition:transform .15s;}
.trophy-cab-card:active{transform:scale(.97);}
.trophy-cab-icon{font-size:30px;margin-bottom:6px;}
.trophy-cab-name{font-size:11px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:4px;}
.trophy-cab-count{font-size:22px;font-weight:900;color:var(--red);font-family:var(--fd);}
/* Mgr Modal */
.mgr-modal-photo{width:100%;aspect-ratio:16/9;background:linear-gradient(160deg,#1a0a0a 0%,#0d0d18 100%);display:flex;align-items:center;justify-content:center;font-size:72px;position:relative;flex-shrink:0;}
.mgr-modal-photo img{width:100%;height:100%;object-fit:cover;object-position:top;}
.mgr-modal-photo-overlay{position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(to top,rgba(10,10,16,.95),transparent);}
.mgr-modal-name{font-size:20px;font-weight:900;color:var(--text);}

.mgr-modal-meta{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.mgr-modal-badge{font-size:10px;padding:3px 8px;border-radius:10px;background:var(--surface);color:var(--text-muted);font-weight:600;}

.mgr-modal-bio{padding:14px 16px;font-size:13px;color:var(--text-muted);line-height:1.7;}
.mgr-modal-trophies{padding:0 16px 20px;}
.mgr-modal-trophies-title{font-size:11px;font-weight:700;color:var(--text-dim);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
.mgr-trophy-row{font-size:12px;color:var(--text-muted);padding:6px 0;border-bottom:1px solid var(--border);}

.hist-section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;}
.history-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .18s;}

.hist-card-img-wrap{position:relative;height:100px;background:var(--surface2);overflow:hidden;}
.hist-card-img{width:100%;height:100%;object-fit:cover;display:block;}

.hist-card-cat-icon{position:absolute;bottom:5px;right:6px;font-size:14px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.6));}
.hist-card-body{padding:8px 9px 10px;}
.hist-card-title{font-size:11px;font-weight:700;color:var(--text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* History Detail Modal */
.hist-modal-img{width:100%;height:200px;object-fit:cover;display:block;border-radius:0;}
.hist-modal-img-ph{width:100%;height:160px;display:flex;align-items:center;justify-content:center;font-size:56px;background:linear-gradient(135deg,rgba(239,1,7,.12),rgba(212,175,55,.08));}
.hist-modal-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.hist-modal-cat{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:20px;background:rgba(239,1,7,.15);color:var(--red);border:1px solid rgba(239,1,7,.25);}
.hist-modal-date{font-size:11px;color:var(--text-dim);}
.hist-modal-title{font-size:16px;font-weight:800;color:var(--text);line-height:1.35;margin-bottom:10px;}
.hist-modal-body{font-size:13px;color:var(--text-muted);line-height:1.75;}
.hist-modal-link{display:block;margin-top:14px;font-size:12px;color:var(--gold);font-weight:600;}

/* ── Trophy Cabinet ─────────────────────── */
.trophy-cabinet{margin-bottom:16px;}
.trophy-cabinet-header{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
.trophy-cabinet-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.trophy-cabinet-total{font-size:10px;color:var(--text-dim);}

/* 2열 그리드 */
.trophy-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.trophy-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .18s;}

/* 이미지 영역 */

.trophy-card-img-ph{font-size:36px;}
.trophy-card-cat{position:absolute;top:5px;left:5px;font-size:8px;font-weight:700;letter-spacing:.5px;padding:2px 5px;border-radius:4px;background:rgba(0,0,0,.55);color:rgba(255,255,255,.8);}

/* 하단 정보 */
.trophy-card-info{padding:7px 8px 9px;text-align:center;}
.trophy-card-name{font-size:9px;font-weight:700;color:var(--text-muted);line-height:1.3;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.trophy-card-count-wrap{display:flex;align-items:baseline;justify-content:center;gap:3px;}
.trophy-card-count{font-size:22px;font-weight:900;line-height:1;font-family:var(--fd);}
.trophy-card-count.gold{color:var(--gold);}
.trophy-card-count.silver{color:#aaa;}
.trophy-card-count.bronze{color:#cd7f32;}
.trophy-card-wins{font-size:8px;color:var(--text-dim);font-weight:600;}
.trophy-card-record{font-size:8px;color:var(--gold);font-weight:700;margin-top:2px;}

/* Trophy 모달 */
.trophy-modal-top{display:flex;gap:12px;padding:16px 16px 12px;align-items:center;}
.trophy-modal-img-wrap{width:80px;height:80px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.trophy-modal-img{width:100%;height:100%;object-fit:cover;}
.trophy-modal-img-ph{font-size:36px;}
.trophy-modal-count-block{flex:1;}
.trophy-modal-count{font-size:48px;font-weight:900;line-height:1;font-family:var(--fd);color:var(--gold);}
.trophy-modal-count.silver{color:#aaa;}
.trophy-modal-count.bronze{color:#cd7f32;}
.trophy-modal-wins-label{font-size:10px;color:var(--text-dim);font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.trophy-modal-title{font-size:16px;font-weight:800;color:var(--text);padding:0 16px 6px;}
.trophy-modal-summary{font-size:12px;color:var(--text-muted);line-height:1.65;padding:0 16px 10px;}
.trophy-modal-body{font-size:13px;color:var(--text-muted);line-height:1.75;padding:0 16px 12px;}
.trophy-modal-keystat{display:flex;align-items:flex-start;gap:8px;margin:0 16px 16px;padding:10px 12px;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.25);border-radius:10px;font-size:11px;color:var(--gold);font-weight:600;line-height:1.5;}
.trophy-modal-keystat-icon{flex-shrink:0;font-size:13px;}
.trophy-modal-years-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);padding:0 16px 8px;}
.trophy-years-chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 24px;}
.trophy-year-chip{padding:5px 12px;border-radius:6px;background:rgba(239,1,7,.08);border:1px solid rgba(239,1,7,.2);font-size:12px;font-weight:700;color:var(--text);font-family:var(--fd);}
.trophy-year-chip.latest{background:var(--red);border-color:var(--red);color:#fff;}

.news-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;text-decoration:none;display:block;color:inherit;-webkit-tap-highlight-color:transparent}

.news-img img{width:100%;height:100%;object-fit:cover;display:block}
.news-img-ph{height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;color:rgba(239,1,7,.15)}
.news-src-badge{position:absolute;top:10px;left:10px;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:var(--red);color:#fff;font-weight:700}
.news-body{padding:12px 14px}
.news-hl{font-weight:700;font-size:13px;line-height:1.4;margin-bottom:6px;color:var(--text)}
.news-ex{font-size:12px;color:var(--text-muted);line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-foot{display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim)}

.live-setup-title{font-weight:700;font-size:13px;margin-bottom:4px}
.live-setup-sub{font-size:11px;color:var(--text-muted);margin-bottom:14px}
.auto-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);padding:4px 10px;border-radius:20px;margin-bottom:12px}
.key-row{display:flex;gap:8px}
.key-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:var(--fm);font-size:12px;outline:none}
.key-input:focus{border-color:var(--red)}
.key-input::placeholder{color:var(--text-dim)}
.key-btn{background:var(--red);border:none;border-radius:8px;padding:10px 16px;color:#fff;font-family:var(--fb);font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap}

.key-status.err{display:flex;align-items:center;gap:6px;background:rgba(239,68,68,.1);color:#F87171;border:1px solid rgba(239,68,68,.2)}
.wgt-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.wgt-tabs::-webkit-scrollbar{display:none}
.wgt-tab{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-family:var(--fb);font-size:10px;padding:6px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.wgt-tab.active{background:rgba(239,1,7,.15);border-color:rgba(239,1,7,.4);color:var(--red)}
.widget-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;min-height:240px}
.widget-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;text-align:center;gap:12px}
.wp-icon{font-size:36px;opacity:.25}
.wp-title{font-family:var(--fd);font-size:18px;letter-spacing:2px;color:var(--text-muted)}
.wp-desc{font-size:11px;color:var(--text-dim);max-width:240px;line-height:1.6}
.widget-iframe-wrap{display:none;width:100%}

.more-fix-btn{width:100%;padding:10px;margin-top:6px;border:1px dashed var(--border);background:transparent;color:var(--text-muted);font-family:var(--fb);font-size:11px;border-radius:10px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.more-fix-btn:hover{background:var(--surface2);color:var(--text);}

/* PLAYER MODAL - Fotmob style */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
.modal-overlay.open{display:flex;}
.modal-sheet{position:relative;background:#1a1c22;border-radius:20px 20px 0 0;width:100%;max-width:540px;max-height:92vh;overflow:hidden;animation:slideUp .28s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;}.modal-sheet-inner{overflow-y:auto;flex:1;padding-bottom:32px;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:10px auto 0;}
.modal-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:20;}
/* 헤더 */
.pm-header{background:linear-gradient(135deg,#bd0510 0%,#7a0010 100%);padding:20px 16px 18px;position:sticky;top:0;z-index:10;}
.pm-header-inner{display:flex;gap:14px;align-items:center;}
.pm-photo{width:68px;height:68px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.3);flex-shrink:0;}
.pm-photo-ph{width:68px;height:68px;border-radius:50%;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:22px;color:#fff;flex-shrink:0;}
.pm-name{font-family:var(--fd);font-size:22px;color:#fff;letter-spacing:1px;line-height:1.1;}
.pm-club{font-size:12px;color:rgba(255,255,255,.75);margin-top:3px;display:flex;align-items:center;gap:5px;}
.pm-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border-radius:20px;padding:2px 8px;font-size:10px;color:rgba(255,255,255,.85);margin-top:5px;}

.pm-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid rgba(255,255,255,.06);}
.pm-info-cell{padding:12px 16px;border-right:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06);}
.pm-info-cell:nth-child(2n){border-right:none;}
.pm-info-val{font-size:15px;font-weight:700;color:#fff;margin-bottom:2px;}
.pm-info-lbl{font-size:10px;color:rgba(255,255,255,.4);}
/* 선수 특성 (레이더) */
.pm-traits{padding:16px 16px 8px;}
.pm-section-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:4px;}
.pm-section-sub{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:14px;}
.pm-radar-wrap{display:flex;justify-content:center;position:relative;}
/* 대회 탭 */
.pm-comp-tabs{display:flex;gap:6px;padding:14px 16px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.pm-comp-tab{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;font-family:var(--fb);}
.pm-comp-tab.active{background:var(--red-dark);border-color:var(--red-dark);color:#fff;}
/* 스탯 섹션 */
.stat-section{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.06);}

.stat-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}

.stat-box-sub{font-size:9px;color:rgba(255,255,255,.3);margin-top:1px;}

.match-modal-inner{overflow-y:auto;flex:1;padding-bottom:32px;}

.mm-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 14px;}
.mm-header{display:flex;flex-direction:column;align-items:center;padding:16px 16px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.mm-header-title{font-size:15px;font-weight:700;color:var(--text);}
.mm-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:10;}
/* Match modal 3-col header */
.mm-scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;padding:16px 14px 14px;width:100%;box-sizing:border-box;}
.mm-team{display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0;}
.mm-team.away{align-items:center;}
.mm-crest{width:52px;height:52px;object-fit:contain;}
.mm-team-name{font-size:11px;font-weight:800;text-align:center;color:var(--text);line-height:1.25;max-width:90px;}
.mm-center-col{display:flex;flex-direction:column;align-items:center;gap:5px;padding:0 6px;}
.mm-score{font-family:var(--fd);font-size:38px;font-weight:900;color:#fff;letter-spacing:2px;line-height:1;}
.mm-center-meta{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%;}
.mm-meta-row{font-size:9px;color:var(--text-dim);text-align:center;white-space:nowrap;letter-spacing:.3px;}
.mm-meta-date{font-size:10px;font-weight:700;color:var(--text-muted);}
.mm-meta-comp{display:inline-block;font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,.07);color:var(--text-dim);border:1px solid var(--border);margin-top:1px;}
.mm-section{padding:14px 16px 0;}
.mm-section-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;font-weight:700;}
.mm-events{display:flex;flex-direction:column;gap:4px;}
.mm-event{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;background:var(--surface2);}
.mm-event.home{flex-direction:row;}
.mm-event.away{flex-direction:row-reverse;}
.mm-event-min{font-family:var(--fm);font-size:11px;color:var(--gold);min-width:32px;font-weight:700;}
.mm-event.away .mm-event-min{text-align:right;}
.mm-event-icon{font-size:14px;flex-shrink:0;}
.mm-event-player{font-size:12px;font-weight:700;color:var(--text);flex:1;}
.mm-event.away .mm-event-player{text-align:right;}
.mm-comp-badge{display:none;}
.mm-venue{display:none;}
.mm-match-date{display:none;}
.mm-events-table{width:100%;border-collapse:collapse;table-layout:fixed;}
.mm-events-table td{padding:4px 0;vertical-align:middle;}
.mm-evt-home{width:calc(50% - 1px);text-align:right;}
.mm-evt-away{width:calc(50% - 1px);text-align:left;}
.mm-evt-div{width:2px;background:rgba(255,255,255,.12);}
.mm-evt-cell{display:inline-flex;align-items:center;gap:3px;padding:3px 6px;background:var(--surface2);border-radius:6px;max-width:100%;min-width:0;overflow:hidden;}
.mm-evt-home .mm-evt-cell{flex-direction:row;border-radius:6px 0 0 6px;}
.mm-evt-away .mm-evt-cell{flex-direction:row;border-radius:0 6px 6px 0;}
.mm-event-icon{font-size:10px;flex-shrink:0;}
.mm-event-min{font-family:var(--fm);font-size:9px;color:var(--gold);font-weight:700;flex-shrink:0;width:28px;text-align:center;}
.mm-event-player{font-size:10px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1;}
.mm-stats-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:3px 8px;align-items:center;}
.mm-stat-val{font-size:12px;font-weight:700;color:var(--text);}
.mm-stat-val.home{text-align:right;}
.mm-stat-val.away{text-align:left;}
.mm-stat-label{font-size:10px;color:var(--text-muted);text-align:center;letter-spacing:.3px;}
.mm-stat-bar-wrap{grid-column:1/-1;display:flex;height:3px;border-radius:2px;overflow:hidden;margin-bottom:2px;}
.mm-stat-bar-home{background:var(--red);transition:width .4s;}
.mm-stat-bar-away{background:rgba(96,165,250,.5);transition:width .4s;}
.mm-pitch-wrap{overflow:hidden;border-radius:10px;}
.mm-pitch-svg{width:100%;display:block;}
.mm-pitch-player{cursor:default;}
.mm-pitch-player circle{fill:#C8102E;}
.mm-pitch-player.away circle{fill:#1a3a6c;}
.mm-pitch-player text.jersey{fill:#fff;font-size:9px;font-weight:700;text-anchor:middle;dominant-baseline:central;}
.mm-pitch-player text.pname{fill:rgba(255,255,255,0.85);font-size:7px;text-anchor:middle;dominant-baseline:hanging;}
.mm-pitch-formation{font-size:10px;color:var(--text-muted);text-align:center;padding:2px 0 6px;}
.mm-pos-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:0.5px;margin-right:5px;vertical-align:middle;}
.mm-pos-gk{background:#B45309;color:#FEF3C7;}
.mm-pos-df{background:#1D4ED8;color:#DBEAFE;}
.mm-pos-mf{background:#15803D;color:#DCFCE7;}
.mm-pos-fw{background:#B91C1C;color:#FEE2E2;}
.mm-pos-sub{background:#374151;color:#D1D5DB;}
.mm-sub-title{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;padding:8px 6px 4px;border-top:1px solid var(--border);}
.mm-player-table{width:100%;border-collapse:collapse;font-size:11px;}
.mm-player-table th{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);padding:5px 6px;text-align:center;border-bottom:1px solid var(--border);}
.mm-player-table th:first-child{text-align:left;}
.mm-player-table td{padding:5px 6px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text);}
.mm-player-table td:first-child{text-align:left;font-weight:600;}
.mm-player-table tr:last-child td{border-bottom:none;}
.mm-tab-row{display:flex;gap:6px;padding:12px 16px 0;}
.mm-tab{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-family:var(--fb);font-size:10px;padding:5px 12px;border-radius:20px;cursor:pointer;}
.mm-tab.active{background:rgba(239,1,7,.15);border-color:rgba(239,1,7,.4);color:var(--red);}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
/* ── SNS ── */
.sns-list{display:flex;flex-direction:column;gap:10px}
.sns-post{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;text-decoration:none;display:block;color:inherit;-webkit-tap-highlight-color:transparent;transition:border-color .2s}
.sns-post:active{opacity:.85}
.sns-post-head{display:flex;align-items:center;gap:10px;padding:12px 14px 8px}
.sns-avatar{width:36px;height:36px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:14px;color:#fff;flex-shrink:0;border:1px solid rgba(239,1,7,.4)}
.sns-author{flex:1;min-width:0}
.sns-author-name{font-weight:700;font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sns-author-label{font-size:10px;color:var(--text-muted)}
.sns-time{font-size:10px;color:var(--text-dim);flex-shrink:0}
.sns-body{padding:0 14px 10px}
.sns-text{font-size:13px;line-height:1.5;color:var(--text);white-space:pre-wrap;word-break:break-word}
.sns-image{width:100%;max-height:200px;object-fit:cover;display:block;border-top:1px solid var(--border)}
.sns-foot{display:flex;gap:14px;padding:8px 14px 12px;border-top:1px solid var(--border)}
.sns-stat{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted)}
.sns-bsky-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:4px;background:rgba(0,133,255,.15);color:#60A5FA;border:1px solid rgba(96,165,250,.25);margin-left:auto;flex-shrink:0}
/* ── 삼성 인터넷 강제 다크모드 차단 — 이미 다크 테마이므로 고정 ── */</style>
</head>

<script>
var FN='/api';
var stdExpanded=false;
var allStandings=[];
var allPlayers=[];

// 포지션 색상 설정
var POS_KO={GK:'GK',DF:'DF',MF:'MF',FW:'FW'};
var POS_BG={GK:'rgba(200,168,75,.18)',DF:'rgba(59,130,246,.18)',MF:'rgba(34,197,94,.18)',FW:'rgba(239,1,7,.18)'};
var POS_BORDER={GK:'rgba(200,168,75,.5)',DF:'rgba(59,130,246,.5)',MF:'rgba(34,197,94,.5)',FW:'rgba(239,1,7,.5)'};
var POS_TEXT={GK:'#C8A84B',DF:'#60A5FA',MF:'#22C55E',FW:'#EF0107'};
var NAT_FLAG_ISO={
  'England':'gb-eng','Scotland':'gb-sct','Wales':'gb-wls',
  'Spain':'es','France':'fr','Germany':'de','Italy':'it',
  'Portugal':'pt','Netherlands':'nl','Belgium':'be',

  'Cameroon':'cm','Mali':'ml','Morocco':'ma','Algeria':'dz',
  'Egypt':'eg','South Africa':'za','Guinea':'gn','Gabon':'ga',
  'Congo':'cd','Tunisia':'tn','Benin':'bj','Burkina Faso':'bf',
  'South Korea':'kr','Japan':'jp','China':'cn','Australia':'au',
  'United States':'us','Canada':'ca','Mexico':'mx','Jamaica':'jm',
  'Trinidad and Tobago':'tt','Costa Rica':'cr','Ecuador':'ec',

};
function getNatFlag(nationality){
  var code=NAT_FLAG_ISO[nationality];
  if(!code)return null;
  return 'https://flagcdn.com/24x18/'+code+'.png';
}
var NAT_FLAG=NAT_FLAG_ISO;

function apiFetch(url){
  var sep=url.indexOf('?')>=0?'&':'?';
  return fetch(url+sep+'_='+Date.now()).then(function(r){
    if(!r.ok) return r.json().then(function(e){throw new Error(e.error||'HTTP '+r.status);});
    return r.json();
  });
}
function showErr(el,msg){el.innerHTML='<div class="error-state">&#9888;&#65039; '+msg+'</div>';}

var ROUND_LABEL={
  'final':'결승','semifinals':'4강','quarterfinals':'8강',
  'round-of-16':'16강','round-of-32':'32강',
  'league-phase':'리그페이즈',
  'fourth-round':'4라운드','third-round':'3라운드',
  'second-round':'2라운드','first-round':'1라운드',
  'group-stage':'조별리그','playoff-round':'플레이오프',
  'league phase':'리그페이즈',
  'fifth-round':'5라운드','sixth-round':'6라운드',
  'fifth round':'5라운드','fourth round':'4라운드',
  'third round':'3라운드','second round':'2라운드',

};
var CTAG={PL:'tag-pl',CL:'tag-cl',UCL:'tag-cl',EL:'tag-cl',FAC:'tag-fa',ELC:'tag-ec',EFL:'tag-ec',CS:'tag-oth',CWC:'tag-oth'};
var CNAME={PL:'PL',CL:'UCL',UCL:'UCL',EL:'UEL',FAC:'FA Cup',ELC:'EFL Cup',EFL:'EFL Cup',CS:'Shield',CWC:'CWC'};
function ctag(c){return CTAG[c]||'tag-oth';}
function cname(c,fb){return CNAME[c]||fb||c;}

function formatDate(utcDate, tbd){
  var d=new Date(utcDate);
  var date=d.toLocaleDateString('ko-KR',{month:'short',day:'numeric',weekday:'short'});
  if(tbd==='postponed') return date+' 연기';
  if(tbd==='canceled')  return date+' 취소';
  var time=tbd==='tbd'?'시간미정':d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false});
  // KST(UTC+9) 기준 날짜 비교
  var KST=9*60*60*1000;
  function kstDay(ts){ return Math.floor((ts+KST)/86400000); }
  var diff=kstDay(d.getTime())-kstDay(Date.now());
  if(diff===0) return '\uc624\ub298 '+time;
  if(diff===1) return '\ub0b4\uc77c '+time;
  if(diff>1&&diff<8) return date+' '+time;
  if(diff>=8) return date+' '+time;
  if(diff===-1) return '\uc5b4\uc81c';
  return date+' '+time;
}

function makeCrest(team,isArs){
  var short=(team.shortName||team.name||'').substring(0,3).toUpperCase();
  var phCls='t-crest-ph'+(isArs?' afc':'');
  if(team.crest) return {type:'crest',src:team.crest,alt:team.shortName||'',phCls:phCls,short:short};
  return {type:'ph',phCls:phCls,short:short};
}
function renderCrest(c){
  if(c.type==='crest'){
    var img=document.createElement('img');
    img.className='t-crest';img.src=c.src;img.alt=c.alt;
    img.onerror=function(){var ph=document.createElement('div');ph.className=c.phCls;ph.textContent=c.short;this.parentNode.replaceChild(ph,this);};
    return img;
  }
  var ph=document.createElement('div');ph.className=c.phCls;ph.textContent=c.short;return ph;
}

function buildFixCard(m){
  var ARSENAL_ESPN='359';
  var isArsHome=m.homeTeam&&(m.homeTeam.id===57||m.homeTeam.id===ARSENAL_ESPN||(m.homeTeam.name||'').includes('Arsenal'));
  var isLive=m.status==='IN_PLAY'||m.status==='PAUSED';
  var isDone=m.status==='FINISHED';
  var compObj=m.competition||{};
  var code=(compObj.short)||m.competitionCode||'PL';
  var compName=(compObj.name)||code;
  var hs=m.score&&m.score.fullTime?m.score.fullTime.home:null;
  var as_=m.score&&m.score.fullTime?m.score.fullTime.away:null;
  var hasScore=hs!==null&&hs!==undefined&&isDone;
  var resultCls=''; var resultBg='';
  if(isDone&&hasScore){
    var arsS=isArsHome?hs:as_; var oppS=isArsHome?as_:hs;
    if(arsS>oppS){resultCls='result-win';resultBg='rgba(34,197,94,0.08)';}
    else if(arsS===oppS){resultCls='result-draw';resultBg='rgba(245,158,11,0.08)';}
    else{resultCls='result-loss';resultBg='rgba(239,68,68,0.08)';}
  }
  var card=document.createElement('div');
  card.className='fix-card '+(isLive?'live-match':isDone?'finished '+resultCls:'upcoming');
  if(resultBg) card.style.background=resultBg;

  // 5레이어 grid 구조
  var grid=document.createElement('div');grid.className='fix-grid';

  // 좌상단: 대회 태그
  var z1=document.createElement('div');z1.className='fix-z1';

    // 라이브 카드 - 확장 패널
    // 항상 보이는 프로그레스바 영역
    var progressWrap = document.createElement('div');
    progressWrap.style.cssText = 'padding:6px 14px 2px;display:flex;align-items:center;gap:8px;';

        '<div class="live-progress-bar" id="lpb-'+m.id+'" style="width:0%"></div>'+
      '</div>'+
      '<span class="live-progress-label" id="lpl-'+m.id+'">--</span>';

    expandPanel.className = 'fix-live-expand';
    expandPanel.id = 'live-expand-'+m.id;
    card.appendChild(expandPanel);

    var expandBtn = document.createElement('button');
    expandBtn.className = 'fix-expand-btn';
    expandBtn.textContent = '▼ 상세 보기';
    card.appendChild(expandBtn);

    // 카드 생성 시 바로 프로그레스바 시작

    expandBtn.onclick = function(e){
      e.stopPropagation();

        openLiveExpand(m, expandPanel);
        expandPanel.classList.add('open');

        expandPanel.classList.remove('open');
        expandBtn.textContent = '▼ 상세 보기';
        setTimeout(function(){ expandPanel.innerHTML=''; stopLiveExpandPolling(m.id); }, 350);
      }
    };
  }
  if(isDone && m.id){
    card.style.cursor='pointer';
    card.onclick=function(){openMatchModal(m);};
  }
  return card;
}

function loadFixtures(){
  var upEl=document.getElementById('upcomingList');
  var fnEl=document.getElementById('finishedList');
  var badge=document.getElementById('fixBadge');
  apiFetch(FN+'/football?type=fixtures').then(function(data){
    badge.textContent='ESPN';
    var finishedAll=(data.finished||[]).slice().reverse(); // 최신순
    var upcomingAll=data.upcoming||[];
    // PL 경기 날짜순 정렬 후 유효한 경기에만 라운드 번호 부여 (연기/취소 제외)
    var allPL=[...(data.finished||[]),...(data.upcoming||[])]
      .filter(function(m){return m.competition&&m.competition.short==='PL';})
      .sort(function(a,b){return new Date(a.utcDate)-new Date(b.utcDate);});
    var round=1;
    allPL.forEach(function(m){
      if(m.tbd==='postponed'||m.tbd==='canceled'){m.round=null;return;}
      m.round='pl'+round;
      ROUND_LABEL['pl'+round]=round+'라운드';
      round++;
    });
    function renderList(el,showList,allList){
      el.innerHTML='';
      if(!showList.length){el.innerHTML='<div style="color:var(--text-dim);font-size:12px;padding:12px 4px">데이터 없음</div>';return;}
      var expanded=false;
      showList.forEach(function(m){el.appendChild(buildFixCard(m));});
      if(allList.length>showList.length){
        var btn=document.createElement('button');btn.className='more-fix-btn';
        btn.textContent='↓ 더보기 ('+(allList.length-showList.length)+'개 더)';
        btn.onclick=function(){
          if(!expanded){expanded=true;el.innerHTML='';
            allList.forEach(function(m){el.appendChild(buildFixCard(m));});
            var col=document.createElement('button');col.className='more-fix-btn';
            col.textContent='↑ 접기';
            col.onclick=function(){expanded=false;renderList(el,showList,allList);};
            el.appendChild(col);}
        };el.appendChild(btn);}
    }
    renderList(upEl,upcomingAll.slice(0,3),upcomingAll);
    renderList(fnEl,finishedAll.slice(0,5),finishedAll);
    // 라이브 경기 있으면 폴링 시작
    if((data.matches||[]).some(function(m){return m.status==='IN_PLAY';})) startLivePolling();
    else stopLivePolling();
  }).catch(function(err){showErr(upEl,err.message);badge.textContent='오류';});
}

function renderSq(filter){

  el.innerHTML='';

  // positionKey → 포지션 약자 변환
  var POS_SHORT={
    'keeper_long':'GK','goalkeeper':'GK',
    'rightback':'RB','leftback':'LB','centerback':'CB','centreback':'CB',
    'right_wing_back':'RWB','left_wing_back':'LWB',
    'centermidfielder':'CM','centremidfielder':'CM',
    'centerdefensivemidfielder':'DM','centredefensivemidfielder':'DM','defensivemidfielder':'DM',
    'attackingmidfielder':'AM','centreattackingmidfielder':'AM',
    'rightmidfielder':'RM','leftmidfielder':'LM',
    'rightwinger':'RW','leftwinger':'LW','rightwing':'RW','leftwing':'LW',
    'right_wing_back':'RWB','left_wing_back':'LWB',
    'striker':'ST','centreforward':'ST','centerforward':'ST',
  };
  var POS_GROUP_CLS={GK:'gk',DF:'df',MF:'mf',FW:'fw'};

  list.forEach(function(p){
    var posKey=(p.position||'').toLowerCase().replace(/_/g,'').replace(/-/g,'').replace(/ /g,'');

    card.onclick=function(){openPlayerModal(p);};

    // 상단
    var top=document.createElement('div');top.className='pl-top';

    // 좌측 (포지션+번호)
    var left=document.createElement('div');left.className='pl-left '+leftCls;

    var numEl=document.createElement('span');numEl.className='pl-num-txt';numEl.textContent=jersey||'–';
    left.appendChild(posEl);left.appendChild(numEl);

    // 우측 (사진)
    var photoBox=document.createElement('div');
    if(p.photo){
      photoBox.className='pl-photo-box';
      var img=document.createElement('img');img.src=p.photo;img.alt=p.name;
      img.onerror=function(){
        photoBox.className='pl-photo-box no-img';
        photoBox.innerHTML='⚽';
        photoBox.removeChild(img);
      };
      photoBox.appendChild(img);
    } else {
      photoBox.className='pl-photo-box no-img';
      photoBox.textContent='⚽';
    }

    top.appendChild(left);top.appendChild(photoBox);

    el.appendChild(card);
  });

var _histTab = 'TROPHIES';

var HIST_TABS = ['TROPHIES','MANAGERS','LEGENDS','TIMELINE','MOMENTS','RECORDS','STADIUM'];
var HIST_TAB_LABELS = {
  TROPHIES: '🏆 TROPHIES',
  MANAGERS: '👔 MANAGERS',
  LEGENDS:  '⭐ LEGENDS',
  TIMELINE: '📅 TIMELINE',
  MOMENTS:  '⚽ MOMENTS',
  RECORDS:  '📈 RECORDS',
  STADIUM:  '🏟️ STADIUM'
};

function renderHistoryNew(){
  var el = document.getElementById('historyContent');
  var html = '';

  // ── On This Day 카드 (항상 상단) ──
  var otdData = window._otdData || [];
  var today = new Date();
  var mm = String(today.getMonth()+1).padStart(2,'0');
  var dd = String(today.getDate()).padStart(2,'0');
  var todayMD = mm+'-'+dd;
  var todayItems = otdData.filter(function(d){ return d.month_day === todayMD; });
  var otdItem = todayItems.length
    ? todayItems[Math.floor(Math.random()*todayItems.length)]
    : (otdData.length ? otdData[Math.floor(Math.random()*otdData.length)] : null);

  if(otdItem){
    var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var otdMD = (otdItem.month_day||todayMD).split('-');
    var monthStr = MONTHS[parseInt(otdMD[0])-1] || '';
    var dayStr = parseInt(otdMD[1]) || parseInt(dd);
    var yr = otdItem.year || 0;
    var yearsAgo = yr ? (today.getFullYear() - yr) : 0;
    var enc = encodeURIComponent(JSON.stringify(otdItem)).replace(/'/g, '%27');
    html += '<div class="hist-otd-wrap"><div class="hist-otd-card" onclick="openOtdModal(\'' + enc + '\')">';
    html += '<div class="hist-otd-tag">ON THIS DAY</div>';
    html += '<div class="hist-otd-date-row">';
    html += '<div class="hist-otd-date">'+dayStr+' '+monthStr+(yr?' '+yr:'')+'</div>';
    if(yearsAgo>0) html += '<div class="hist-otd-years-ago">'+yearsAgo+'년전 오늘</div>';
    html += '</div>';
    html += '<div class="hist-otd-title">'+otdItem.title+'</div>';
    if(otdItem.summary) html += '<div class="hist-otd-summary">'+otdItem.summary+'</div>';
    html += '</div></div>';
  }

  // ── 탭 내비게이션 ──
  html += '<div class="hist-nav">';
  HIST_TABS.forEach(function(tab){
    html += '<button class="hist-nav-btn'+(_histTab===tab?' active':'')+'" onclick="switchHistTab(\'' + tab + '\')">'; 
    html += HIST_TAB_LABELS[tab];
    html += '</button>';
  });
  html += '</div>';

  // ── 탭 콘텐츠 ──
  html += '<div class="hist-section" id="histSection">';
  html += renderHistSection(_histTab);
  html += '</div>';

  el.innerHTML = html;
  initDragScroll(document.querySelector('.hist-nav'));
}

function initDragScroll(el){
  if(!el) return;
  var isDown = false, startX, scrollLeft;
  el.addEventListener('mousedown', function(e){
    isDown = true; el.style.cursor='grabbing';
    startX = e.pageX - el.offsetLeft;
    scrollLeft = el.scrollLeft;
  });
  el.addEventListener('mouseleave', function(){ isDown=false; el.style.cursor=''; });
  el.addEventListener('mouseup', function(){ isDown=false; el.style.cursor=''; });
  el.addEventListener('mousemove', function(e){
    if(!isDown) return;
    e.preventDefault();
    el.scrollLeft = scrollLeft - (e.pageX - el.offsetLeft - startX);
  });
  el.addEventListener('wheel', function(e){
    if(e.deltaY !== 0){ e.preventDefault(); el.scrollLeft += e.deltaY; }
  }, {passive:false});
}

function switchHistTab(tab){
  _histTab = tab;
  document.querySelectorAll('.hist-nav-btn').forEach(function(b){
    b.classList.toggle('active', b.textContent.trim() === HIST_TAB_LABELS[tab]);
  });
  document.getElementById('histSection').innerHTML = renderHistSection(tab);
}

function renderHistSection(tab){
  if(tab === 'TROPHIES') return renderTrophiesSection();
  if(tab === 'MANAGERS') return renderManagersSection();
  if(tab === 'LEGENDS')  return renderLegendsSection();
  if(tab === 'TIMELINE') return renderTimelineSection();
  return '<div style="padding:40px;text-align:center;color:var(--text-dim);font-size:13px;">준비 중...</div>';
}

  // 이미지
  if(item.image){
    html += '<img class="hist-modal-img" src="'+item.image+'" alt="" onerror="this.nextSibling.style.display=\'flex\';this.style.display=\'none\'">';
    html += '<div class="hist-modal-img-ph" style="display:none">'+ph+'</div>';

function loadNews(){
  var el=document.getElementById('newsGrid');
  var badge=document.getElementById('newsBadge')||document.getElementById('mediaBadge');
  var mediaBadgeEl=document.getElementById('mediaBadge');
  apiFetch(FN+'/news').then(function(data){
    badge.textContent=data.source||'RSS';
    if(mediaBadgeEl) mediaBadgeEl.textContent='ESPN+';
    var articles=data.articles||[];
    if(!articles.length){el.innerHTML='<div class="loading-state">\uB274\uC2A4 \uC5C6\uC74C</div>';return;}
    el.innerHTML='';
    articles.forEach(function(a){
      var card=document.createElement('a');card.className='news-card';card.href=a.url||'#';card.target='_blank';card.rel='noopener';
      var imgDiv=document.createElement('div');imgDiv.className='news-img';
      var srcBdg=document.createElement('div');srcBdg.className='news-src-badge';srcBdg.textContent=a.source||'RSS';
      var validImg=(a.image||a.urlToImage)&&typeof (a.image||a.urlToImage)==='string'&&(a.image||a.urlToImage).startsWith('http');
      if(validImg){
        var img=document.createElement('img');img.src=a.image||a.urlToImage;img.alt='';
        img.onerror=function(){var ph=document.createElement('div');ph.className='news-img-ph';ph.textContent='📰';imgDiv.replaceChild(ph,this);imgDiv.appendChild(srcBdg);};
        imgDiv.appendChild(img);
      } else {
        var ph=document.createElement('div');ph.className='news-img-ph';ph.textContent='📰';imgDiv.appendChild(ph);
      }
      imgDiv.appendChild(srcBdg);
      var body=document.createElement('div');body.className='news-body';
      var hl=document.createElement('div');hl.className='news-hl';hl.textContent=a.title||'';
      var ex=document.createElement('div');ex.className='news-ex';ex.textContent=a.description||'';
      var ft=document.createElement('div');ft.className='news-foot';
      ft.innerHTML='<span>&#128336; '+(a.timeAgo||'')+'</span><span style="color:var(--red);font-weight:700">\uC77D\uAE30 \u2192</span>';
      body.appendChild(hl);body.appendChild(ex);body.appendChild(ft);
      card.appendChild(imgDiv);card.appendChild(body);el.appendChild(card);
    });
  }).catch(function(err){showErr(el,err.message);badge.textContent='\uC624\uB958';});
}

// ── SNS (Bluesky) ──
function loadSns(){
  var el=document.getElementById('snsGrid');
  var badge=document.getElementById('snsBadge')||document.getElementById('mediaBadge');
  apiFetch(FN+'/social').then(function(data){
    var posts=data.posts||[];
    if(badge) badge.textContent=posts.length+'개';
    if(!posts.length){el.innerHTML='<div class="loading-state">포스트 없음</div>';return;}
    el.innerHTML='';
    posts.forEach(function(p){
      var a=document.createElement('a');
      a.className='sns-post';
      a.href=p.url||'#';
      a.target='_blank';
      a.rel='noopener';

      // 헤더 (아바타 + 작성자 + 시간)
      var head=document.createElement('div');head.className='sns-post-head';
      var av=document.createElement('div');av.className='sns-avatar';
      av.textContent=(p.author.name||'?').charAt(0).toUpperCase();
      var authorDiv=document.createElement('div');authorDiv.className='sns-author';
      var nameEl=document.createElement('div');nameEl.className='sns-author-name';nameEl.textContent=p.author.name||'';
      var labelEl=document.createElement('div');labelEl.className='sns-author-label';labelEl.textContent=p.author.label||'';
      authorDiv.appendChild(nameEl);authorDiv.appendChild(labelEl);
      var timeEl=document.createElement('div');timeEl.className='sns-time';timeEl.textContent=p.timeAgo||'';
      head.appendChild(av);head.appendChild(authorDiv);head.appendChild(timeEl);

      // 본문
      var body=document.createElement('div');body.className='sns-body';
      var txt=document.createElement('div');txt.className='sns-text';txt.textContent=p.text||'';
      body.appendChild(txt);

      // 이미지
      var imgEl=null;
      if(p.image){
        imgEl=document.createElement('img');
        imgEl.className='sns-image';
        imgEl.src=p.image;
        imgEl.alt='';
        imgEl.onerror=function(){this.style.display='none';};
      }

      // 푸터 (좋아요, 리포스트, 댓글 + Bluesky 배지)
      var foot=document.createElement('div');foot.className='sns-foot';
      foot.innerHTML=
        '<span class="sns-stat">♥ '+p.likes+'</span>'+
        '<span class="sns-stat">↺ '+p.reposts+'</span>'+
        '<span class="sns-stat">💬 '+p.replies+'</span>'+
        '<span class="sns-bsky-badge">🦋 Bluesky</span>';

      a.appendChild(head);
      a.appendChild(body);
      if(imgEl) a.appendChild(imgEl);
      a.appendChild(foot);
      el.appendChild(a);
    });
  }).catch(function(err){
    el.innerHTML='<div class="loading-state">오류: '+err.message+'</div>';
    if(badge) badge.textContent='오류';
  });
}

    });
}

      if(!h.stats[k]&&!a.stats[k]) return;
      var hvStr=h.stats[k]||'0'; var avStr=a.stats[k]||'0';

      var rawH=parseFloat((hvStr+'').replace('%',''))||0;
      var rawA=parseFloat((avStr+'').replace('%',''))||0;
      var isPct=k==='possessionPct'||(hvStr+'').includes('%');
      var total=isPct?100:(rawH+rawA||1);
      var homePct=Math.round(rawH/total*100); var awayPct=100-homePct;
      html+=
        '<div class="mm-stat-val home">'+hvStr+'</div>'+
        '<div class="mm-stat-label">'+(STAT_LABELS[k]||k)+'</div>'+
        '<div class="mm-stat-val away">'+avStr+'</div>'+
        '<div class="mm-stat-bar-wrap">'+
          '<div class="mm-stat-bar-home" style="width:'+homePct+'%"></div>'+
          '<div class="mm-stat-bar-away" style="width:'+awayPct+'%"></div>'+
        '</div>';
    });
    html+='</div></div>';
  }

  // 선수 스탯 탭
  var hP=(data.players&&data.players.home)||[];
  var aP=(data.players&&data.players.away)||[];
  if(hP.length||aP.length){
    // 라인업 피치
    var hFormation=data.players.homeFormation||'';
    var aFormation=data.players.awayFormation||'';
    html+='<div class="mm-tab-row">'+
      '<button class="mm-tab active" id="mm-tab-home" onclick="mmSwitchTab(&quot;home&quot;)">'+h.name+'</button>'+
      '<button class="mm-tab" id="mm-tab-away" onclick="mmSwitchTab(&quot;away&quot;)">'+a.name+'</button>'+
    '</div>';
    var hColor=(data.homeTeam&&data.homeTeam.color)||'#C8102E';
    var aColor=(data.awayTeam&&data.awayTeam.color)||'#1a3a6c';
    var hStarters=hP.filter(function(p){return p.starter&&p.formationPlace;});
    var aStarters=aP.filter(function(p){return p.starter&&p.formationPlace;});
    if(hStarters.length||aStarters.length){
      var hHeader='<div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:8px 14px;background:#1b4020;"><span style="font-size:11px;color:rgba(255,255,255,0.5);">라인업</span><span style="font-size:13px;font-weight:700;color:#fff;">'+hFormation+'</span><span></span></div>';
      var aHeader='<div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:8px 14px;background:#1b4020;"><span style="font-size:11px;color:rgba(255,255,255,0.5);">라인업</span><span style="font-size:13px;font-weight:700;color:#fff;">'+aFormation+'</span><span></span></div>';
      html+='<div style="margin:8px 14px 8px"><div class="mm-pitch-wrap" id="mm-pitch-home">'+hHeader+renderPitch(hStarters,hFormation,hColor,hP)+'</div></div>';
      html+='<div style="margin:0 14px 8px"><div class="mm-pitch-wrap" id="mm-pitch-away" style="display:none">'+aHeader+renderPitch(aStarters,aFormation,aColor,aP)+'</div></div>';
    }
    html+=renderPlayerTable('home',hP,true)+renderPlayerTable('away',aP,false);
  }

  content.innerHTML=html;
}

function renderPitch(starters, formation, teamColor, allPlayers){
  var W=220, H=370;
  var FIRST_Y=29, LAST_Y=H-29;
  var r=11;
  var fillColor = teamColor||'#C8102E';
  // 유니폼 색 밝기 계산 → 밝은 색이면 검은 텍스트
  var _h=(fillColor||'').replace('#',''); if(_h.length===3)_h=_h[0]+_h[0]+_h[1]+_h[1]+_h[2]+_h[2];
  var _r=parseInt(_h.slice(0,2),16)/255,_g=parseInt(_h.slice(2,4),16)/255,_b=parseInt(_h.slice(4,6),16)/255;
  var lum=0.299*_r+0.587*_g+0.114*_b;
  var jerseyTextColor=lum>0.55?'#111':'#fff';
  var nameTextColor='rgba(255,255,255,0.85)';
  // 유니폼 색 밝기 계산 → 밝은 색이면 검은 텍스트
  function hexLuminance(hex){
    var h=(hex||'').replace('#','');
    if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    if(h.length!==6) return 0;
    var r=parseInt(h.slice(0,2),16)/255;
    var g=parseInt(h.slice(2,4),16)/255;
    var b=parseInt(h.slice(4,6),16)/255;
    // 상대 밝기 (0~1)
    return 0.299*r + 0.587*g + 0.114*b;
  }
  var lum = hexLuminance(fillColor);

  var POS_PRIORITY = {
    'G':0,'GK':0,
    'CB':10,'CD':10,'CD-L':10,'CD-R':10,'LB':10,'RB':10,'LWB':10,'RWB':10,'SW':10,'DC':10,
    'DM':20,'CDM':20,
    'CM':30,'CM-L':30,'CM-R':30,'LM':30,'RM':30,'MF':30,'ML':30,'MR':30,
    'AM':40,'AM-L':40,'AM-R':40,'LAM':40,'RAM':40,'SS':40,
    'CF-L':50,'CF-R':50,'RCF':50,'LCF':50,
    'F':60,'ST':60,'FW':60,'LW':60,'RW':60,'LF':60,'RF':60,'CF':60,
  };
  var POS_ORDER = {
    'LB':-3,'LWB':-3,'LM':-3,
    'CD-L':-2,'CM-L':-2,'AM-L':-2,'CF-L':-2,'LF':-2,'LW':-2,'LAM':-2,
    'CD':-1,'CM':-1,'DM':-1,'AM':-1,'F':-1,'ST':-1,'CF':-1,'G':-1,'GK':-1,
    'CD-R':2,'CM-R':2,'AM-R':2,'CF-R':2,'RCF':2,'RF':2,'RW':2,'RAM':2,
    'RB':3,'RWB':3,'RM':3,
  };

  var rows = formation ? formation.split('-').map(Number) : [4,4,2];
  var expected = [1].concat(rows);

  var sorted = starters.slice().sort(function(a,b){
    var pa=POS_PRIORITY[a.position]!=null?POS_PRIORITY[a.position]:35;
    var pb=POS_PRIORITY[b.position]!=null?POS_PRIORITY[b.position]:35;
    return pa-pb;
  });

  var finalLines=[], idx=0;
  expected.forEach(function(cnt){
    var line=sorted.slice(idx,idx+cnt);
    line.sort(function(a,b){
      var oa=POS_ORDER[a.position]!=null?POS_ORDER[a.position]:0;
      var ob=POS_ORDER[b.position]!=null?POS_ORDER[b.position]:0;
      return oa-ob;
    });
    finalLines.push(line);
    idx+=cnt;
  });

  var totalLines=finalLines.length;
  var coords={};
  finalLines.forEach(function(line,li){
    if(!line.length) return;
    var yRatio=totalLines<=1?0:li/(totalLines-1);
    var cy=Math.round(LAST_Y-yRatio*(LAST_Y-FIRST_Y));
    line.forEach(function(p,ci){
      coords[p.formationPlace]={x:Math.round((W/(line.length+1))*(ci+1)),y:cy};
    });
  });

  // 교체된 선수 맵 (subbedOut 선수 formationPlace 기준)
  var subbedOutMap={};
  if(allPlayers){
    allPlayers.forEach(function(p){
      if(p.subbedOut&&p.formationPlace) subbedOutMap[p.formationPlace]=true;
    });
  }

  var svg='<svg class="mm-pitch-svg" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  svg+='<rect width="'+W+'" height="'+H+'" fill="#2d5a27"/>';
  svg+='<line x1="0" y1="'+H/2+'" x2="'+W+'" y2="'+H/2+'" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
  svg+='<circle cx="'+W/2+'" cy="'+H/2+'" r="28" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
  svg+='<circle cx="'+W/2+'" cy="'+H/2+'" r="2" fill="rgba(255,255,255,0.4)"/>';
  var bw=W*0.55,bh=32,bx=(W-bw)/2;
  svg+='<rect x="'+bx+'" y="'+(H-bh)+'" width="'+bw+'" height="'+bh+'" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
  svg+='<rect x="'+bx+'" y="0" width="'+bw+'" height="'+bh+'" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
  var pr=18,pcx=W/2;
  // 페널티 반원: 박스 바깥으로, 약 1/3호 (시작/끝 x를 좁혀서 호 범위 제한)
  var arcR=18, arcW=arcR*0.85;
  // 하단 박스 바깥(아래)으로 호: sweep=1
  svg+='<path d="M '+(pcx-arcW)+' '+(H-bh)+' A '+arcR+' '+arcR+' 0 0 1 '+(pcx+arcW)+' '+(H-bh)+'" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
  // 상단 박스 바깥(위)으로 호: sweep=0
  svg+='<path d="M '+(pcx-arcW)+' '+bh+' A '+arcR+' '+arcR+' 0 0 0 '+(pcx+arcW)+' '+bh+'" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';


  starters.forEach(function(p){
    var c=coords[p.formationPlace]; if(!c) return;
    var lastName=(p.name||'').split(' ').pop();
    var wasSubbed=subbedOutMap[p.formationPlace];
    var isGK=p.position==='G'||p.position==='GK';
    var circleColor=isGK?'#888888':fillColor;
    var circleTextColor=isGK?'#fff':jerseyTextColor;
    // 원
    svg+='<circle cx="'+c.x+'" cy="'+c.y+'" r="'+r+'" fill="'+circleColor+'" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>';
    // 등번호
    svg+='<text x="'+c.x+'" y="'+c.y+'" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="700" fill="'+circleTextColor+'" font-family="sans-serif">'+p.jersey+'</text>';
    // 이름
    svg+='<text x="'+c.x+'" y="'+(c.y+r+8)+'" text-anchor="middle" font-size="7.5" font-weight="600" fill="'+nameTextColor+'" font-family="sans-serif">'+lastName+'</text>';
    // 교체 아이콘 (ESPN substitution icon)
    if(wasSubbed){
      var ix=c.x+r, iy=c.y-r;
      svg+='<circle cx="'+ix+'" cy="'+iy+'" r="6" fill="rgba(0,0,0,0.65)"/>';
      svg+='<g transform="translate('+(ix-5)+','+(iy-5)+') scale(0.42)"><path d="M6.873 3.845l4.221 4.317 0.868-0.868-5.764-5.957-5.74 5.957 0.893 0.868 4.221-4.317v11.745h1.302zM23.66 15.999l-0.917-0.869-4.221 4.317v-11.769h-1.302v11.769l-4.197-4.317-0.965 0.869 5.789 5.932z" fill="#fff"/></g>';
    }
  });
  svg+='</svg>';
  return svg;
}
function getPosBadge(pos){
  var p=(pos||'').toUpperCase();
  if(/^(G|GK)/.test(p)) return '<span class="mm-pos-badge mm-pos-gk">GK</span>';
  if(/^(CB|CD|LB|RB|LWB|RWB|SW|DC)/.test(p)) return '<span class="mm-pos-badge mm-pos-df">DF</span>';
  if(/^(CM|DM|LM|RM|MF|ML|MR|AM)/.test(p)) return '<span class="mm-pos-badge mm-pos-mf">MF</span>';
  if(/^(F|ST|FW|LW|RW|LF|RF|CF|RCF|SS)/.test(p)) return '<span class="mm-pos-badge mm-pos-fw">FW</span>';
  return '<span class="mm-pos-badge mm-pos-sub">'+pos+'</span>';
}
function renderPlayerRow(p){
  var s=p.stats||{};
  // 교체 아웃 선수: 이름 아래에 교체 아이콘 + 시간 + 교체 선수 이름
  var nameCell=getPosBadge(p.position)+(p.name||'')+(p.jersey?' <span style="color:var(--text-dim);font-size:9px">#'+p.jersey+'</span>':'');
  if(p.subbedOut&&p.subTime){
    var subForName=p.subFor?p.subFor.name:'';
    var subForJersey=p.subFor&&p.subFor.jersey?p.subFor.jersey:'';
    nameCell+='<div style="display:flex;align-items:center;gap:4px;margin-top:3px;">'+
      '<svg viewBox="0 0 24 24" width="10" height="10" style="flex-shrink:0"><path d="M6.873 3.845l4.221 4.317 0.868-0.868-5.764-5.957-5.74 5.957 0.893 0.868 4.221-4.317v11.745h1.302zM23.66 15.999l-0.917-0.869-4.221 4.317v-11.769h-1.302v11.769l-4.197-4.317-0.965 0.869 5.789 5.932z" fill="#fff"/></svg>'+
      '<span style="font-size:9px;color:#FBBF24;font-weight:700;">'+p.subTime+'</span>'+
      (subForName?'<span style="font-size:9px;color:#fff;font-weight:700;"> '+subForName+'</span>':'')+
      (subForJersey?'<span style="font-size:9px;color:var(--text-dim);"> #'+subForJersey+'</span>':'')+
    '</div>';
  }
  return '<tr>'+
    '<td>'+nameCell+'</td>'+
    '<td>'+(s.goals||'-')+'</td>'+
    '<td>'+(s.assists||'-')+'</td>'+
    '<td>'+(s.shots||'-')+'</td>'+
    '<td>'+(s.shotsOnTarget||'-')+'</td>'+
    '<td>'+(s.fouls||'-')+'</td>'+
    '<td>'+(function(s){var y=parseInt(s.yellowCards)||0;var r=parseInt(s.redCards)||0;return r?'🟥':y?'🟨':'-';})(s)+'</td>'+
  '</tr>';
}
function renderPlayerTable(side, players, visible){
  if(!players||!players.length) return '';
  var style=visible?'margin-top:10px':'margin-top:10px;display:none';
  var starters=players.filter(function(p){return p.starter;});
  var subs=players.filter(function(p){return !p.starter;});
  var colgroup='<colgroup><col style="width:40%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:10%"><col style="width:10%"></colgroup>';
  var thead='<thead><tr><th>선수</th><th>골</th><th>도움</th><th>슈팅</th><th>유효</th><th>파울</th><th>경고</th></tr></thead>';
  var html='<div class="mm-section mm-players-'+side+'" style="'+style+'">';
  // 선발
  html+='<table class="mm-player-table">'+colgroup+thead+'<tbody>';
  starters.forEach(function(p){ html+=renderPlayerRow(p); });
  html+='</tbody></table>';
  // 교체
  if(subs.length){
    html+='<div class="mm-sub-title">Substitutes</div>';
    html+='<table class="mm-player-table">'+colgroup+thead+'<tbody>';
    subs.forEach(function(p){ html+=renderPlayerRow(p); });
    html+='</tbody></table>';
  }
  html+='</div>';
  return html;
}

function mmSwitchTab(side){
  document.querySelectorAll('.mm-tab').forEach(function(b){b.classList.remove('active');});
  var tb=document.getElementById('mm-tab-'+side);
  if(tb) tb.classList.add('active');
  // 피치 토글
  var ph=document.getElementById('mm-pitch-home');
  var pa=document.getElementById('mm-pitch-away');
  if(ph) ph.style.display=side==='home'?'':'none';
  if(pa) pa.style.display=side==='away'?'':'none';
  document.querySelectorAll('.mm-players-home,.mm-players-away').forEach(function(el){el.style.display='none';});
  var el=document.querySelector('.mm-players-'+side);
  if(el) el.style.display='block';
}

var _liveExpandTimers = {}; // matchId → {timer, progressTimer, startTime}
var LIVE_REFRESH_SEC = 30;

function openLiveExpand(m, panel){
  loadLiveExpand(m, panel);
}

function loadLiveExpand(m, panel){
  // 프로그레스바 + 매치 상세 로드
  var comp = m.competition&&m.competition.short || 'PL';
  var slug = comp==='UCL'?'uefa.champions':comp==='FAC'?'eng.fa':comp==='EFL'?'eng.league_cup':'eng.1';

  // 현재 활성 탭 기억
  var activeTab = 'events';
  var existing = document.getElementById('live-detail-'+m.id);
  if(existing){
    var activeBtn = existing.querySelector('.mm-tab.active');
    if(activeBtn){
      var tabMap={'골&이벤트':'events','팀 스탯':'stats','라인업':'lineup','선수 스탯':'players'};
      activeTab = tabMap[activeBtn.textContent] || 'events';
    }
  }

  panel.innerHTML =
    '<div id="live-detail-'+m.id+'"><div style="color:var(--text-dim);font-size:11px;text-align:center;padding:16px">로딩 중...</div></div>';

  // 매치 상세 API 호출
  var matchApiUrl = FN+'/match?id='+m.id+'&slug='+slug;
  (window.apiFetch||apiFetch)(matchApiUrl).then(function(data){
    var el = document.getElementById('live-detail-'+m.id);
    if(!el) return;
    el.innerHTML = buildLiveDetail(data);
    // 이전 활성 탭 복원
    if(activeTab !== 'events'){
      var btn = el.querySelector('[data-tab="'+activeTab+'"]');
      if(btn) liveSwitchTab(btn, activeTab);
    }
    // 내부 팀탭 side 복원
    if(activeSide === 'away'){
      setTimeout(function(){
        var activePanel = el.querySelector('.live-tab-panel:not([style*="none"]),.live-tab-panel:not([style])');
        if(activePanel){
          var sideBtn = activePanel.querySelector('[data-side="away"]');
          if(sideBtn) sideBtn.click();
        }
      }, 50);
    }
  }).catch(function(e){
    var el = document.getElementById('live-detail-'+m.id);
    if(el) el.innerHTML = '<div style="color:var(--text-dim);font-size:11px;text-align:center;padding:16px">데이터를 불러올 수 없어요</div>';
  });

  // 프로그레스바 시작
  startProgressBar(m.id);
}

function startProgressBar(matchId){
  var state = _liveExpandTimers[matchId];
  if(!state) return;
  if(state.progressTimer) clearInterval(state.progressTimer);
  state.startTime = Date.now();
  state.progressTimer = setInterval(function(){
    var barEl = document.getElementById('lpb-'+matchId);
    var lblEl = document.getElementById('lpl-'+matchId);
    if(!barEl || !lblEl){ return; }
    var elapsed = (Date.now() - state.startTime) / 1000;
    var remaining = Math.max(0, LIVE_REFRESH_SEC - elapsed);
    var pct = (remaining / LIVE_REFRESH_SEC) * 100;
    barEl.style.width = pct + '%';
    lblEl.textContent = Math.ceil(remaining) + 's';
  }, 500);
}

function startLiveExpandPolling(m, panel){
  stopLiveExpandPolling(m.id);
  _liveExpandTimers[m.id] = {};
  var timer = setInterval(function(){
    var p = document.getElementById('live-expand-'+m.id);
    if(!p || !p.classList.contains('open')){
      stopLiveExpandPolling(m.id); return;
    }
    if(document.hidden) return;
    var comp = m.competition&&m.competition.short || 'PL';
    var slug = comp==='UCL'?'uefa.champions':comp==='FAC'?'eng.fa':comp==='EFL'?'eng.league_cup':'eng.1';
    // 매치 상세 갱신
    var elPoll = document.getElementById('live-detail-'+m.id);
    var activeTabPoll = 'events';
    var activeSidePoll = 'home';
    if(elPoll){
      var ab = elPoll.querySelector('.mm-tab.active');
      if(ab){ activeTabPoll = ab.getAttribute('data-tab') || 'events'; }
      var activePanel2 = elPoll.querySelector('.live-tab-panel:not([style*="none"])') || elPoll.querySelector('.live-tab-panel');
      if(activePanel2){
        var asb = activePanel2.querySelector('.mm-tab.active[data-side]');
        if(asb) activeSidePoll = asb.getAttribute('data-side') || 'home';
      }
    }
    (window.apiFetch||apiFetch)(FN+'/match?id='+m.id+'&slug='+slug+'&nocache=1').then(function(data){
      var el = document.getElementById('live-detail-'+m.id);
      if(!el) return;
      el.innerHTML = buildLiveDetail(data);
      if(activeTabPoll !== 'events'){
        var btn = el.querySelector('[data-tab="'+activeTabPoll+'"]');
        if(btn) liveSwitchTab(btn, activeTabPoll);
      }
      if(activeSidePoll === 'away'){
        setTimeout(function(){
          var activePanel = el.querySelector('.live-tab-panel:not([style*="none"]),.live-tab-panel:not([style])');
          if(activePanel){
            var sideBtn = activePanel.querySelector('[data-side="away"]');
            if(sideBtn) sideBtn.click();
          }
        }, 50);
      }
    }).catch(function(){});
    // 프로그레스바 리셋
    startProgressBar(m.id);
  }, LIVE_REFRESH_SEC * 1000);
  _liveExpandTimers[m.id].timer = timer;
}

function stopLiveExpandPolling(matchId){
  var state = _liveExpandTimers[matchId];
  if(state){
    if(state.timer) clearInterval(state.timer);
    if(state.progressTimer) clearInterval(state.progressTimer);
    delete _liveExpandTimers[matchId];
  }
}

  }
  h += '</div>';

  return h;
}

function liveSwitchSide(btn, panelId, side){
  var tabRow = btn.parentElement;
  tabRow.querySelectorAll('.mm-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  // 부모 live-tab-panel 찾기
  var panel = tabRow;
  while(panel && !panel.classList.contains('live-tab-panel')) panel = panel.parentElement;
  if(!panel) return;
  panel.querySelectorAll('.live-side-panel').forEach(function(p){
    var suffix = p.getAttribute('data-suffix')||'';
    p.style.display = suffix.endsWith('-'+side) ? '' : 'none';
  });
}

function liveSwitchTab(btn, panel){
  var tabRow = btn.parentElement;
  var container = tabRow.parentElement;
  // 탭 버튼 active 토글
  tabRow.querySelectorAll('.mm-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  // 패널 표시 토글 (탭 행 다음 형제들)
  var panels = container.querySelectorAll('.live-tab-panel');
  var idx = ['events','stats','lineup','players'].indexOf(panel);
  panels.forEach(function(p,i){p.style.display=(i===idx)?'':'none';});
}
