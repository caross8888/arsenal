<!DOCTYPE html>
<html lang="ko">
<head><!-- Arsenal FC Dashboard v2 -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#EF0107">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arsenal">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="https://a.espncdn.com/i/teamlogos/soccer/500/359.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Arsenal FC · The Gunners Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{color-scheme:dark;--red:#EF0107;--red-dark:#b50004;--gold:#C8A84B;--navy:#0B0D12;--surface:#111318;--surface2:#181B22;--surface3:#1F2330;--border:rgba(255,255,255,0.07);--border-accent:rgba(200,168,75,0.3);--text:#F0F2F7;--text-muted:#7A8099;--text-dim:#4A5070;--green:#22C55E;--amber:#F59E0B;--fd:'Bebas Neue',sans-serif;--fb:'Noto Sans KR',sans-serif;--fm:'Fira Mono',monospace;--safe-bottom:env(safe-area-inset-bottom,0px);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--navy);color:var(--text);font-family:var(--fb);font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden;padding-bottom:calc(64px + var(--safe-bottom));}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(239,1,7,.1) 0%,transparent 60%);pointer-events:none;z-index:0}
.top-header{background:rgba(11,13,18,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:10px}
.logo-svg{width:34px;height:34px;flex-shrink:0}
.brand-text .name{font-family:var(--fd);font-size:20px;letter-spacing:3px;color:var(--red);line-height:1}
.brand-text .sub{font-size:8px;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(11,13,18,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;gap:4px;background:none;border:none;color:var(--text-dim);font-family:var(--fb);font-size:9px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:color .2s;position:relative;-webkit-tap-highlight-color:transparent;}
.nav-btn.active{color:var(--gold)}.nav-btn.active .nav-icon{color:var(--red)}
.nav-icon{font-size:18px;line-height:1}
.nav-live-dot{position:absolute;top:8px;right:calc(50% - 16px);width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s infinite}
.page{position:relative;z-index:1}
.section{display:none;padding:16px;max-width:600px;margin:0 auto}
.section.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.sec-title{font-family:var(--fd);font-size:30px;letter-spacing:3px}
.sec-badge{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);background:rgba(200,168,75,.12);border:1px solid var(--border-accent);padding:3px 9px;border-radius:20px}
.sec-badge.live{color:var(--green);background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);animation:pulse 2s infinite}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);font-weight:700}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:10px;color:var(--text-muted);font-size:12px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:14px 16px;font-size:12px;color:#F87171;display:flex;align-items:center;gap:8px}
.fix-section-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;margin-top:6px;padding-left:2px}
.fix-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.fix-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;}
.fix-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.fix-card.upcoming::before{background:var(--gold)}
.fix-card.live-match::before{background:var(--green)}
.fix-card.finished::before{background:var(--surface3)}
.fix-grid{display:grid;grid-template-columns:1fr 68px 1fr;grid-template-rows:auto auto;gap:2px 4px;align-items:center;padding:2px 0}
.fix-z1{grid-column:1;grid-row:1;display:flex;align-items:center;}
.fix-z2{grid-column:1;grid-row:2;display:flex;align-items:center;}
.fix-z3top{grid-column:2;grid-row:1;display:flex;align-items:center;justify-content:center;}
.fix-z3bot{grid-column:2;grid-row:2;display:flex;align-items:stretch;justify-content:center;}
.fix-z4{grid-column:3;grid-row:1;display:flex;align-items:center;justify-content:flex-end;}
.fix-z5{grid-column:3;grid-row:2;display:flex;align-items:center;justify-content:flex-end;}
.fix-live-clock{text-align:center;font-size:10px;font-weight:700;letter-spacing:1px;padding-top:4px;}
.comp-tag{display:inline-block;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:4px;flex-shrink:0}
.tag-pl{background:rgba(55,0,255,.15);color:#A78BFA;border:1px solid rgba(167,139,250,.2)}
.tag-cl{background:rgba(0,80,200,.15);color:#60A5FA;border:1px solid rgba(96,165,250,.2)}
.tag-fa{background:rgba(200,168,75,.15);color:var(--gold);border:1px solid var(--border-accent)}
.tag-ec{background:rgba(239,100,7,.15);color:#FB923C;border:1px solid rgba(251,146,60,.2)}
.tag-oth{background:rgba(100,100,100,.15);color:var(--text-muted);border:1px solid var(--border)}
.fix-date{font-size:10px;color:var(--text-muted);font-family:var(--fm);flex-shrink:0}
.fix-date.live-tag{color:var(--green);font-weight:700}
.fix-team-home{display:flex;align-items:center;gap:8px}
.fix-team-away{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.t-crest{width:30px;height:30px;border-radius:50%;object-fit:contain;background:var(--surface3);border:1px solid var(--border);padding:3px;flex-shrink:0}
.t-crest-ph{width:30px;height:30px;border-radius:50%;background:var(--surface3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:9px;color:var(--text-muted);flex-shrink:0}
.t-crest-ph.afc{background:rgba(239,1,7,.15);border-color:rgba(239,1,7,.4);color:var(--red)}
.t-name-home{font-weight:700;font-size:12px;line-height:1.3;min-width:0;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word}
.t-name-away{font-weight:700;font-size:12px;line-height:1.3;min-width:0;overflow:hidden;text-align:right;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word}
.fix-score-box{text-align:center;flex-shrink:0;width:68px;display:flex;align-items:center;justify-content:center;}
.fix-score{font-family:var(--fd);font-size:24px;letter-spacing:3px;line-height:1;color:var(--text)}
.fix-vs{font-family:var(--fd);font-size:16px;letter-spacing:2px;color:var(--text-dim);line-height:1;display:block;}
.fix-round-text{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);}
.fix-round-final{color:#D4AF37;font-weight:700;}
.fix-venue{font-size:10px;color:var(--text-dim);text-align:center}
.std-hdr,.std-row{display:grid;grid-template-columns:22px 1fr 24px 24px 24px 24px 36px;gap:4px;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px}
.std-row:last-child{border-bottom:none}
.std-row.afc-row{background:rgba(239,1,7,.05)}
.std-row.afc-row .std-pos{color:var(--red);font-weight:700}
.std-hdr{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim)}
.std-pos{font-family:var(--fm);font-size:11px;color:var(--text-muted)}
.std-team{font-weight:500;display:flex;align-items:center;gap:6px;font-size:12px;min-width:0}
.std-team span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.std-crest{width:16px;height:16px;border-radius:50%;object-fit:contain;border:1px solid var(--border);flex-shrink:0}
.std-s{font-family:var(--fm);color:var(--text-muted);text-align:center;font-size:11px}
.std-pts{font-family:var(--fm);font-weight:700;color:var(--text);text-align:right;font-size:12px}
.more-btn{width:100%;padding:12px;border:none;background:var(--surface2);color:var(--text-muted);font-family:var(--fb);font-size:11px;letter-spacing:1px;cursor:pointer;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px;transition:background .2s,color .2s;-webkit-tap-highlight-color:transparent;}
.more-btn:hover{background:var(--surface3);color:var(--text)}
.f-btns{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.f-btns
::-webkit-scrollbar{display:none}
.f-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font-family:var(--fb);font-size:11px;padding:6px 14px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.f-btn.active{background:var(--red);border-color:var(--red);color:#fff}
.sq-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.pl-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s}
.pl-card:active{transform:scale(.98)}
.pl-top{display:grid;grid-template-columns:70px 1fr;height:90px}
.pl-left{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.pl-left.fw{background:rgba(239,1,7,.75)}
.pl-left.mf{background:rgba(34,197,94,.60)}
.pl-left.df{background:rgba(59,130,246,.60)}
.pl-left.gk{background:rgba(234,179,8,.65)}
.pl-pos-txt{font-size:10px;font-weight:800;letter-spacing:1.5px;color:rgba(255,255,255,.95);text-transform:uppercase}
.pl-num-txt{font-family:var(--fd);font-size:32px;font-weight:900;line-height:1;color:#fff;opacity:.95}
.pl-photo-box{width:100%;height:90px;overflow:hidden;background:var(--surface3)}
.pl-photo-box img{width:100%;height:100%;object-fit:contain;object-position:top center;display:block}
.pl-photo-box.no-img{display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:18px}
.pl-card-divider{height:1px;background:var(--border)}
.pl-card-name{padding:7px 8px;font-size:11px;font-weight:700;letter-spacing:.5px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.inj-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border)}
.inj-row:last-child{border-bottom:none}
.inj-pos-badge{width:38px;height:38px;border-radius:50%;background:var(--surface3);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:11px;color:var(--text-muted)}
.inj-info{flex:1;min-width:0}
.inj-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inj-detail{font-size:11px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inj-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.inj-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap}
.inj-injury{background:rgba(239,68,68,.15);color:#F87171;border:1px solid rgba(239,68,68,.3)}
.inj-doubt{background:rgba(245,158,11,.15);color:#FCD34D;border:1px solid rgba(245,158,11,.3)}
.inj-miss{background:rgba(120,120,120,.15);color:var(--text-muted);border:1px solid var(--border)}
.inj-chance{font-size:10px;color:var(--text-dim)}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px}
.sum-stat{background:var(--surface2);border-radius:10px;padding:14px;text-align:center}
.sum-val{font-family:var(--fd);font-size:36px;line-height:1}
.sum-val.r{color:var(--red)}.sum-val.a{color:var(--amber)}.sum-val.g{color:var(--green)}
.sum-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-top:4px}
.news-list{display:flex;flex-direction:column;gap:10px}
.news-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;text-decoration:none;display:block;color:inherit;-webkit-tap-highlight-color:transparent}
.news-card:active{opacity:.85}
.news-img{height:160px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--surface2),var(--surface3))}
.news-img img{width:100%;height:100%;object-fit:cover;display:block}
.news-img-ph{height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;color:rgba(239,1,7,.15)}
.news-src-badge{position:absolute;top:10px;left:10px;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:var(--red);color:#fff;font-weight:700}
.news-body{padding:12px 14px}
.news-hl{font-weight:700;font-size:13px;line-height:1.4;margin-bottom:6px;color:var(--text)}
.news-ex{font-size:12px;color:var(--text-muted);line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-foot{display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim)}
.live-setup{background:var(--surface);border:1px solid var(--border-accent);border-radius:12px;padding:16px;margin-bottom:16px}
.live-setup-title{font-weight:700;font-size:13px;margin-bottom:4px}
.live-setup-sub{font-size:11px;color:var(--text-muted);margin-bottom:14px}
.auto-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);padding:4px 10px;border-radius:20px;margin-bottom:12px}
.key-row{display:flex;gap:8px}
.key-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:var(--fm);font-size:12px;outline:none}
.key-input:focus{border-color:var(--red)}
.key-input::placeholder{color:var(--text-dim)}
.key-btn{background:var(--red);border:none;border-radius:8px;padding:10px 16px;color:#fff;font-family:var(--fb);font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap}
.key-status{margin-top:8px;font-size:11px;padding:7px 12px;border-radius:6px;display:none}
.key-status.ok{display:flex;align-items:center;gap:6px;background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.key-status.err{display:flex;align-items:center;gap:6px;background:rgba(239,68,68,.1);color:#F87171;border:1px solid rgba(239,68,68,.2)}
.wgt-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.wgt-tabs::-webkit-scrollbar{display:none}
.wgt-tab{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-family:var(--fb);font-size:10px;padding:6px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.wgt-tab.active{background:rgba(239,1,7,.15);border-color:rgba(239,1,7,.4);color:var(--red)}
.widget-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;min-height:240px}
.widget-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;text-align:center;gap:12px}
.wp-icon{font-size:36px;opacity:.25}
.wp-title{font-family:var(--fd);font-size:18px;letter-spacing:2px;color:var(--text-muted)}
.wp-desc{font-size:11px;color:var(--text-dim);max-width:240px;line-height:1.6}
.widget-iframe-wrap{display:none;width:100%}
.widget-iframe-wrap iframe{width:100%;min-height:420px;border:none;display:block}
.more-fix-btn{width:100%;padding:10px;margin-top:6px;border:1px dashed var(--border);background:transparent;color:var(--text-muted);font-family:var(--fb);font-size:11px;border-radius:10px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.more-fix-btn:hover{background:var(--surface2);color:var(--text);}

/* PLAYER MODAL - Fotmob style */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
.modal-overlay.open{display:flex;}
.modal-sheet{background:#1a1c22;border-radius:20px 20px 0 0;width:100%;max-width:540px;max-height:92vh;overflow:hidden;animation:slideUp .28s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;}.modal-sheet-inner{overflow-y:auto;flex:1;padding-bottom:32px;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:10px auto 0;}
.modal-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:2;}
/* 헤더 */
.pm-header{background:linear-gradient(135deg,#bd0510 0%,#7a0010 100%);padding:20px 16px 18px;position:sticky;top:0;z-index:10;}
.pm-header-inner{display:flex;gap:14px;align-items:center;}
.pm-photo{width:68px;height:68px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.3);flex-shrink:0;}
.pm-photo-ph{width:68px;height:68px;border-radius:50%;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:22px;color:#fff;flex-shrink:0;}
.pm-name{font-family:var(--fd);font-size:22px;color:#fff;letter-spacing:1px;line-height:1.1;}
.pm-club{font-size:12px;color:rgba(255,255,255,.75);margin-top:3px;display:flex;align-items:center;gap:5px;}
.pm-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border-radius:20px;padding:2px 8px;font-size:10px;color:rgba(255,255,255,.85);margin-top:5px;}
/* 기본정보 그리드 */
.pm-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid rgba(255,255,255,.06);}
.pm-info-cell{padding:12px 16px;border-right:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06);}
.pm-info-cell:nth-child(2n){border-right:none;}
.pm-info-val{font-size:15px;font-weight:700;color:#fff;margin-bottom:2px;}
.pm-info-lbl{font-size:10px;color:rgba(255,255,255,.4);}
/* 선수 특성 (레이더) */
.pm-traits{padding:16px 16px 8px;}
.pm-section-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:4px;}
.pm-section-sub{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:14px;}
.pm-radar-wrap{display:flex;justify-content:center;position:relative;}

.fm-stat-cell{background:#1a1c22;padding:12px 8px;text-align:center;}

.pl-modal-name{font-family:var(--fd);font-size:26px;letter-spacing:2px;line-height:1.1;}

.pl-modal-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;margin-top:6px;}

.mm-tab-row{display:flex;gap:6px;padding:12px 16px 0;}
.mm-tab{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-family:var(--fb);font-size:10px;padding:5px 12px;border-radius:20px;cursor:pointer;}

.sns-list{display:flex;flex-direction:column;gap:10px}

  var d=new Date(utcDate);
  var diff=Math.round((d-Date.now())/86400000);
  var date=d.toLocaleDateString('ko-KR',{month:'short',day:'numeric',weekday:'short'});
  if(tbd==='postponed') return date+' 연기';
  if(tbd==='canceled')  return date+' 취소';
  var time=tbd==='tbd'?'시간미정':d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false});
  if(diff===0) return '\uc624\ub298 '+time;
  if(diff===1) return '\ub0b4\uc77c '+time;
  if(diff>1&&diff<8) return date+' '+time;
  if(diff>=8) return date+' '+time;
  if(diff===-1) return '\uc5b4\uc81c';
  return date+' '+time;
}

function makeCrest(team,isArs){
  var short=(team.shortName||team.name||'').substring(0,3).toUpperCase();
  var phCls='t-crest-ph'+(isArs?' afc':'');
  if(team.crest) return {type:'crest',src:team.crest,alt:team.shortName||'',phCls:phCls,short:short};
  return {type:'ph',phCls:phCls,short:short};
}
function renderCrest(c){
  if(c.type==='crest'){
    var img=document.createElement('img');
    img.className='t-crest';img.src=c.src;img.alt=c.alt;
    img.onerror=function(){var ph=document.createElement('div');ph.className=c.phCls;ph.textContent=c.short;this.parentNode.replaceChild(ph,this);};
    return img;
  }
  var ph=document.createElement('div');ph.className=c.phCls;ph.textContent=c.short;return ph;
}

function buildFixCard(m){
  var ARSENAL_ESPN='359';
  var isArsHome=m.homeTeam&&(m.homeTeam.id===57||m.homeTeam.id===ARSENAL_ESPN||(m.homeTeam.name||'').includes('Arsenal'));
  var isLive=m.status==='IN_PLAY'||m.status==='PAUSED';
  var isDone=m.status==='FINISHED';
  var compObj=m.competition||{};
  var code=(compObj.short)||m.competitionCode||'PL';
  var compName=(compObj.name)||code;
  var hs=m.score&&m.score.fullTime?m.score.fullTime.home:null;
  var as_=m.score&&m.score.fullTime?m.score.fullTime.away:null;
  var hasScore=hs!==null&&hs!==undefined&&isDone;
  var resultCls=''; var resultBg='';
  if(isDone&&hasScore){
    var arsS=isArsHome?hs:as_; var oppS=isArsHome?as_:hs;
    if(arsS>oppS){resultCls='result-win';resultBg='rgba(34,197,94,0.08)';}
    else if(arsS===oppS){resultCls='result-draw';resultBg='rgba(245,158,11,0.08)';}
    else{resultCls='result-loss';resultBg='rgba(239,68,68,0.08)';}
  }
  var card=document.createElement('div');
  card.className='fix-card '+(isLive?'live-match':isDone?'finished '+resultCls:'upcoming');
  if(resultBg) card.style.background=resultBg;

  // 5레이어 grid 구조
  var grid=document.createElement('div');grid.className='fix-grid';

  // 좌상단: 대회 태그
  var z1=document.createElement('div');z1.className='fix-z1';
  var ct=document.createElement('span');ct.className='comp-tag '+ctag(code);ct.textContent=cname(code,compName);
  z1.appendChild(ct);

  // 좌하단: 홈팀
  var z2=document.createElement('div');z2.className='fix-z2';
  var hd=document.createElement('div');hd.className='fix-team-home';
  hd.appendChild(renderCrest(makeCrest(m.homeTeam,isArsHome)));
  var hn=document.createElement('div');hn.className='t-name-home';
  hn.textContent=m.homeTeam.shortName||m.homeTeam.displayName||m.homeTeam.name||'';
  hd.appendChild(hn);z2.appendChild(hd);

  // 중앙 상단: 라운드
  var z3top=document.createElement('div');z3top.className='fix-z3top';
  if(m.round&&ROUND_LABEL[m.round]){
    var rl=document.createElement('div');rl.className='fix-round-text'+(m.round==='final'?' fix-round-final':'');
    rl.textContent=ROUND_LABEL[m.round];z3top.appendChild(rl);
  }

  // 중앙 하단: VS/스코어
  var z3bot=document.createElement('div');z3bot.className='fix-z3bot';
  var sb=document.createElement('div');sb.className='fix-score-box';
  if(hasScore){
    var sd=document.createElement('div');sd.className='fix-score';
    var arsS2=isArsHome?hs:as_; var oppS2=isArsHome?as_:hs;
    sd.style.color=arsS2>oppS2?'#22C55E':arsS2===oppS2?'#F59E0B':'#EF4444';
    sd.textContent=hs+' : '+as_;sb.appendChild(sd);
  } else if(isLive){
    var ld=document.createElement('div');ld.className='fix-score';ld.style.color='#22C55E';
    ld.textContent=(hs||0)+' : '+(as_||0);sb.appendChild(ld);
  } else {
    var vd=document.createElement('div');vd.className='fix-vs';vd.textContent='VS';sb.appendChild(vd);
  }
  z3bot.appendChild(sb);

  // 우상단: 날짜
  var z4=document.createElement('div');z4.className='fix-z4';
  var ds=document.createElement('span');ds.className='fix-date'+(isLive?' live-tag':'');
  ds.textContent=isLive?'● LIVE':formatDate(m.utcDate||m.date,m.tbd);
  z4.appendChild(ds);

  // 우하단: 어웨이팀
  var z5=document.createElement('div');z5.className='fix-z5';
  var ad=document.createElement('div');ad.className='fix-team-away';
  var an=document.createElement('div');an.className='t-name-away';
  an.textContent=m.awayTeam.shortName||m.awayTeam.displayName||m.awayTeam.name||'';
  ad.appendChild(an);ad.appendChild(renderCrest(makeCrest(m.awayTeam,!isArsHome)));
  z5.appendChild(ad);

  grid.appendChild(z1);grid.appendChild(z3top);grid.appendChild(z4);
  grid.appendChild(z2);grid.appendChild(z3bot);grid.appendChild(z5);
  card.appendChild(grid);
  if(isLive){
    var clk=document.createElement('div');
    clk.className='fix-live-clock';
    clk.style.color=m.isHT?'#F59E0B':'#22C55E';
    clk.textContent=m.isHT?'HT':(m.clock||'');
    card.appendChild(clk);
  }
  if(m.venue){var v=document.createElement('div');v.className='fix-venue';v.textContent=m.venue;card.appendChild(v);}
  if(isDone && m.id){
    card.style.cursor='pointer';
    card.onclick=function(){openMatchModal(m);};
  }
  return card;
}

function loadFixtures(){
  var upEl=document.getElementById('upcomingList');
  var fnEl=document.getElementById('finishedList');
  var badge=document.getElementById('fixBadge');
  apiFetch(FN+'/football?type=fixtures').then(function(data){
    badge.textContent='ESPN';
    var finishedAll=(data.finished||[]).slice().reverse(); // 최신순
    var upcomingAll=data.upcoming||[];
    // PL 경기 날짜순 정렬 후 유효한 경기에만 라운드 번호 부여 (연기/취소 제외)
    var allPL=[...(data.finished||[]),...(data.upcoming||[])]
      .filter(function(m){return m.competition&&m.competition.short==='PL';})
      .sort(function(a,b){return new Date(a.utcDate)-new Date(b.utcDate);});
    var round=1;
    allPL.forEach(function(m){
      if(m.tbd==='postponed'||m.tbd==='canceled'){m.round=null;return;}
      m.round='pl'+round;
      ROUND_LABEL['pl'+round]=round+'라운드';
      round++;
    });
    function renderList(el,showList,allList){
      el.innerHTML='';
      if(!showList.length){el.innerHTML='<div style="color:var(--text-dim);font-size:12px;padding:12px 4px">데이터 없음</div>';return;}
      var expanded=false;
      showList.forEach(function(m){el.appendChild(buildFixCard(m));});
      if(allList.length>showList.length){
        var btn=document.createElement('button');btn.className='more-fix-btn';
        btn.textContent='↓ 더보기 ('+(allList.length-showList.length)+'개 더)';
        btn.onclick=function(){
          if(!expanded){expanded=true;el.innerHTML='';
            allList.forEach(function(m){el.appendChild(buildFixCard(m));});
            var col=document.createElement('button');col.className='more-fix-btn';
            col.textContent='↑ 접기';
            col.onclick=function(){expanded=false;renderList(el,showList,allList);};
            el.appendChild(col);}
        };el.appendChild(btn);}
    }
    renderList(upEl,upcomingAll.slice(0,3),upcomingAll);
    renderList(fnEl,finishedAll.slice(0,5),finishedAll);
    // 라이브 경기 있으면 폴링 시작
    if((data.matches||[]).some(function(m){return m.status==='IN_PLAY';})) startLivePolling();
    else stopLivePolling();
  }).catch(function(err){showErr(upEl,err.message);badge.textContent='오류';});
}

function renderSq(filter){
  var el=document.getElementById('sqGrid');
  var list=filter==='all'?allPlayers:allPlayers.filter(function(p){return p.posGroup===filter;});
  if(!list.length){el.innerHTML='<div class="loading-state" style="grid-column:1/-1">선수 데이터 없음</div>';return;}
  el.innerHTML='';

  // positionKey → 포지션 약자 변환
  var POS_SHORT={
    'keeper_long':'GK','goalkeeper':'GK',
    'rightback':'RB','leftback':'LB','centerback':'CB','centreback':'CB',
    'right_wing_back':'RWB','left_wing_back':'LWB',
    'centermidfielder':'CM','centremidfielder':'CM',
    'centerdefensivemidfielder':'DM','centredefensivemidfielder':'DM','defensivemidfielder':'DM',
    'attackingmidfielder':'AM','centreattackingmidfielder':'AM',
    'rightmidfielder':'RM','leftmidfielder':'LM',
    'rightwinger':'RW','leftwinger':'LW','rightwing':'RW','leftwing':'LW',
    'right_wing_back':'RWB','left_wing_back':'LWB',
    'striker':'ST','centreforward':'ST','centerforward':'ST',
  };
  var POS_GROUP_CLS={GK:'gk',DF:'df',MF:'mf',FW:'fw'};

  list.forEach(function(p){
    var posKey=(p.position||'').toLowerCase().replace(/_/g,'').replace(/-/g,'').replace(/ /g,'');
    var posShort=POS_SHORT[posKey]||p.posGroup||'';
    var leftCls=POS_GROUP_CLS[p.posGroup]||'df';
    var jersey=p.jersey||'';
    if(!jersey&&window._espnPlayers){
      var fm=window._espnPlayers.find(function(f){return f.id===p.fotmobId||f.id===p.id;});
      if(fm&&fm.jersey) jersey=fm.jersey;
    }
    if(!jersey&&window._fotmobPlayers){
      var fm2=window._fotmobPlayers.find(function(f){return f.id===p.fotmobId||f.id===p.id;});
      if(fm2&&fm2.jersey) jersey=fm2.jersey;
    }

    var card=document.createElement('div');
    card.className='pl-card';
    card.style.outline='2px solid '+(POS_BORDER[p.posGroup]||'rgba(255,255,255,0.1)');
    card.style.outlineOffset='-1px';
    card.onclick=function(){openPlayerModal(p);};

    // 상단
    var top=document.createElement('div');top.className='pl-top';

    // 좌측 (포지션+번호)
    var left=document.createElement('div');left.className='pl-left '+leftCls;
    var posEl=document.createElement('span');posEl.className='pl-pos-txt';posEl.textContent=posShort;
    var numEl=document.createElement('span');numEl.className='pl-num-txt';numEl.textContent=jersey||'–';
    left.appendChild(posEl);left.appendChild(numEl);

    // 우측 (사진)
    var photoBox=document.createElement('div');
    if(p.photo){
      photoBox.className='pl-photo-box';
      var img=document.createElement('img');img.src=p.photo;img.alt=p.name;
      img.onerror=function(){
        photoBox.className='pl-photo-box no-img';
        photoBox.innerHTML='⚽';
        photoBox.removeChild(img);
      };
      photoBox.appendChild(img);
    } else {
      photoBox.className='pl-photo-box no-img';
      photoBox.textContent='⚽';
    }

    top.appendChild(left);top.appendChild(photoBox);

    // 구분선
    var div=document.createElement('div');div.className='pl-card-divider';

    // 이름
    var nm=document.createElement('div');nm.className='pl-card-name';nm.textContent=p.name;

    card.appendChild(top);card.appendChild(div);card.appendChild(nm);
    el.appendChild(card);
  });
}

function openMatchModal(m){

  var timer=setTimeout(function(){
    var sp=content.querySelector('.spinner');

  }, 10000);

  fetch(FN+'/match?id='+m.id+'&slug='+slug+'&_='+Date.now())

    .then(function(data){
      clearTimeout(timer);
      if(data.error) throw new Error(data.error);
      renderMatchModal(content, m, data);
    })

      clearTimeout(timer);
      var sp=content.querySelector('.spinner');
      var wrap=sp?sp.parentElement:content;

}

      var hvStr=h.stats[k]||'0'; var avStr=a.stats[k]||'0';

      var rawH=parseFloat((hvStr+'').replace('%',''))||0;
      var rawA=parseFloat((avStr+'').replace('%',''))||0;
      var isPct=k==='possessionPct'||(hvStr+'').includes('%');
      var total=isPct?100:(rawH+rawA||1);
      var homePct=Math.round(rawH/total*100); var awayPct=100-homePct;
      html+=
        '<div class="mm-stat-val home">'+hvStr+'</div>'+
        '<div class="mm-stat-label">'+(STAT_LABELS[k]||k)+'</div>'+
        '<div class="mm-stat-val away">'+avStr+'</div>'+

          '<div class="mm-stat-bar-home" style="width:'+homePct+'%"></div>'+
          '<div class="mm-stat-bar-away" style="width:'+awayPct+'%"></div>'+
        '</div>';
    });
    html+='</div></div>';
  }

  // 선수 스탯 탭
  var hP=(data.players&&data.players.home)||[];
  var aP=(data.players&&data.players.away)||[];
  if(hP.length||aP.length){
    // 라인업 피치
    var hFormation=data.players.homeFormation||'';
    var aFormation=data.players.awayFormation||'';
    html+='<div class="mm-tab-row">'+
      '<button class="mm-tab active" id="mm-tab-home" onclick="mmSwitchTab(&quot;home&quot;)">'+h.name+'</button>'+
      '<button class="mm-tab" id="mm-tab-away" onclick="mmSwitchTab(&quot;away&quot;)">'+a.name+'</button>'+
    '</div>';
    var hColor=(data.homeTeam&&data.homeTeam.color)||'#C8102E';
    var aColor=(data.awayTeam&&data.awayTeam.color)||'#1a3a6c';
    var hStarters=hP.filter(function(p){return p.starter&&p.formationPlace;});
    var aStarters=aP.filter(function(p){return p.starter&&p.formationPlace;});
    if(hStarters.length||aStarters.length){
      var hHeader='<div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:8px 14px 4px;"><span style="font-size:11px;color:rgba(255,255,255,0.5);">라인업</span><span style="font-size:13px;font-weight:700;color:#fff;">'+hFormation+'</span><span></span></div>';
      var aHeader='<div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:8px 14px 4px;"><span style="font-size:11px;color:rgba(255,255,255,0.5);">라인업</span><span style="font-size:13px;font-weight:700;color:#fff;">'+aFormation+'</span><span></span></div>';
      html+='<div class="mm-pitch-wrap" id="mm-pitch-home">'+hHeader+renderPitch(hStarters,hFormation,hColor,hP)+'</div>';
      html+='<div class="mm-pitch-wrap" id="mm-pitch-away" style="display:none">'+aHeader+renderPitch(aStarters,aFormation,aColor,aP)+'</div>';
    }
    html+=renderPlayerTable('home',hP,true)+renderPlayerTable('away',aP,false);
  }

  content.innerHTML=html;
}

function renderPitch(starters, formation, teamColor, allPlayers){
  var W=220, H=370;
  var FIRST_Y=29, LAST_Y=H-29;
  var r=11;
  var fillColor = teamColor||'#C8102E';

  var POS_PRIORITY = {
    'G':0,'GK':0,
    'CB':10,'CD':10,'CD-L':10,'CD-R':10,'LB':10,'RB':10,'LWB':10,'RWB':10,'SW':10,'DC':10,
    'DM':20,'CDM':20,
    'CM':30,'CM-L':30,'CM-R':30,'LM':30,'RM':30,'MF':30,'ML':30,'MR':30,
    'AM':40,'AM-L':40,'AM-R':40,'LAM':40,'RAM':40,'SS':40,
    'CF-L':50,'CF-R':50,'RCF':50,'LCF':50,
    'F':60,'ST':60,'FW':60,'LW':60,'RW':60,'LF':60,'RF':60,'CF':60,
  };
  var POS_ORDER = {
    'LB':-3,'LWB':-3,'LM':-3,
    'CD-L':-2,'CM-L':-2,'AM-L':-2,'CF-L':-2,'LF':-2,'LW':-2,'LAM':-2,
    'CD':-1,'CM':-1,'DM':-1,'AM':-1,'F':-1,'ST':-1,'CF':-1,'G':-1,'GK':-1,
    'CD-R':2,'CM-R':2,'AM-R':2,'CF-R':2,'RCF':2,'RF':2,'RW':2,'RAM':2,
    'RB':3,'RWB':3,'RM':3,
  };

  var rows = formation ? formation.split('-').map(Number) : [4,4,2];
  var expected = [1].concat(rows);

  var sorted = starters.slice().sort(function(a,b){
    var pa=POS_PRIORITY[a.position]!=null?POS_PRIORITY[a.position]:35;
    var pb=POS_PRIORITY[b.position]!=null?POS_PRIORITY[b.position]:35;
    return pa-pb;
  });

  var finalLines=[], idx=0;
  expected.forEach(function(cnt){
    var line=sorted.slice(idx,idx+cnt);
    line.sort(function(a,b){
      var oa=POS_ORDER[a.position]!=null?POS_ORDER[a.position]:0;
      var ob=POS_ORDER[b.position]!=null?POS_ORDER[b.position]:0;
      return oa-ob;
    });
    finalLines.push(line);
    idx+=cnt;
  });

  var totalLines=finalLines.length;
  var coords={};
  finalLines.forEach(function(line,li){
    if(!line.length) return;
    var yRatio=totalLines<=1?0:li/(totalLines-1);
    var cy=Math.round(LAST_Y-yRatio*(LAST_Y-FIRST_Y));
    line.forEach(function(p,ci){
      coords[p.formationPlace]={x:Math.round((W/(line.length+1))*(ci+1)),y:cy};
    });
  });

  // 교체된 선수 맵 (subbedOut 선수 formationPlace 기준)
  var subbedOutMap={};
  if(allPlayers){
    allPlayers.forEach(function(p){
      if(p.subbedOut&&p.formationPlace) subbedOutMap[p.formationPlace]=true;
    });
  }

  var svg='<svg class="mm-pitch-svg" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  svg+='<rect width="'+W+'" height="'+H+'" rx="4" fill="#2d5a27"/>';
  svg+='<line x1="0" y1="'+H/2+'" x2="'+W+'" y2="'+H/2+'" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
  svg+='<circle cx="'+W/2+'" cy="'+H/2+'" r="28" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
  svg+='<circle cx="'+W/2+'" cy="'+H/2+'" r="2" fill="rgba(255,255,255,0.4)"/>';
  var bw=W*0.55,bh=32,bx=(W-bw)/2;
  svg+='<rect x="'+bx+'" y="'+(H-bh)+'" width="'+bw+'" height="'+bh+'" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
  svg+='<rect x="'+bx+'" y="0" width="'+bw+'" height="'+bh+'" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
  var pr=18,pcx=W/2;
  svg+='<path d="M '+(pcx-pr)+' '+(H-bh)+' A '+pr+' '+pr+' 0 0 0 '+(pcx+pr)+' '+(H-bh)+'" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
  svg+='<path d="M '+(pcx-pr)+' '+bh+' A '+pr+' '+pr+' 0 0 1 '+(pcx+pr)+' '+bh+'" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';


  starters.forEach(function(p){
    var c=coords[p.formationPlace]; if(!c) return;
    var lastName=(p.name||'').split(' ').pop();
    var wasSubbed=subbedOutMap[p.formationPlace];
    // 원
    svg+='<circle cx="'+c.x+'" cy="'+c.y+'" r="'+r+'" fill="'+fillColor+'" opacity="'+(wasSubbed?'0.55':'1')+'"/>';
    // 등번호
    svg+='<text x="'+c.x+'" y="'+c.y+'" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="700" fill="#fff" font-family="sans-serif">'+p.jersey+'</text>';
    // 이름
    svg+='<text x="'+c.x+'" y="'+(c.y+r+1)+'" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.85)" font-family="sans-serif">'+lastName+'</text>';
    // 교체 화살표 (빨간 아래 화살표)
    if(wasSubbed){
      var ax=c.x+r-2, ay=c.y-r+2;
      svg+='<polygon points="'+ax+','+(ay+5)+' '+(ax-4)+','+ay+' '+(ax+4)+','+ay+'" fill="#EF4444"/>';
      svg+='<rect x="'+(ax-1.5)+'" y="'+(ay-5)+'" width="3" height="5" fill="#EF4444"/>';
    }
  });
  svg+='</svg>';
  return svg;
}
function renderPlayerTable(side, players, visible){
  if(!players||!players.length) return '';
  var style=visible?'margin-top:10px':'margin-top:10px;display:none';
  var html='<div class="mm-section mm-players-'+side+'" style="'+style+'">'+

var _liveTimer = null;
function startLivePolling(){
  if(_liveTimer) return;
  _liveTimer = setInterval(function(){
    if(document.hidden) return; // 백그라운드면 스킵
    apiFetch(FN+'/football?type=fixtures&nocache=1').then(function(data){
      var hasLive = (data.matches||[]).some(function(m){return m.status==='IN_PLAY';});
      var upEl = document.getElementById('upcomingList');
      var fnEl = document.getElementById('finishedList');
      if(upEl && fnEl){
        var finishedAll = (data.finished||[]).slice().reverse();
        var upcomingAll = data.upcoming||[];
        // PL 라운드 재계산
        var allPL=[...(data.finished||[]),...(data.upcoming||[])]
          .filter(function(m){return m.competition&&m.competition.short==='PL';})
          .sort(function(a,b){return new Date(a.utcDate)-new Date(b.utcDate);});
        var round=1;
        allPL.forEach(function(m){
          if(m.tbd==='postponed'||m.tbd==='canceled'){m.round=null;return;}
          m.round='pl'+round; ROUND_LABEL['pl'+round]=round+'라운드'; round++;
        });
        renderList(upEl, upcomingAll.slice(0,3), upcomingAll);
        renderList(fnEl, finishedAll.slice(0,5), finishedAll);
      }
      if(!hasLive) stopLivePolling();
    }).catch(function(){});
  }, 30000);
}
function stopLivePolling(){
  if(_liveTimer){clearInterval(_liveTimer);_liveTimer=null;}
}

  var startYear = month >= 8 ? year : year - 1;
  var short1 = String(startYear).slice(2);
  var short2 = String(startYear + 1).slice(2);
  return short1 + '-' + short2;
}

  } else {
    h += '<div class="pm-photo-ph">'+pos+'</div>';
  }
  h += '<div>';
  h += '<div class="pm-name">'+p.name+'</div>';
  h += '<div class="pm-club">';
  h += '<img src="https://crests.football-data.org/57.png" style="width:16px;height:16px;border-radius:50%"> Arsenal FC';
  h += '</div>';
  var badges = [];
  if(jersey) badges.push('#'+jersey);
  if(posLabel) badges.push(posLabel);
  if(age) badges.push(age+'\uc138');
  if(badges.length){
    h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">';
    badges.forEach(function(b){ h += '<span class="pm-badge">'+b+'</span>'; });
    h += '</div>';
  }
  // 평점 계산 (competitions 집계)
  var hdrRating = '-'; var hdrRatingColor = 'rgba(255,255,255,0.5)';
  if(Object.keys(competitions).length > 0){
    var rSum=0,rCnt=0;
    Object.values(competitions).forEach(function(c){if(c.avgRating){rSum+=c.avgRating;rCnt++;}});
    if(rCnt>0){
      hdrRating=(rSum/rCnt).toFixed(1);
      hdrRatingColor=parseFloat(hdrRating)>=8?'#22C55E':parseFloat(hdrRating)>=7?'#84CC16':parseFloat(hdrRating)>=6?'#F59E0B':'rgba(255,255,255,0.7)';
    }
  }
  h += '<div style="position:absolute;right:16px;bottom:18px;text-align:center;line-height:1">';
  h += '<div style="font-size:36px;font-weight:900;font-family:var(--fd);color:'+hdrRatingColor+'">'+hdrRating+'</div>';
  h += '</div>';
  h += '</div></div></div>';

  // ── 기본 정보 그리드 ──
  var infoItems = [];
  if(height) infoItems.push({val:height, lbl:'\ud0a4'});
  if(flagUrl) infoItems.push({val:'<img src="'+flagUrl+'" style="width:22px;height:16px;border-radius:2px;object-fit:cover;vertical-align:middle"> '+nationality, lbl:'\uad6d\uac00', html:true});
  if(prefFoot) infoItems.push({val:prefFoot==='Right'?'\uc624\ub978\ubc1c':prefFoot==='Left'?'\uc67c\ubc1c':prefFoot, lbl:'\uc8fc\uc0ac\uc6a9 \ubc1c'});
  if(contractEnd) infoItems.push({val:contractEnd, lbl:'\uacc4\uc57d \ub9cc\ub8cc'});
  // FPL 지표
  if(p.xG) infoItems.push({val:'xG '+p.xG.toFixed(1), lbl:'\uae30\ub300 \ub4dd\uc810 (PL)'});
  if(p.xA) infoItems.push({val:'xA '+p.xA.toFixed(1), lbl:'\uae30\ub300 \uc5b4\uc2dc\uc2a4\ud2b8 (PL)'});


  // ── 종합 스탯 집계 (기본정보 그리드에 삽입) ──
  if(Object.keys(competitions).length > 0){
    var tot = {goals:0,assists:0,appearances:0,minutes:0,cleanSheets:0,goalsConceded:0,ratingSum:0,ratingCnt:0};
    Object.values(competitions).forEach(function(c){
      tot.goals        += c.goals||0;
      tot.assists      += c.assists||0;
      tot.appearances  += c.appearances||0;
      tot.minutes      += c.minutesPlayed||0;
      tot.cleanSheets  += c.cleanSheets||0;
      tot.goalsConceded+= c.goalsConceded||0;
      if(c.avgRating){tot.ratingSum+=c.avgRating;tot.ratingCnt++;}
    });
    var totMins = tot.minutes>0 ? tot.minutes : '-';
    // 기본정보 그리드에 추가
    infoItems.push({val: tot.appearances>0?tot.appearances:'-', lbl:'경기'});
    infoItems.push({val: totMins, lbl:'출전시간'});
    if(pos==='GK'){
      infoItems.push({val: tot.cleanSheets>0?tot.cleanSheets:'-', lbl:'클린시트', color: tot.cleanSheets>0?'#22C55E':'#fff'});
      infoItems.push({val: tot.goalsConceded>=0?tot.goalsConceded:'-', lbl:'실점', color: tot.goalsConceded===0?'#22C55E':tot.goalsConceded>0?'#EF4444':'#fff'});
    } else {
      infoItems.push({val: tot.goals>0?tot.goals:'-', lbl:'득점', color: tot.goals>0?'#22C55E':'#fff'});
      infoItems.push({val: tot.assists>0?tot.assists:'-', lbl:'어시스트', color: tot.assists>0?'#60A5FA':'#fff'});
    }
  }
  if(infoItems.length){
    h += '<div class="pm-info-grid">';
    infoItems.forEach(function(item){
      h += '<div class="pm-info-cell">';
      h += '<div class="pm-info-val" style="color:'+(item.color||'#fff')+'">'+(item.html?item.val:item.val)+'</div>';
      h += '<div class="pm-info-lbl">'+item.lbl+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  // ── 대회별 스탯 탭 ──
  if(compKeys.length > 0){
    h += '<div class="stat-section">';
    h += '<div class="stat-section-title">\ub300\ud68c\ubcc4 \uc2a4\ud0ef</div>';
    h += '<div class="pm-comp-tabs">';
    compKeys.forEach(function(k,i){
      h += '<button class="pm-comp-tab'+(i===0?' active':'')+'" data-comp="'+k+'" onclick="switchPMComp(this)">'+(compLabels[k]||k)+'</button>';
    });
    h += '</div>';

    compKeys.forEach(function(k, i){
      var c = competitions[k];
      var hidden = i===0 ? '' : 'display:none';
      h += '<div class="comp-stat-panel" data-comp="'+k+'" style="'+hidden+'">';
      var mins=c.minutesPlayed||0;
      var minsStr=mins>0?mins:'-';
      var rating=c.avgRating?c.avgRating.toFixed(1):'-';
      var ratingColor=c.avgRating>=8?'#22C55E':c.avgRating>=7?'#84CC16':c.avgRating>=6?'#F59E0B':'rgba(255,255,255,0.7)';
      h += '<div class="fotmob-stat-grid">';
      if(pos==='GK'){
        var csVal=c.cleanSheets!=null?c.cleanSheets:'-';
        var gcVal=c.goalsConceded!=null?c.goalsConceded:'-';
        h+=makeFMStat(csVal,'클린시트',parseInt(csVal)>0?'#22C55E':'');
        h+=makeFMStat(gcVal,'실점',parseInt(gcVal)===0?'#22C55E':'#EF4444');
        h+=makeFMStat(rating,'평점',ratingColor);
        h+=makeFMStat(c.appearances||0,'경기','');
        h+=makeFMStat(minsStr,'출전시간','');
        h+=makeFMStat(c.yellowCards||0,'경고',c.yellowCards>0?'#F59E0B':'');
        h+=makeFMStat(c.redCards||0,'퇴장',c.redCards>0?'#EF4444':'');
        h+=makeFMStat('','','');
      } else {
        h+=makeFMStat(c.goals||0,'득점','#22C55E');
        h+=makeFMStat(c.assists||0,'어시스트','#60A5FA');
        h+=makeFMStat(c.starts!=null?c.starts:'-','선발','');
        h+=makeFMStat(c.appearances||0,'경기','');
        h+=makeFMStat(minsStr,'출전시간','');
        h+=makeFMStat(rating,'평균평점',ratingColor);
        h+=makeFMStat(c.yellowCards||0,'경고',c.yellowCards>0?'#F59E0B':'');
        h+=makeFMStat(c.redCards||0,'퇴장',c.redCards>0?'#EF4444':'');
      }
      h += '</div>';
      h += '</div>';
    });
    h += '</div>'; // stat-section
  }

  // ── 선수 특성 레이더 (Fotmob traits) ──
  if(traits && traits.items && traits.items.length){
    h += '<div class="pm-traits" style="border-top:1px solid rgba(255,255,255,.06)">';
    h += '<div class="pm-section-title">\uc120\uc218 \ud2b9\uc131</div>';
    h += '<div class="pm-section-sub">'+traits.title+'</div>';
    h += '<div class="pm-radar-wrap">';
    h += '<canvas id="radar_traits" width="240" height="220"></canvas>';
    h += '</div>';
    h += '</div>';
  }

  // ── 경력 ──
  if(career && career.length){
    h += '<div style="padding:14px 0 0">';
    h += '<div style="font-size:13px;font-weight:700;color:#fff;padding:0 16px 10px">\uacbd\ub825</div>';
    career.forEach(function(c){
      var period = c.startDate ? c.startDate.slice(0,4) : '';
      if(c.endDate) period += ' - '+c.endDate.slice(0,4);
      else if(c.active) period += ' - \ud604\uc7ac';
      var statStr = '';
      if(c.appearances) statStr += c.appearances+'\uacbd\uae30';
      if(c.goals) statStr += ' '+c.goals+'\uace8';
      h += '<div class="pm-career-row">';
      h += '<div><div class="pm-career-team">'+c.team+'</div><div class="pm-career-period">'+period+'</div></div>';
      h += '<div class="pm-career-stat">'+statStr+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  content.innerHTML = h;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
  history.pushState({modal:'player'},'',' #player');

  // 레이더 차트
  setTimeout(function(){
    if(traits && traits.items && traits.items.length){
      var translated = traits.items.map(function(item){
        return {key: item.key, title: TRAIT_LABELS[item.key]||item.title, value: item.value};
      });
      drawFotmobRadar('radar_traits', translated);
    }
  }, 60);
}

// ── Fotmob 스타일 6각형 레이더 ──
function drawFotmobRadar(canvasId, items){
  var canvas = document.getElementById(canvasId);
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  var W=canvas.width, H=canvas.height;
  // 라벨 공간 확보를 위해 중심 약간 위로
  var cx=W/2, cy=H/2;
  var r=Math.min(W,H)/2-50;
  var n=items.length;
  ctx.clearRect(0,0,W,H);

  var gridC='rgba(255,255,255,0.1)';

  // 배경 동심 다각형 (4단계)
  [0.25,0.5,0.75,1].forEach(function(s){
    ctx.beginPath();
    for(var i=0;i<n;i++){
      var a=(i/n)*Math.PI*2-Math.PI/2;
      i===0?ctx.moveTo(cx+Math.cos(a)*r*s,cy+Math.sin(a)*r*s):ctx.lineTo(cx+Math.cos(a)*r*s,cy+Math.sin(a)*r*s);
    }
    ctx.closePath();
    ctx.strokeStyle=gridC;ctx.lineWidth=s===1?1.5:1;ctx.stroke();
    if(s===1){ctx.fillStyle='rgba(255,255,255,0.02)';ctx.fill();}
  });

  // 축
  for(var i=0;i<n;i++){
    var a=(i/n)*Math.PI*2-Math.PI/2;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    ctx.strokeStyle=gridC;ctx.lineWidth=1;ctx.stroke();
  }

  // 데이터 영역
  ctx.beginPath();
  for(var i=0;i<n;i++){
    var a=(i/n)*Math.PI*2-Math.PI/2;
    var v=Math.min(1,Math.max(0,(items[i].value||0)/100));
    i===0?ctx.moveTo(cx+Math.cos(a)*r*v,cy+Math.sin(a)*r*v)
         :ctx.lineTo(cx+Math.cos(a)*r*v,cy+Math.sin(a)*r*v);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(189,5,16,0.4)';ctx.fill();
  ctx.strokeStyle='#EF4444';ctx.lineWidth=2;ctx.stroke();

  // 데이터 점
  for(var i=0;i<n;i++){
    var a=(i/n)*Math.PI*2-Math.PI/2;
    var v=Math.min(1,Math.max(0,(items[i].value||0)/100));
    ctx.beginPath();
    ctx.arc(cx+Math.cos(a)*r*v,cy+Math.sin(a)*r*v,4,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
    ctx.strokeStyle='#EF4444';ctx.lineWidth=2;ctx.stroke();
  }

  // 라벨 (% 수치 크게 + 설명 작게) - Fotmob 스타일
  for(var i=0;i<n;i++){
    var a=(i/n)*Math.PI*2-Math.PI/2;
    var labelR = r+28;
    var lx=cx+Math.cos(a)*labelR;
    var ly=cy+Math.sin(a)*labelR;
    var pct=items[i].value||0;
    var col=pct>=75?'#22C55E':pct>=50?'#fff':'rgba(255,255,255,0.6)';

    ctx.textAlign='center';
    ctx.textBaseline='middle';

    // % 수치 (크게)
    ctx.font='bold 13px sans-serif';
    ctx.fillStyle=col;
    ctx.fillText(pct+'%', lx, ly-7);

    // 라벨 (작게)
    ctx.font='10px sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.5)';
    // 긴 라벨 줄바꿈 처리
    var title=items[i].title||'';
    if(title.length>12){
      var words=title.split(' ');
      var mid=Math.ceil(words.length/2);
      var line1=words.slice(0,mid).join(' ');
      var line2=words.slice(mid).join(' ');
      ctx.fillText(line1,lx,ly+6);
      ctx.fillText(line2,lx,ly+17);
    } else {
      ctx.fillText(title,lx,ly+7);
    }
  }
}

function getPctStats(fotStats, pos){
  var keys = pos==='GK'
    ? ['goals_conceded_per_90','saves','clean_sheets']
    : pos==='DF'
    ? ['goals','assists','chances_created','tackles','interceptions']
    : pos==='MF'
    ? ['goals','assists','chances_created','shots','accurate_passes','tackles']
    : ['goals','assists','shots','expected_goals','chances_created','touches_in_opposition_box'];
  var result=[];
  keys.forEach(function(k){
    var s=fotStats[k];
    if(s && s.percentile!=null){
      result.push({label:s.title||k, pct:s.percentile});
    }
  });
  return result.slice(0,6);
}

function switchPMComp(btn){
  var content=document.getElementById('modalContent');
  var comp=btn.getAttribute('data-comp');
  content.querySelectorAll('.pm-comp-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  content.querySelectorAll('.comp-stat-panel').forEach(function(panel){
    panel.style.display=panel.getAttribute('data-comp')===comp?'':'none';
  });
}

function makeFMStat(val, lbl, color){
  var style = color ? ' style="color:'+color+'"' : '';
  return '<div class="fm-stat-cell">'
    +'<div class="fm-stat-val"'+style+'>'+val+'</div>'
    +'<div class="fm-stat-lbl">'+lbl+'</div>'
    +'</div>';
}

function makeStatBox(val,lbl,sub,color){
  var style=color?' style="color:'+color+'"':'';
  return '<div class="stat-box"><div class="stat-box-val"'+style+'>'+val+'</div>'
    +'<div class="stat-box-lbl">'+lbl+'</div>'
    +(sub?'<div class="stat-box-sub">'+sub+'</div>':'')
    +'</div>';
}

function closePlayerModal(fromHash){
  document.getElementById('playerModal').classList.remove('open');
  document.body.style.overflow='';
  if(!fromHash && location.hash.includes('player')) history.replaceState(null,'',location.href.split('#')[0]);
}
function closeModal(e){
  if(e.target===document.getElementById('playerModal'))closePlayerModal();
}

}
