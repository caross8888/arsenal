<!DOCTYPE html>
<html lang="ko">
<head><!-- Arsenal FC Dashboard v2 -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#EF0107">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arsenal">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="https://a.espncdn.com/i/teamlogos/soccer/500/359.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Arsenal FC · The Gunners Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{color-scheme:dark;--red:#EF0107;--red-dark:#b50004;--gold:#C8A84B;--navy:#0B0D12;--surface:#111318;--surface2:#181B22;--surface3:#1F2330;--border:rgba(255,255,255,0.07);--border-accent:rgba(200,168,75,0.3);--text:#F0F2F7;--text-muted:#7A8099;--text-dim:#4A5070;--green:#22C55E;--amber:#F59E0B;--fd:'Bebas Neue',sans-serif;--fb:'Noto Sans KR',sans-serif;--fm:'Fira Mono',monospace;--safe-bottom:env(safe-area-inset-bottom,0px);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--navy);color:var(--text);font-family:var(--fb);font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden;padding-bottom:calc(64px + var(--safe-bottom));}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(239,1,7,.1) 0%,transparent 60%);pointer-events:none;z-index:0}
.top-header{background:rgba(11,13,18,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:10px}
.logo-svg{width:34px;height:34px;flex-shrink:0}
.brand-text .name{font-family:var(--fd);font-size:20px;letter-spacing:3px;color:var(--red);line-height:1}
.brand-text .sub{font-size:8px;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(11,13,18,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;gap:4px;background:none;border:none;border-right:1px solid var(--border);color:var(--text-dim);font-family:var(--fb);font-size:9px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;position:relative;-webkit-tap-highlight-color:transparent;}
.nav-btn:last-child{border-right:none;}
.nav-btn.active{background:var(--red-dark);color:#fff}.nav-btn.active .nav-icon{color:var(--gold)}
.nav-icon{width:20px;height:20px;color:var(--text-dim);}
.nav-live-dot{position:absolute;top:8px;right:calc(50% - 16px);width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s infinite}
.page{position:relative;z-index:1}
.section{display:none;padding:16px;max-width:600px;margin:0 auto}
.section.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.sec-title{font-family:var(--fd);font-size:30px;letter-spacing:3px}
.sec-badge{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);background:rgba(200,168,75,.12);border:1px solid var(--border-accent);padding:3px 9px;border-radius:20px}
.sec-badge.live{color:var(--green);background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);animation:pulse 2s infinite}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);font-weight:700}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:10px;color:var(--text-muted);font-size:12px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:14px 16px;font-size:12px;color:#F87171;display:flex;align-items:center;gap:8px}
.dday-card{background:linear-gradient(135deg,var(--red) 0%,#7a0010 100%);border-radius:14px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;color:#fff;position:relative;overflow:hidden;}
.dday-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 90% -20%,rgba(255,255,255,.15),transparent 60%);pointer-events:none;}
.dday-num{font-family:var(--fd);font-size:32px;letter-spacing:1px;line-height:1;flex-shrink:0;position:relative;z-index:1;min-width:64px;}
.dday-info{flex:1;min-width:0;position:relative;z-index:1;}
.dday-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;opacity:.75;margin-bottom:4px;}
.dday-match{display:flex;align-items:center;flex-wrap:wrap;gap:6px;font-size:14px;font-weight:700;margin-bottom:4px;}
.dday-comp{font-size:8px;letter-spacing:1px;text-transform:uppercase;background:rgba(255,255,255,.18);padding:2px 7px;border-radius:20px;}
.dday-time{font-size:11px;opacity:.85;position:relative;z-index:1;}
.fix-section-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;margin-top:6px;padding-left:2px}
.fix-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.fix-section-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;}
.fix-section-card .fix-section-label{font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--text);padding:14px 14px 8px;margin:0;}
.fix-section-card .fix-list{padding:0 14px 14px;margin-bottom:0;}
.fix-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;}
.fix-card.live-match{border-color:var(--green);}
.fix-card.home-fixture{border-color:var(--red);}
.fix-card.away-fixture{border-color:#3a5a8c;}
.fix-card.neutral-fixture{border-color:var(--gold);}
.fix-card.result-win{border-color:var(--green);}
.fix-card.result-draw{border-color:var(--gold);}
.fix-card.result-loss{border-color:var(--red);}
.fix-grid{display:grid;grid-template-columns:1fr 68px 1fr;grid-template-rows:auto auto auto;gap:2px 4px;align-items:center;padding:2px 0}
.fix-z3label{grid-column:2;grid-row:3;display:flex;align-items:center;justify-content:center;}
.fix-z1{grid-column:1;grid-row:1;display:flex;align-items:center;}
.fix-z2{grid-column:1;grid-row:2;display:flex;align-items:center;}
.fix-z3top{grid-column:2;grid-row:1;display:flex;align-items:center;justify-content:center;}
.fix-z3bot{grid-column:2;grid-row:2;display:flex;align-items:stretch;justify-content:center;}
.fix-z4{grid-column:3;grid-row:1;display:flex;align-items:center;justify-content:flex-end;}
.fix-z5{grid-column:3;grid-row:2;display:flex;align-items:center;justify-content:flex-end;}
.fix-live-clock{text-align:center;font-size:10px;font-weight:700;letter-spacing:1px;padding-top:4px;}
.fix-live-expand{overflow:hidden;max-height:0;transition:max-height 0.35s ease;}
.fix-live-expand.open{max-height:2000px;}
.live-progress-wrap{padding:10px 14px 8px;display:flex;align-items:center;gap:8px;}
.live-progress-bar-bg{flex:1;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.live-progress-bar{height:100%;background:var(--green);border-radius:2px;transition:width 1s linear;}
.live-progress-label{font-size:9px;color:var(--green);font-weight:700;min-width:30px;text-align:right;}
.fix-expand-btn{width:100%;background:none;border:none;border-top:1px solid rgba(255,255,255,0.06);color:var(--text-dim);font-size:10px;padding:6px;cursor:pointer;letter-spacing:1px;margin-top:6px;}
.fix-expand-btn:hover{color:var(--text);}
.comp-tag{display:inline-block;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:4px;flex-shrink:0}
.tag-pl{background:rgba(55,0,255,.15);color:#A78BFA;border:1px solid rgba(167,139,250,.2)}
.tag-cl{background:rgba(0,80,200,.15);color:#60A5FA;border:1px solid rgba(96,165,250,.2)}
.tag-fa{background:rgba(200,168,75,.15);color:var(--gold);border:1px solid var(--border-accent)}
.tag-ec{background:rgba(239,100,7,.15);color:#FB923C;border:1px solid rgba(251,146,60,.2)}
.tag-oth{background:rgba(100,100,100,.15);color:var(--text-muted);border:1px solid var(--border)}
.fix-date{font-size:10px;color:var(--text-muted);font-family:var(--fm);flex-shrink:0}
.fix-date.live-tag{color:var(--green);font-weight:700}
.fix-team-home{display:flex;align-items:center;gap:8px}
.fix-team-away{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.t-crest{width:30px;height:30px;border-radius:50%;object-fit:contain;background:none;border:none;padding:3px;flex-shrink:0;filter:drop-shadow(0 0 1px rgba(255,255,255,.35))}
.t-crest-ph{width:30px;height:30px;border-radius:50%;background:none;border:none;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:9px;color:var(--text-muted);flex-shrink:0;filter:drop-shadow(0 0 1px rgba(255,255,255,.35))}
.t-crest-ph.afc{background:none;border:none;color:var(--red)}
.t-name-home{font-weight:700;font-size:12px;line-height:1.3;min-width:0;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word}
.t-name-away{font-weight:700;font-size:12px;line-height:1.3;min-width:0;overflow:hidden;text-align:right;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word}
.fix-score-box{text-align:center;flex-shrink:0;width:68px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.fix-score{font-family:var(--fd);font-size:24px;letter-spacing:3px;line-height:1;color:var(--text)}
.fix-vs{font-family:var(--fd);font-size:16px;letter-spacing:2px;color:var(--text-dim);line-height:1;display:block;}
.fix-vs-label{font-size:8px;font-weight:700;letter-spacing:1px;line-height:1;}
.fix-round-text{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);}
.fix-round-final{color:#D4AF37;font-weight:700;}
.fix-venue{font-size:10px;color:var(--text-dim);text-align:center}
.std-hdr,.std-row{display:grid;grid-template-columns:22px 1fr 24px 24px 24px 24px 36px;gap:4px;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px}
.std-row:last-child{border-bottom:none}
.std-row.afc-row{background:rgba(239,1,7,.05)}
.std-row.afc-row .std-pos{color:var(--red);font-weight:700}
.std-hdr{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-muted);background:rgba(255,255,255,.03);padding-top:10px;padding-bottom:10px}
.std-pos{font-family:var(--fm);font-size:11px;color:var(--text-muted)}
.std-team{font-weight:500;display:flex;align-items:center;gap:6px;font-size:12px;min-width:0}
.std-team span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.std-crest{width:16px;height:16px;border-radius:50%;object-fit:contain;border:none;flex-shrink:0;filter:drop-shadow(0 0 1px rgba(255,255,255,.35))}
.std-s{font-family:var(--fm);color:var(--text-muted);text-align:center;font-size:11px}
.std-pts{font-family:var(--fm);font-weight:700;color:var(--text);text-align:right;font-size:12px}
.more-btn{width:100%;padding:12px;border:none;background:var(--surface2);color:var(--text);font-weight:700;font-family:var(--fb);font-size:12px;letter-spacing:1px;cursor:pointer;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px;transition:background .2s,color .2s;-webkit-tap-highlight-color:transparent;}
.more-btn:hover{background:var(--surface3);color:var(--text)}
.lb-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);}
.lb-tab{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:14px 4px;border:none;background:var(--surface2);color:var(--text-muted);cursor:pointer;font-family:var(--fb);font-size:11px;font-weight:700;-webkit-tap-highlight-color:transparent;}
.lb-tab-badge{position:absolute;top:6px;right:8px;font-size:11px;font-weight:700;color:inherit;}
.lb-tab svg{stroke:var(--text-muted);transition:stroke .15s;}
.lb-tab.active{background:var(--red-dark);color:#fff;}
.lb-tab.active svg{stroke:var(--gold);}
.ldr-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px}
.ldr-row:last-child{border-bottom:none}
.ldr-row.afc-row{background:rgba(239,1,7,.05)}
.ldr-rank{font-family:var(--fm);font-size:11px;color:var(--text-muted);width:16px;flex-shrink:0;text-align:center}
.ldr-photo{width:26px;height:26px;border-radius:50%;object-fit:cover;background:var(--surface2);flex-shrink:0}
.ldr-photo-ph{width:26px;height:26px;border-radius:50%;background:var(--surface2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--text-muted);}
.ldr-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.ldr-name{font-weight:600;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ldr-team{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-muted)}
.ldr-team img{width:12px;height:12px;object-fit:contain}
.ldr-val{font-family:var(--fm);font-weight:700;font-size:14px;color:var(--text);flex-shrink:0}
.f-btns{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.f-btn{background:var(--surface2);border:none;color:var(--text-muted);font-family:var(--fb);font-size:12px;font-weight:700;padding:10px 4px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.f-btn.active{background:var(--red-dark);color:#fff}
.sq-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.pl-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s;position:relative}
.pl-contract-badge{position:absolute;top:6px;right:6px;z-index:2;background:rgba(239,68,68,.92);color:#fff;font-size:8px;font-weight:800;letter-spacing:.3px;padding:2px 6px;border-radius:10px;display:flex;align-items:center;gap:2px;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.pl-card:active{transform:scale(.98)}
.pl-top{display:grid;grid-template-columns:70px 1fr;height:90px}
.pl-left{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.pl-left.fw{background:rgba(239,1,7,.75)}
.pl-left.mf{background:rgba(34,197,94,.60)}
.pl-left.df{background:rgba(59,130,246,.60)}
.pl-left.gk{background:rgba(234,179,8,.65)}
.pl-pos-txt{font-size:10px;font-weight:800;letter-spacing:1.5px;color:rgba(255,255,255,.95);text-transform:uppercase}
.pl-num-txt{font-family:var(--fd);font-size:32px;font-weight:900;line-height:1;color:#fff;opacity:.95}
.pl-photo-box{width:100%;height:90px;overflow:hidden;background:var(--surface3)}
.pl-photo-box img{width:100%;height:100%;object-fit:contain;object-position:top center;display:block}
.pl-photo-box.no-img{display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:18px}
.pl-card-divider{height:1px;background:var(--border)}
.pl-card-name{padding:7px 8px;font-size:11px;font-weight:700;letter-spacing:.5px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.inj-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border)}
.inj-row:last-child{border-bottom:none}
.inj-pos-badge{width:38px;height:38px;border-radius:50%;background:var(--surface3);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:11px;color:var(--text-muted)}
.inj-info{flex:1;min-width:0}
.inj-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inj-detail{font-size:11px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inj-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.inj-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap}
.inj-injury{background:rgba(239,68,68,.15);color:#F87171;border:1px solid rgba(239,68,68,.3)}
.inj-doubt{background:rgba(245,158,11,.15);color:#FCD34D;border:1px solid rgba(245,158,11,.3)}
.inj-miss{background:rgba(120,120,120,.15);color:var(--text-muted);border:1px solid var(--border)}
.inj-chance{font-size:10px;color:var(--text-dim)}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px}
.sum-stat{background:var(--surface2);border-radius:10px;padding:14px;text-align:center}
.sum-val{font-family:var(--fd);font-size:36px;line-height:1}
.sum-val.r{color:var(--red)}.sum-val.a{color:var(--amber)}.sum-val.g{color:var(--green)}
.sum-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-top:4px}
.news-list{display:flex;flex-direction:column;gap:10px}
.media-seg{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.media-seg-btn{background:var(--surface2);border:none;color:var(--text-muted);font-family:var(--fb);font-size:12px;font-weight:700;padding:10px 4px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.media-seg-btn.active{background:var(--red-dark);color:#fff;}
/* ── Timeline Section ───────────────────── */
.tl-wrap{position:relative;}
.tl-wrap::before{content:'';position:absolute;left:50%;transform:translateX(-50%);top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--red) 0%,#ff6b35 30%,var(--gold) 60%,#4CAF50 100%);opacity:.45;}
.tl-item{display:grid;grid-template-columns:1fr 18px 1fr;margin-bottom:28px;position:relative;align-items:start;}
.tl-left{padding-right:14px;display:flex;flex-direction:column;align-items:flex-end;gap:7px;}
.tl-year{font-size:18px;font-weight:900;line-height:1;font-family:var(--fd);letter-spacing:.5px;}
.tl-photo{width:85%;aspect-ratio:4/3;border-radius:8px;background:var(--surface2);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;color:rgba(255,255,255,.2);}
.tl-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.tl-dot-col{display:flex;justify-content:center;padding-top:4px;position:relative;z-index:2;}
.tl-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--navy);flex-shrink:0;}
.tl-right{padding-left:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.tl-right:active{opacity:.75;}
.tl-right-spacer{height:18px;margin-bottom:7px;}
.tl-title{font-size:13px;font-weight:800;color:var(--text);line-height:1.35;margin-bottom:6px;}
.tl-summary{font-size:11px;color:var(--text-muted);line-height:1.65;}
.tl-more{display:inline-block;margin-top:6px;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--red);}
/* ── History Tab ─────────────────────────── */

/* Stadium */

.stad-years{display:inline-block;font-size:10px;font-weight:700;color:var(--red);background:rgba(239,1,7,.08);border:1px solid rgba(239,1,7,.2);border-radius:4px;padding:2px 7px;}

/* Records */

.rec-group{margin-bottom:20px;}

/* Moments */
.mom-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-bottom:24px;}

.hist-section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;}

.hist-card-img{width:100%;height:100%;object-fit:cover;display:block;}

.hist-card-title{font-size:11px;font-weight:700;color:var(--text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

.fix-view-btn svg{width:14px;height:14px;}
.fix-view-btn.active{background:var(--red-dark);color:#fff;}
.cal-nav-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;display:flex;align-items:center;-webkit-tap-highlight-color:transparent;}
.cal-nav-btn svg{width:16px;height:16px;}
.results-nav{display:flex;align-items:center;justify-content:space-between;padding:4px 14px 8px;}
.results-label-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.results-label{font-size:13px;font-weight:700;color:var(--text);pointer-events:none;}
.results-month-input{position:absolute;inset:0;width:100%;height:100%;opacity:0;border:0;padding:0;margin:0;cursor:pointer;-webkit-appearance:none;appearance:none;}
.results-count{padding:0 14px 6px;font-size:12px;color:var(--text-dim);}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px;}
.cal-dow-row span{text-align:center;font-size:10px;font-weight:700;color:var(--text);padding:4px 0;display:block;}
.cal-dow-row span:first-child{color:#F87171;font-weight:900;}
.cal-dow-row span:last-child{color:#60A5FA;font-weight:900;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{aspect-ratio:1/1.75;border-radius:8px;border:2px solid transparent;box-sizing:border-box;background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;position:relative;overflow:hidden;cursor:default;font-size:11px;color:var(--text-muted);-webkit-tap-highlight-color:transparent;padding:4px 2px 5px;}
.cal-day.has-fixture{border-color:var(--red-dark);cursor:pointer;}
.cal-day.away-fixture{border-color:#3a5a8c;}
.cal-day.neutral-fixture{border-color:var(--gold);}
.cal-day.today{background:rgba(200,168,75,.15);color:var(--gold);font-weight:700;}
.cal-day.selected{outline:2px solid #fff;outline-offset:-2px;}
.cal-day-num{font-size:10px;color:rgba(255,255,255,.6);text-align:center;width:100%;flex-shrink:0;}
.cal-day-sun .cal-day-num{color:#F87171;font-weight:700;}
.cal-day-sat .cal-day-num{color:#60A5FA;font-weight:700;}
.cal-day.has-fixture .cal-day-num{font-weight:700;}
.cal-day-crest-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;}
.cal-day-crest-wrap .t-crest,.cal-day-crest-wrap .t-crest-ph{width:78%;height:auto;aspect-ratio:1;padding:0;box-sizing:border-box;font-size:.7em;border:none;background:none;filter:drop-shadow(0 0 1px rgba(255,255,255,.35));}
.cal-day-crest-wrap .t-crest-ph.afc{background:none;}
.cal-day-time{font-size:9px;color:rgba(255,255,255,.6);flex-shrink:0;}
.cal-day.has-fixture .cal-day-time{font-weight:700;}

/* PLAYER MODAL - Fotmob style */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
.modal-overlay.open{display:flex;}
.modal-sheet{position:relative;background:#1a1c22;border-radius:20px 20px 0 0;width:100%;max-width:540px;max-height:92vh;overflow:hidden;animation:slideUp .28s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;}.modal-sheet-inner{overflow-y:auto;flex:1;padding-bottom:32px;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:10px auto 0;}
.modal-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:20;}
/* 헤더 */
.pm-header{background:linear-gradient(135deg,#bd0510 0%,#7a0010 100%);padding:20px 16px 18px;position:sticky;top:0;z-index:10;}
.pm-header-inner{display:flex;gap:14px;align-items:center;}
.pm-photo{width:68px;height:68px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.3);flex-shrink:0;}
.pm-photo-ph{width:68px;height:68px;border-radius:50%;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:22px;color:#fff;flex-shrink:0;}
.pm-name{font-family:var(--fd);font-size:22px;color:#fff;letter-spacing:1px;line-height:1.1;}
.pm-club{font-size:12px;color:rgba(255,255,255,.75);margin-top:3px;display:flex;align-items:center;gap:5px;}
.pm-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border-radius:20px;padding:2px 8px;font-size:10px;color:rgba(255,255,255,.85);margin-top:5px;}
/* 기본정보 그리드 */
.pm-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid rgba(255,255,255,.06);}
.pm-info-cell{padding:12px 16px;border-right:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06);}
.pm-info-cell:nth-child(2n){border-right:none;}
.pm-info-val{font-size:15px;font-weight:700;color:#fff;margin-bottom:2px;}
.pm-info-lbl{font-size:10px;color:rgba(255,255,255,.4);}
/* 선수 특성 (레이더) */
.pm-traits{padding:16px 16px 8px;}
.shot-line{opacity:0;transition:opacity .15s;pointer-events:none;}
.shot-line.active{opacity:0.85;}
.shot-highlight{opacity:0;transition:opacity .15s;pointer-events:none;}
.shot-highlight.active{opacity:1;}
.pm-section-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:4px;}
.pm-section-sub{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:14px;}
.pm-radar-wrap{display:flex;justify-content:center;position:relative;}
/* 대회 탭 */
.pm-comp-tabs{display:grid;gap:1px;background:rgba(255,255,255,.08);}
.pm-comp-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:16px 6px;border:none;background:#23252b;color:rgba(255,255,255,.55);cursor:pointer;font-family:var(--fb);font-size:12px;font-weight:700;transition:background .15s,color .15s;}
.pm-comp-tab svg{width:24px;height:24px;fill:rgba(255,255,255,.32);transition:fill .15s;}
.pm-comp-tab.active{background:var(--red-dark);color:#fff;}
.pm-comp-tab.active svg{fill:var(--gold);}
/* 대회별 기록 카드 — 탭/스탯/슈팅맵/히트맵을 하나의 카드로 묶음 */
.pm-comp-card{margin:14px 16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden;}
.pm-comp-card-title{font-size:11px;font-weight:700;letter-spacing:.5px;color:rgba(255,255,255,.5);padding:14px 14px 0;}
.pm-comp-subsection{padding:16px 14px 14px;border-top:1px solid rgba(255,255,255,.07);}
.pm-comp-subtitle{font-size:12px;font-weight:700;color:#fff;margin-bottom:10px;}
/* 스탯 섹션 */
.stat-section{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.06);}
.stat-section-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:10px;font-weight:700;}
.stat-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.stat-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.stat-box{background:rgba(255,255,255,.05);border-radius:10px;padding:10px 6px;text-align:center;}
.stat-box-val{font-family:var(--fd);font-size:20px;line-height:1;color:#fff;}
.stat-box-lbl{font-size:8px;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:3px;}
.stat-box-sub{font-size:9px;color:rgba(255,255,255,.3);margin-top:1px;}
/* 퍼센타일 바 */
.pct-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.pct-label{font-size:11px;color:rgba(255,255,255,.5);width:100px;flex-shrink:0;}
.pct-bar-wrap{flex:1;height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.pct-bar{height:100%;border-radius:3px;}
.pct-val{font-size:11px;font-weight:700;width:36px;text-align:right;flex-shrink:0;}
/* 경력 */
.pm-career-card{margin:14px 16px 20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden;padding-top:14px;}
.pm-career-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.05);}
.pm-career-row:last-child{border-bottom:none;}
.pm-career-team{flex:1;font-size:13px;color:#fff;font-weight:600;}
.pm-career-period{font-size:10px;color:rgba(255,255,255,.4);}
.pm-career-stat{font-size:11px;color:rgba(255,255,255,.5);min-width:60px;text-align:right;}
/* Fotmob 대회별 스탯 그리드 */
.fotmob-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.06);margin:0;border-top:1px solid rgba(255,255,255,.06);}
.overall-stat-grid{grid-template-columns:repeat(5,1fr);}
.shot-stat-grid{grid-template-columns:repeat(4,1fr);}
.fm-stat-cell{background:#1a1c22;padding:12px 8px;text-align:center;}
.fm-stat-val{font-family:var(--fd);font-size:20px;font-weight:700;color:#fff;line-height:1;}
.fm-stat-lbl{font-size:9px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:.5px;}
.overall-stat-grid .fm-stat-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;min-height:50px;}
.overall-stat-grid .fm-stat-val{font-size:12px;line-height:1.3;}
.overall-stat-grid .fm-stat-lbl{margin-top:3px;}
/* Radar */
.radar-wrap{padding:16px 20px;display:flex;justify-content:center;}
.pl-modal-header{display:flex;gap:16px;padding:20px 20px 16px;border-bottom:1px solid var(--border);position:relative;}
.pl-modal-photo{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;}
.pl-modal-photo-ph{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:24px;flex-shrink:0;}
.pl-modal-name{font-family:var(--fd);font-size:26px;letter-spacing:2px;line-height:1.1;}
.pl-modal-sub{font-size:11px;color:var(--text-muted);margin-top:4px;}
.pl-modal-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;margin-top:6px;}
/* ── 경기 상세 모달 ── */
.match-modal-x{position:absolute;top:12px;right:14px;z-index:10;background:rgba(0,0,0,.45);border:none;color:#fff;font-size:16px;width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.match-modal-x:active{opacity:.7;}
.match-modal-sheet{position:relative;}
.match-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
.match-modal-overlay.open{display:flex;}
.match-modal-sheet{background:#1a1c22;border-radius:20px 20px 0 0;width:100%;max-width:540px;max-height:92vh;overflow:hidden;animation:slideUp .28s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;}
.match-modal-inner{overflow-y:auto;flex:1;padding-bottom:32px;}
.mm-header{background:linear-gradient(135deg,#1a0a0a 0%,#0d0d18 100%);padding:18px 16px 14px;position:relative;}
.mm-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 14px;}
.mm-header{display:flex;flex-direction:column;align-items:center;padding:16px 16px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.mm-header-title{font-size:15px;font-weight:700;color:var(--text);}
.mm-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:10;}
/* Match modal 3-col header */
.mm-scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;padding:16px 14px 14px;width:100%;box-sizing:border-box;}
.mm-team{display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0;}
.mm-team.away{align-items:center;}
.mm-crest{width:52px;height:52px;object-fit:contain;}
.mm-team-name{font-size:11px;font-weight:800;text-align:center;color:var(--text);line-height:1.25;max-width:90px;}
.mm-center-col{display:flex;flex-direction:column;align-items:center;gap:5px;padding:0 6px;}
.mm-score{font-family:var(--fd);font-size:38px;font-weight:900;color:#fff;letter-spacing:2px;line-height:1;}
.mm-center-meta{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%;}
.mm-meta-row{font-size:9px;color:var(--text-dim);text-align:center;white-space:nowrap;letter-spacing:.3px;}
.mm-meta-date{font-size:10px;font-weight:700;color:var(--text-muted);}
.mm-meta-comp{display:inline-block;font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,.07);color:var(--text-dim);border:1px solid var(--border);margin-top:1px;}
.mm-section{padding:14px 14px 14px;}
.mm-section-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;font-weight:700;}
.mm-card{margin:14px 16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden;}
.mm-card-title{font-size:11px;font-weight:700;letter-spacing:.5px;color:rgba(255,255,255,.5);padding:14px 14px 0;}
.mm-team-tabs{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,.08);margin-top:10px;}
.mm-team-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:14px 6px;border:none;background:#23252b;color:rgba(255,255,255,.55);cursor:pointer;font-family:var(--fb);font-size:12px;font-weight:700;}
.mm-team-tab img{width:24px;height:24px;object-fit:contain;}
.mm-team-tab.active{background:var(--red-dark);color:#fff;}
.mm-events{display:flex;flex-direction:column;gap:4px;}
.mm-event{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;background:var(--surface2);}
.mm-event.home{flex-direction:row;}
.mm-event.away{flex-direction:row-reverse;}
.mm-event-min{font-family:var(--fm);font-size:11px;color:var(--gold);min-width:32px;font-weight:700;}
.mm-event.away .mm-event-min{text-align:right;}
.mm-event-icon{font-size:14px;flex-shrink:0;}
.mm-event-player{font-size:12px;font-weight:700;color:var(--text);flex:1;}
.mm-event.away .mm-event-player{text-align:right;}
.mm-comp-badge{display:none;}
.mm-venue{display:none;}
.mm-match-date{display:none;}
.mm-events-table{width:100%;border-collapse:collapse;table-layout:fixed;}
.mm-events-table td{padding:4px 0;vertical-align:middle;}
.mm-evt-home{width:calc(50% - 1px);text-align:right;}
.mm-evt-away{width:calc(50% - 1px);text-align:left;}
.mm-evt-div{width:2px;background:rgba(255,255,255,.12);}
.mm-evt-cell{display:inline-flex;align-items:center;gap:3px;padding:3px 6px;max-width:100%;min-width:0;overflow:hidden;}
.mm-evt-home .mm-evt-cell{flex-direction:row;}
.mm-evt-away .mm-evt-cell{flex-direction:row;}
.mm-event-icon{font-size:10px;flex-shrink:0;}
.mm-event-min{font-family:var(--fm);font-size:9px;color:var(--gold);font-weight:700;flex-shrink:0;width:28px;text-align:center;}
.mm-event-player{font-size:10px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1;}
.mm-stats-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:3px 8px;align-items:center;}
.mm-stat-val{font-size:12px;font-weight:700;color:var(--text);}
.mm-stat-val.home{text-align:right;}
.mm-stat-val.away{text-align:left;}
.mm-stat-label{font-size:10px;color:var(--text-muted);text-align:center;letter-spacing:.3px;}
.mm-stat-bar-wrap{grid-column:1/-1;display:flex;height:3px;border-radius:2px;overflow:hidden;margin-bottom:2px;}
.mm-stat-bar-home{background:var(--red);transition:width .4s;}
.mm-stat-bar-away{background:rgba(96,165,250,.5);transition:width .4s;}
.mm-pitch-wrap{overflow:hidden;border-radius:10px;}
.mm-pitch-svg{width:100%;display:block;}
.mm-pitch-player{cursor:default;}
.mm-pitch-player circle{fill:#C8102E;}
.mm-pitch-player.away circle{fill:#1a3a6c;}
.mm-pitch-player text.jersey{fill:#fff;font-size:9px;font-weight:700;text-anchor:middle;dominant-baseline:central;}
.mm-pitch-player text.pname{fill:rgba(255,255,255,0.85);font-size:7px;text-anchor:middle;dominant-baseline:hanging;}
.mm-pitch-formation{font-size:10px;color:var(--text-muted);text-align:center;padding:2px 0 6px;}
.mm-pos-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:0.5px;margin-right:5px;vertical-align:middle;}
.mm-pos-gk{background:#B45309;color:#FEF3C7;}
.mm-pos-df{background:#1D4ED8;color:#DBEAFE;}
.mm-pos-mf{background:#15803D;color:#DCFCE7;}
.mm-pos-fw{background:#B91C1C;color:#FEE2E2;}
.mm-pos-sub{background:#374151;color:#D1D5DB;}
.mm-sub-title{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;padding:8px 6px 4px;border-top:1px solid var(--border);}
.mm-lineup-block{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden;}
.mm-lineup-block-title{font-size:12px;font-weight:700;letter-spacing:.3px;color:#fff;padding:10px 12px;background:rgba(255,255,255,.05);}
.mm-player-table{width:100%;border-collapse:collapse;font-size:11px;}
.mm-player-table th{font-size:9px;letter-spacing:.2px;text-transform:uppercase;color:var(--text-muted);padding:5px 3px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap;}
.mm-player-table th:first-child{text-align:left;padding-left:12px;}
.mm-player-table td{padding:5px 3px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text);}
.mm-player-table td:first-child{text-align:left;font-weight:600;}
.mm-player-table th:not(:first-child),.mm-player-table td:not(:first-child){white-space:nowrap;}
.mm-player-table tr:last-child td{border-bottom:none;}
.mm-tab-row{display:flex;gap:6px;padding:12px 16px 0;}
.mm-tab{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-family:var(--fb);font-size:10px;padding:5px 12px;border-radius:20px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.mm-tab img{border-radius:50%;object-fit:cover;flex-shrink:0;}
.mm-tab.active{background:rgba(239,1,7,.15);border-color:rgba(239,1,7,.4);color:var(--red);}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
/* ── SNS ── */
.sns-list{display:flex;flex-direction:column;gap:10px}
.sns-post{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;text-decoration:none;display:block;color:inherit;-webkit-tap-highlight-color:transparent;transition:border-color .2s}
.sns-post:active{opacity:.85}
.sns-post-head{display:flex;align-items:center;gap:10px;padding:12px 14px 8px}
.sns-avatar{width:36px;height:36px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:14px;color:#fff;flex-shrink:0;border:1px solid rgba(239,1,7,.4)}
.sns-author{flex:1;min-width:0}
.sns-author-name{font-weight:700;font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sns-author-label{font-size:10px;color:var(--text-muted)}
.sns-time{font-size:10px;color:var(--text-dim);flex-shrink:0}
.sns-body{padding:0 14px 10px}
.sns-text{font-size:13px;line-height:1.5;color:var(--text);white-space:pre-wrap;word-break:break-word}

function apiFetch(url){
  var sep=url.indexOf('?')>=0?'&':'?';
  return fetch(url+sep+'_='+Date.now()).then(function(r){
    if(!r.ok) return r.json().then(function(e){throw new Error(e.error||'HTTP '+r.status);});
    return r.json();
  });
}
function showErr(el,msg){el.innerHTML='<div class="error-state">&#9888;&#65039; '+msg+'</div>';}

var CNAME={PL:'PL',CL:'UCL',UCL:'UCL',EL:'UEL',FAC:'FA Cup',ELC:'EFL Cup',EFL:'EFL Cup',CS:'Shield',CWC:'CWC',FR:'Friendly'};
function ctag(c){return CTAG[c]||'tag-oth';}
function cname(c,fb){return CNAME[c]||fb||c;}

function isContractSoon(dateStr){
  if(!dateStr) return false;
  var diffDays=(new Date(dateStr).getTime()-Date.now())/86400000;
  return diffDays>=0 && diffDays<=365;
}

function formatDate(utcDate, tbd){
  var d=new Date(utcDate);
  var date=d.toLocaleDateString('ko-KR',{month:'short',day:'numeric',weekday:'short'});
  if(tbd==='postponed') return date+' 연기';
  if(tbd==='canceled')  return date+' 취소';
  var time=tbd==='tbd'?'시간미정':d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false});
  // KST(UTC+9) 기준 날짜 비교
  var KST=9*60*60*1000;
  function kstDay(ts){ return Math.floor((ts+KST)/86400000); }
  var diff=kstDay(d.getTime())-kstDay(Date.now());
  if(diff===0) return '\uc624\ub298 '+time;
  if(diff===1) return '\ub0b4\uc77c '+time;
  if(diff>1&&diff<8) return date+' '+time;
  if(diff>=8) return date+' '+time;
  if(diff===-1) return '\uc5b4\uc81c';
  return date+' '+time;
}

function makeCrest(team,isArs){
  var short=(team.shortName||team.name||'').substring(0,3).toUpperCase();
  var phCls='t-crest-ph'+(isArs?' afc':'');
  if(team.crest) return {type:'crest',src:team.crest,alt:team.shortName||'',phCls:phCls,short:short};
  return {type:'ph',phCls:phCls,short:short};
}
function renderCrest(c){
  if(c.type==='crest'){
    var img=document.createElement('img');
    img.className='t-crest';img.src=c.src;img.alt=c.alt;
    img.onerror=function(){var ph=document.createElement('div');ph.className=c.phCls;ph.textContent=c.short;this.parentNode.replaceChild(ph,this);};
    return img;
  }
  var ph=document.createElement('div');ph.className=c.phCls;ph.textContent=c.short;return ph;
}

function renderDday(list){
  var el=document.getElementById('ddayCard');
  if(!el) return;
  var next=(list||[]).find(function(m){return m.tbd!=='postponed'&&m.tbd!=='canceled';});
  if(!next){el.style.display='none';return;}

  var isLive=next.status==='IN_PLAY'||next.status==='PAUSED';
  var ARSENAL_ESPN='359';
  var isArsHome=next.homeTeam&&(next.homeTeam.id===57||next.homeTeam.id===ARSENAL_ESPN||(next.homeTeam.name||'').includes('Arsenal'));
  var opp=isArsHome?next.awayTeam:next.homeTeam;
  var oppName=opp&&(opp.shortName||opp.displayName||opp.name)||'';
  var venuePrefix=isArsHome?'(H) vs ':'(A) @ ';
  var compObj=next.competition||{};
  var code=compObj.short||'PL';

  var ddayText;
  if(isLive){
    ddayText='LIVE';
  } else {
    var KST=9*60*60*1000;
    var kstDay=function(ts){return Math.floor((ts+KST)/86400000);};
    var diff=kstDay(new Date(next.utcDate).getTime())-kstDay(Date.now());
    ddayText=diff<=0?'D-DAY':'D-'+diff;
  }

  el.style.display='flex';
  el.innerHTML=
    '<div class="dday-num" style="'+(isLive?'color:#FDE047;':'')+'">'+ddayText+'</div>'+
    '<div class="dday-info">'+
      '<div class="dday-label">다음 경기</div>'+
      '<div class="dday-match">'+venuePrefix+oppName+'<span class="dday-comp">'+cname(code,compObj.name)+'</span></div>'+
      '<div class="dday-time">'+(isLive?'● 진행 중':formatDate(next.utcDate,next.tbd))+'</div>'+
    '</div>';
}

function buildFixCard(m){
  var ARSENAL_ESPN='359';
  var isArsHome=m.homeTeam&&(m.homeTeam.id===57||m.homeTeam.id===ARSENAL_ESPN||(m.homeTeam.name||'').includes('Arsenal'));
  var isLive=m.status==='IN_PLAY'||m.status==='PAUSED';
  var isDone=m.status==='FINISHED';
  var compObj=m.competition||{};
  var code=(compObj.short)||m.competitionCode||'PL';
  var compName=(compObj.name)||code;
  var hs=m.score&&m.score.fullTime?m.score.fullTime.home:null;
  var as_=m.score&&m.score.fullTime?m.score.fullTime.away:null;
  var hasScore=hs!==null&&hs!==undefined&&isDone;
  var resultCls=''; var resultBg='';
  if(isDone&&hasScore){
    var arsS=isArsHome?hs:as_; var oppS=isArsHome?as_:hs;
    if(arsS>oppS){resultCls='result-win';resultBg='rgba(34,197,94,0.08)';}
    else if(arsS===oppS){resultCls='result-draw';resultBg='rgba(245,158,11,0.08)';}
    else{resultCls='result-loss';resultBg='rgba(239,68,68,0.08)';}
  }
  var isNeutral=m.neutralSite===true||compObj.short==='CS'||m.round==='final'||(code==='FR'&&isArsHome&&m.venue&&m.venue!=='Emirates Stadium');
  var upcomingCls=isNeutral?'neutral-fixture':(isArsHome?'home-fixture':'away-fixture');
  var card=document.createElement('div');
  card.className='fix-card '+(isLive?'live-match':isDone?'finished '+resultCls:'upcoming '+upcomingCls);
  card.id='fix-card-'+m.id;
  if(resultBg) card.style.background=resultBg;

  // 5레이어 grid 구조
  var grid=document.createElement('div');grid.className='fix-grid';

  // 좌상단: 대회 태그
  var z1=document.createElement('div');z1.className='fix-z1';
  var ct=document.createElement('span');ct.className='comp-tag '+ctag(code);ct.textContent=cname(code,compName);
  z1.appendChild(ct);

  // 좌하단: 홈팀
  var z2=document.createElement('div');z2.className='fix-z2';
  var hd=document.createElement('div');hd.className='fix-team-home';
  hd.appendChild(renderCrest(makeCrest(m.homeTeam,isArsHome)));
  var hn=document.createElement('div');hn.className='t-name-home';
  hn.textContent=m.homeTeam.shortName||m.homeTeam.displayName||m.homeTeam.name||'';
  hd.appendChild(hn);z2.appendChild(hd);

  // 중앙 상단: 라운드
  var z3top=document.createElement('div');z3top.className='fix-z3top';
  if(m.round&&ROUND_LABEL[m.round]){
    var rl=document.createElement('div');rl.className='fix-round-text'+(m.round==='final'?' fix-round-final':'');
    rl.textContent=ROUND_LABEL[m.round];z3top.appendChild(rl);
  }

  // 중앙 하단: VS/스코어
  var z3bot=document.createElement('div');z3bot.className='fix-z3bot';
  var sb=document.createElement('div');sb.className='fix-score-box';
  if(hasScore){
    var sd=document.createElement('div');sd.className='fix-score';
    var arsS2=isArsHome?hs:as_; var oppS2=isArsHome?as_:hs;
    sd.style.color=arsS2>oppS2?'#22C55E':arsS2===oppS2?'#F59E0B':'#EF4444';
    sd.textContent=hs+' : '+as_;sb.appendChild(sd);
  } else if(isLive){
    var ld=document.createElement('div');ld.className='fix-score';ld.style.color='#22C55E';
    ld.textContent=(hs||0)+' : '+(as_||0);sb.appendChild(ld);
  } else {
    var vd=document.createElement('div');vd.className='fix-vs';vd.textContent='VS';sb.appendChild(vd);
  }
  z3bot.appendChild(sb);

  // 중앙 최하단: HOME/AWAY/NEUTRAL 라벨
  var z3label=document.createElement('div');z3label.className='fix-z3label';
  if(!isLive){
    var vlabel=document.createElement('div');vlabel.className='fix-vs-label';
    vlabel.textContent=isNeutral?'NEUTRAL':(isArsHome?'HOME':'AWAY');
    vlabel.style.color=hasScore?'var(--text-muted)':(isNeutral?'var(--gold)':(isArsHome?'var(--red)':'#3a5a8c'));
    z3label.appendChild(vlabel);
  }

  // 우상단: 날짜
  var z4=document.createElement('div');z4.className='fix-z4';
  var ds=document.createElement('span');ds.className='fix-date'+(isLive?' live-tag':'');
  ds.textContent=isLive?'● LIVE':formatDate(m.utcDate||m.date,m.tbd);
  z4.appendChild(ds);

  // 우하단: 어웨이팀
  var z5=document.createElement('div');z5.className='fix-z5';
  var ad=document.createElement('div');ad.className='fix-team-away';
  var an=document.createElement('div');an.className='t-name-away';
  an.textContent=m.awayTeam.shortName||m.awayTeam.displayName||m.awayTeam.name||'';
  ad.appendChild(an);ad.appendChild(renderCrest(makeCrest(m.awayTeam,!isArsHome)));
  z5.appendChild(ad);

  grid.appendChild(z1);grid.appendChild(z3top);grid.appendChild(z4);
  grid.appendChild(z2);grid.appendChild(z3bot);grid.appendChild(z5);
  grid.appendChild(z3label);
  card.appendChild(grid);
  if(isLive){
    var clk=document.createElement('div');
    clk.className='fix-live-clock';
    clk.style.color=m.isHT?'#F59E0B':'#22C55E';
    clk.textContent=m.isHT?'HT':(m.clock||'');
    card.appendChild(clk);
  }
  if(m.venue&&isLive){
    var venueWrap=document.createElement('div');
    venueWrap.className='fix-venue';
    venueWrap.id='fix-venue-'+m.id;
    venueWrap.innerHTML='<span>📍 '+m.venue+'</span>';
    card.appendChild(venueWrap);
  }
  if(isLive && m.id){
    // 라이브 카드 - 확장 패널
    // 항상 보이는 프로그레스바 영역
    var progressWrap = document.createElement('div');
    progressWrap.style.cssText = 'padding:6px 14px 2px;display:flex;align-items:center;gap:8px;';
    progressWrap.innerHTML =
      '<span style="font-size:9px;color:var(--text-dim);">갱신</span>'+
      '<div style="flex:1;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;">'+
        '<div class="live-progress-bar" id="lpb-'+m.id+'" style="width:0%"></div>'+
      '</div>'+
      '<span class="live-progress-label" id="lpl-'+m.id+'">--</span>';
    card.appendChild(progressWrap);

    var expandPanel = document.createElement('div');
    expandPanel.className = 'fix-live-expand';
    expandPanel.id = 'live-expand-'+m.id;
    card.appendChild(expandPanel);

    var expandBtn = document.createElement('button');
    expandBtn.className = 'fix-expand-btn';
    expandBtn.textContent = '▼ 상세 보기';
    card.appendChild(expandBtn);

    // 카드 생성 시 바로 프로그레스바 시작
    _liveExpandTimers[m.id] = {};
    startProgressBar(m.id);

    expandBtn.onclick = function(e){
      e.stopPropagation();
      var isOpen = expandPanel.classList.contains('open');
      if(!isOpen){
        openLiveExpand(m, expandPanel);
        expandPanel.classList.add('open');
        expandBtn.textContent = '▲ 접기';
        startLiveExpandPolling(m, expandPanel);
      } else {
        expandPanel.classList.remove('open');
        expandBtn.textContent = '▼ 상세 보기';
        setTimeout(function(){
          expandPanel.innerHTML='';
          // 상세 폴링만 중단, progress bar는 유지
          var st = _liveExpandTimers[m.id];
          if(st){ if(st.timer){ clearInterval(st.timer); st.timer=null; } }
        }, 350);
      }
    };
  }
  if(isDone && m.id){
    card.style.cursor='pointer';
    card.onclick=function(){openMatchModal(m);};
  }
  return card;
}

function loadFixtures(){
  var upEl=document.getElementById('upcomingList');
  var badge=document.getElementById('fixBadge');
  apiFetch(FN+'/football?type=fixtures').then(function(data){
    badge.textContent='ESPN';
    var upcomingAll=data.upcoming||[];
    // PL 경기 날짜순 정렬 후 유효한 경기에만 라운드 번호 부여 (연기/취소 제외)
    var allPL=[...(data.finished||[]),...(data.upcoming||[])]
      .filter(function(m){return m.competition&&m.competition.short==='PL';})
      .sort(function(a,b){return new Date(a.utcDate)-new Date(b.utcDate);});
    var round=1;
    allPL.forEach(function(m){
      if(m.tbd==='postponed'||m.tbd==='canceled'){m.round=null;return;}
      m.round='pl'+round;
      ROUND_LABEL['pl'+round]=round+'라운드';
      round++;
    });
    window._allMatchesForCal = data.matches||[];
    if(document.querySelector('.fix-view-btn[data-view="cal"]').classList.contains('active')) renderCalendarMonth();
    function renderList(el,showList,allList){
      el.innerHTML='';
      if(!showList.length){el.innerHTML='<div style="color:var(--text-dim);font-size:12px;padding:12px 4px">데이터 없음</div>';return;}
      var expanded=false;
      showList.forEach(function(m){el.appendChild(buildFixCard(m));});
      if(allList.length>showList.length){
        var btn=document.createElement('button');btn.className='more-fix-btn';
        btn.textContent='↓ 더보기 ('+(allList.length-showList.length)+'개 더)';
        btn.onclick=function(){
          if(!expanded){expanded=true;el.innerHTML='';
            allList.forEach(function(m){el.appendChild(buildFixCard(m));});
            var col=document.createElement('button');col.className='more-fix-btn';
            col.textContent='↑ 접기';
            col.onclick=function(){expanded=false;renderList(el,showList,allList);};
            el.appendChild(col);}
        };el.appendChild(btn);}
    }
    renderList(upEl,upcomingAll.slice(0,3),upcomingAll);
    initResultsNav(data.finished||[]);
    renderDday(upcomingAll);
    // 라이브 경기 있으면 폴링 시작
    if((data.matches||[]).some(function(m){return m.status==='IN_PLAY';})) startLivePolling();
    else stopLivePolling();
  }).catch(function(err){showErr(upEl,err.message);badge.textContent='오류';});
}

// ── 최근 결과: 연도/월 선택형 조회 ──
// 몇 년도까지 데이터가 있는지 하드코딩하지 않음 — 시즌을 조회했는데
// 통째로 비어있으면 그게 곧 데이터가 없는 경계라고 판단한다.
var _resultsYear, _resultsMonth;
var _resultsCache = {}; // 시즌 시작년도 -> 그 시즌 종료 경기 배열
function resultsSeasonForYM(year, month){ return month>=8 ? year : year-1; }
function updateResultsLabel(){
  document.getElementById('resultsLabel').textContent = _resultsYear+'년 '+_resultsMonth+'월';
  var inp = document.getElementById('resultsMonthInput');
  if(inp) inp.value = _resultsYear+'-'+(_resultsMonth<10?'0':'')+_resultsMonth;
}
function getSeasonMatches(season){
  if(_resultsCache[season]) return Promise.resolve(_resultsCache[season]);
  return apiFetch(FN+'/football?type=results&season='+season).then(function(data){
    var m = data.matches||[];
    _resultsCache[season] = m;
    return m;
  });
}
function monthMatchesFrom(seasonMatches, year, month){
  return seasonMatches.filter(function(m){
    if(!m.utcDate) return false;
    var p = kstParts(new Date(m.utcDate).getTime());
    return p.y===year && (p.m+1)===month;
  }).sort(function(a,b){return new Date(b.utcDate)-new Date(a.utcDate);});
}
function renderMatches(matches){
  var fnEl = document.getElementById('finishedList');
  var countEl = document.getElementById('resultsCount');
  countEl.textContent = matches.length ? matches.length+'경기' : '';
  fnEl.innerHTML='';
  matches.forEach(function(m){ fnEl.appendChild(buildFixCard(m)); });
}
function initResultsNav(finishedAll){
  _resultsCache = {};
  finishedAll.forEach(function(m){
    if(!m.utcDate) return;
    var p = kstParts(new Date(m.utcDate).getTime());
    var sy = resultsSeasonForYM(p.y, p.m+1);
    (_resultsCache[sy] = _resultsCache[sy] || []).push(m);
  });
  if(_resultsYear===undefined){
    var sorted = finishedAll.filter(function(m){return !!m.utcDate;})
      .slice().sort(function(a,b){return new Date(b.utcDate)-new Date(a.utcDate);});
    var now = new Date();
    if(sorted.length){
      var p2 = kstParts(new Date(sorted[0].utcDate).getTime());
      _resultsYear = p2.y; _resultsMonth = p2.m+1;
    } else {
      _resultsYear = now.getFullYear(); _resultsMonth = now.getMonth()+1;
    }
  }
  updateResultsLabel();
  var season = resultsSeasonForYM(_resultsYear, _resultsMonth);
  getSeasonMatches(season).then(function(seasonMatches){
    renderMatches(monthMatchesFrom(seasonMatches, _resultsYear, _resultsMonth));
  });
}
function resultsMonthInputChanged(){
  var v = document.getElementById('resultsMonthInput').value; // "YYYY-MM"
  if(!v) return;
  var parts = v.split('-');
  _resultsYear = parseInt(parts[0],10);
  _resultsMonth = parseInt(parts[1],10);
  updateResultsLabel();
  document.getElementById('finishedList').innerHTML='<div class="loading-state"><div class="spinner"></div></div>';
  document.getElementById('resultsCount').textContent='';
  var season = resultsSeasonForYM(_resultsYear, _resultsMonth);
  getSeasonMatches(season).then(function(seasonMatches){
    renderMatches(monthMatchesFrom(seasonMatches, _resultsYear, _resultsMonth));
  });
}
// 화살표 이동은 경기 없는 달을 자동으로 건너뛰고, 시즌 자체가 완전히
// 비어있으면(=더 과거 데이터가 없음) 거기서 멈춘다.
function resultsChangeMonth(delta){
  document.getElementById('finishedList').innerHTML='<div class="loading-state"><div class="spinner"></div></div>';
  document.getElementById('resultsCount').textContent='';
  var attempts = 0;
  function step(){
    _resultsMonth += delta;
    if(_resultsMonth>12){_resultsMonth=1;_resultsYear++;}
    else if(_resultsMonth<1){_resultsMonth=12;_resultsYear--;}
    attempts++;
    var season = resultsSeasonForYM(_resultsYear, _resultsMonth);
    return getSeasonMatches(season).then(function(seasonMatches){
      updateResultsLabel();
      if(seasonMatches.length===0 || attempts>=60) return null;
      var mm = monthMatchesFrom(seasonMatches, _resultsYear, _resultsMonth);
      return mm.length ? mm : step();
    });
  }
  step().then(function(matches){
    if(!matches){
      document.getElementById('resultsCount').textContent='더 이상 기록 없음';
      document.getElementById('finishedList').innerHTML='';
      return;
    }
    renderMatches(matches);
  });
}

// ── 예정 경기 달력 보기 ──
var _calDate = new Date();
function kstParts(ts){
  var KST=9*60*60*1000;
  var d=new Date(ts+KST);
  return {y:d.getUTCFullYear(), m:d.getUTCMonth(), d:d.getUTCDate()};
}
function switchFixView(view){
  document.querySelectorAll('.fix-view-btn').forEach(function(b){b.classList.toggle('active', b.getAttribute('data-view')===view);});
  document.getElementById('upcomingList').style.display = view==='list' ? '' : 'none';
  document.getElementById('upcomingCalView').style.display = view==='cal' ? '' : 'none';
  if(view==='cal') calGoToNearestMatch();
}
function calChangeMonth(delta){
  _calDate.setMonth(_calDate.getMonth()+delta);
  renderCalendarMonth();
}
function calGoToNearestMatch(){
  var matches = (window._allMatchesForCal||[]).filter(function(m){return !!m.utcDate;});
  var nearest = null, nearestDiff = Infinity;
  var now = Date.now();
  matches.forEach(function(m){
    var diff = Math.abs(new Date(m.utcDate).getTime()-now);
    if(diff<nearestDiff){ nearestDiff=diff; nearest=m; }
  });
  if(nearest){
    var dt = new Date(nearest.utcDate);
    var p = kstParts(dt.getTime());
    _calDate = new Date(p.y, p.m, 1);
    renderCalendarMonth();
    var firstDow = new Date(p.y, p.m, 1).getDay();
    var cell = document.getElementById('calGrid').children[firstDow+p.d-1];
    if(cell) cell.click();
  } else {
    renderCalendarMonth();
  }
}
function renderCalendarMonth(){
  var matches = window._allMatchesForCal || [];
  var year = _calDate.getFullYear(), month = _calDate.getMonth();
  document.getElementById('calMonthLabel').textContent = year+'년 '+(month+1)+'월';

  var byDay = {};
  matches.forEach(function(m){
    if(!m.utcDate) return;
    var p = kstParts(new Date(m.utcDate).getTime());
    if(p.y===year && p.m===month){
      (byDay[p.d] = byDay[p.d] || []).push(m);
    }
  });

  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  var firstDow = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month+1, 0).getDate();
  var todayParts = kstParts(Date.now());
  var ARSENAL_ESPN='359';

  for(var i=0;i<firstDow;i++){ grid.appendChild(document.createElement('div')); }

  for(var d=1; d<=daysInMonth; d++){
    var dayMatches = byDay[d] || [];
    var cell = document.createElement('div');
    cell.className = 'cal-day';
    var dow = (firstDow + d - 1) % 7;
    if(dow===0) cell.classList.add('cal-day-sun');
    else if(dow===6) cell.classList.add('cal-day-sat');
    var isToday = (todayParts.y===year && todayParts.m===month && todayParts.d===d);
    if(isToday) cell.classList.add('today');

    var dnum = document.createElement('div'); dnum.className='cal-day-num'; dnum.textContent=d;
    cell.appendChild(dnum);

    if(dayMatches.length){
      var m = dayMatches[0];
      var isArsHome = m.homeTeam && (m.homeTeam.id===57 || m.homeTeam.id===ARSENAL_ESPN || (m.homeTeam.name||'').includes('Arsenal'));
      var calCode = (m.competition&&m.competition.short)||'PL';
      var isNeutral = m.neutralSite===true||(m.competition&&m.competition.short==='CS')||m.round==='final'||(calCode==='FR'&&isArsHome&&m.venue&&m.venue!=='Emirates Stadium');
      var opp = isArsHome ? m.awayTeam : m.homeTeam;
      cell.classList.add('has-fixture');
      if(isNeutral) cell.classList.add('neutral-fixture');
      else if(!isArsHome) cell.classList.add('away-fixture');
      var crestWrap = document.createElement('div'); crestWrap.className='cal-day-crest-wrap';
      var crestEl = renderCrest(makeCrest(opp||{}, false));
      crestWrap.appendChild(crestEl);
      cell.appendChild(crestWrap);
      var timeEl = document.createElement('div'); timeEl.className='cal-day-time';
      var dt = new Date(m.utcDate);
      timeEl.textContent = dt.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false});
      cell.appendChild(timeEl);

      (function(ms){
        cell.onclick = function(){
          document.querySelectorAll('.cal-day').forEach(function(c){c.classList.remove('selected');});
          this.classList.add('selected');
          var detail = document.getElementById('calDetail');
          detail.innerHTML='';
          ms.forEach(function(mm){ detail.appendChild(buildFixCard(mm)); });
        };
      })(dayMatches);
    }

    grid.appendChild(cell);
  }
}

function loadStandings(){
  var el=document.getElementById('stdList');
  apiFetch(FN+'/football?type=standings').then(function(data){
    if(data.season) document.getElementById('stdMatchday').textContent=data.season+'R';
    allStandings=data.standings||[];
    renderStandings();
  }).catch(function(err){showErr(el,err.message);});
}
function renderStandings(){
  var el=document.getElementById('stdList');
  var btn=document.getElementById('moreStdBtn');
  var visible=stdExpanded?allStandings:allStandings.slice(0,10);
  el.innerHTML='';
  visible.forEach(function(s){
    var row=document.createElement('div');row.className='std-row'+(s.isArsenal?' afc-row':'');
    var pos=document.createElement('span');pos.className='std-pos';pos.textContent=s.position;
    var team=document.createElement('div');team.className='std-team';
    if(s.team.crest){var img=document.createElement('img');img.className='std-crest';img.src=s.team.crest;img.alt='';img.onerror=function(){this.style.display='none';};team.appendChild(img);}
    var nm=document.createElement('span');nm.textContent=s.team.shortName||s.team.name;team.appendChild(nm);
    var pg=document.createElement('span');pg.className='std-s';pg.textContent=s.playedGames;
    var w=document.createElement('span');w.className='std-s';w.textContent=s.won;

function renderSq(filter){
  var el=document.getElementById('sqGrid');
  var SQ_GROUP_ORDER={GK:0,DF:1,MF:2,FW:3};
  var list=filter==='all'?allPlayers.slice().sort(function(a,b){return (SQ_GROUP_ORDER[a.posGroup]??9)-(SQ_GROUP_ORDER[b.posGroup]??9);}):allPlayers.filter(function(p){return p.posGroup===filter;});
  if(!list.length){el.innerHTML='<div class="loading-state" style="grid-column:1/-1">선수 데이터 없음</div>';return;}
  el.innerHTML='';

  // positionKey → 포지션 약자 변환
  var POS_SHORT={
    'keeper_long':'GK','goalkeeper':'GK',
    'rightback':'RB','leftback':'LB','centerback':'CB','centreback':'CB',
    'right_wing_back':'RWB','left_wing_back':'LWB',
    'centermidfielder':'CM','centremidfielder':'CM',
    'centerdefensivemidfielder':'DM','centredefensivemidfielder':'DM','defensivemidfielder':'DM',
    'attackingmidfielder':'AM','centreattackingmidfielder':'AM',
    'rightmidfielder':'RM','leftmidfielder':'LM',
    'rightwinger':'RW','leftwinger':'LW','rightwing':'RW','leftwing':'LW',
    'right_wing_back':'RWB','left_wing_back':'LWB',
    'striker':'ST','centreforward':'ST','centerforward':'ST',
  };
  var POS_GROUP_CLS={GK:'gk',DF:'df',MF:'mf',FW:'fw'};

  list.forEach(function(p){
    var posKey=(p.position||'').toLowerCase().replace(/_/g,'').replace(/-/g,'').replace(/ /g,'');
    var posShort=POS_SHORT[posKey]||p.posGroup||'';
    var leftCls=POS_GROUP_CLS[p.posGroup]||'df';
    var jersey=p.jersey||'';

    var card=document.createElement('div');
    card.className='pl-card';
    card.style.outline='2px solid '+(POS_BORDER[p.posGroup]||'rgba(255,255,255,0.1)');
    card.style.outlineOffset='-1px';
    card.onclick=function(){openPlayerModal(p);};

    // 상단
    var top=document.createElement('div');top.className='pl-top';

    // 좌측 (포지션+번호)
    var left=document.createElement('div');left.className='pl-left '+leftCls;

    var numEl=document.createElement('span');numEl.className='pl-num-txt';numEl.textContent=jersey||'–';
    left.appendChild(posEl);left.appendChild(numEl);

    // 우측 (사진)

    if(p.photo){
      photoBox.className='pl-photo-box';
      var img=document.createElement('img');img.src=p.photo;img.alt=p.name;
      img.onerror=function(){
        photoBox.className='pl-photo-box no-img';
        photoBox.innerHTML='⚽';
        photoBox.removeChild(img);
      };
      photoBox.appendChild(img);
    } else {
      photoBox.className='pl-photo-box no-img';
      photoBox.textContent='⚽';
    }

    top.appendChild(left);top.appendChild(photoBox);

    // 구분선
    var div=document.createElement('div');div.className='pl-card-divider';

    // 이름
    var nm=document.createElement('div');nm.className='pl-card-name';nm.textContent=p.name;

    card.appendChild(top);card.appendChild(div);card.appendChild(nm);

    if(isContractSoon(p.contractEnd)){
      var cBadge=document.createElement('div');cBadge.className='pl-contract-badge';
      cBadge.textContent='⏳ '+p.contractEnd.slice(2,4)+'년 만료';
      card.appendChild(cBadge);

    el.appendChild(card);
  });

function renderHistoryNew(){
  var el = document.getElementById('historyContent');
  var html = '';

  // ── On This Day 카드 (항상 상단) ──
  var otdData = window._otdData || [];
  var today = new Date();
  var mm = String(today.getMonth()+1).padStart(2,'0');
  var dd = String(today.getDate()).padStart(2,'0');
  var todayMD = mm+'-'+dd;
  var todayItems = otdData.filter(function(d){ return d.month_day === todayMD; });
  var otdItem = todayItems.length
    ? todayItems[Math.floor(Math.random()*todayItems.length)]
    : (otdData.length ? otdData[Math.floor(Math.random()*otdData.length)] : null);

  if(otdItem){
    var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var otdMD = (otdItem.month_day||todayMD).split('-');
    var monthStr = MONTHS[parseInt(otdMD[0])-1] || '';
    var dayStr = parseInt(otdMD[1]) || parseInt(dd);
    var yr = otdItem.year || 0;
    var yearsAgo = yr ? (today.getFullYear() - yr) : 0;
    var enc = encodeURIComponent(JSON.stringify(otdItem)).replace(/'/g, '%27');
    html += '<div class="hist-otd-wrap"><div class="hist-otd-card" onclick="openOtdModal(\'' + enc + '\')">';
    html += '<div class="hist-otd-tag">ON THIS DAY</div>';
    html += '<div class="hist-otd-date-row">';
    html += '<div class="hist-otd-date">'+dayStr+' '+monthStr+(yr?' '+yr:'')+'</div>';
    if(yearsAgo>0) html += '<div class="hist-otd-years-ago">'+yearsAgo+'년전 오늘</div>';
    html += '</div>';
    html += '<div class="hist-otd-title">'+otdItem.title+'</div>';
    if(otdItem.summary) html += '<div class="hist-otd-summary">'+otdItem.summary+'</div>';
    html += '</div></div>';
  }

  // ── 탭 내비게이션 ──
  html += '<div class="hist-nav">';
  HIST_TABS.forEach(function(tab){
    html += '<button class="hist-nav-btn'+(_histTab===tab?' active':'')+'" data-tab="'+tab+'" onclick="switchHistTab(\'' + tab + '\')">';
    html += HIST_TAB_ICONS[tab];
    html += HIST_TAB_LABELS[tab];
    html += '</button>';
  });
  html += '</div>';

  // ── 탭 콘텐츠 ──
  html += '<div class="hist-section" id="histSection">';
  html += renderHistSection(_histTab);
  html += '</div>';

  el.innerHTML = html;
  initDragScroll(document.querySelector('.hist-nav'));
}

function initDragScroll(el){
  if(!el) return;
  var isDown = false, startX, scrollLeft;
  el.addEventListener('mousedown', function(e){
    isDown = true; el.style.cursor='grabbing';
    startX = e.pageX - el.offsetLeft;
    scrollLeft = el.scrollLeft;
  });
  el.addEventListener('mouseleave', function(){ isDown=false; el.style.cursor=''; });
  el.addEventListener('mouseup', function(){ isDown=false; el.style.cursor=''; });
  el.addEventListener('mousemove', function(e){
    if(!isDown) return;
    e.preventDefault();
    el.scrollLeft = scrollLeft - (e.pageX - el.offsetLeft - startX);
  });
  el.addEventListener('wheel', function(e){
    if(e.deltaY !== 0){ e.preventDefault(); el.scrollLeft += e.deltaY; }
  }, {passive:false});
}

function switchHistTab(tab){
  _histTab = tab;
  document.querySelectorAll('.hist-nav-btn').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-tab') === tab);
  });
  document.getElementById('histSection').innerHTML = renderHistSection(tab);
}

function renderHistSection(tab){
  if(tab === 'TROPHIES') return renderTrophiesSection();
  if(tab === 'MANAGERS') return renderManagersSection();
  if(tab === 'LEGENDS')  return renderLegendsSection();
  if(tab === 'TIMELINE') return renderTimelineSection();
  if(tab === 'RECORDS')  return renderRecordsSection();
  if(tab === 'STADIUM')  return renderStadiumSection();
  if(tab === 'MOMENTS')  return renderMomentsSection();
  return '<div style="padding:40px;text-align:center;color:var(--text-dim);font-size:13px;">준비 중...</div>';
}

function openTimelineModal(enc){
  var d = JSON.parse(decodeURIComponent(enc));
  var tlData = window._timelineData || [];
  var color = TIMELINE_COLORS[tlData.findIndex(function(x){return x.year===d.year;}) % TIMELINE_COLORS.length];
  var html = '';
  html += '<div style="width:100%;aspect-ratio:16/9;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:56px;color:rgba(255,255,255,.15);margin:14px 0 0">';

  else html += d.icon;
  html += '</div>';
  html += '<div style="padding:16px 18px 0">';
  html += '<div style="font-size:13px;font-weight:800;letter-spacing:1px;margin-bottom:4px;color:'+color+'">'+d.year+'</div>';
  html += '<div style="font-size:20px;font-weight:900;color:var(--text);line-height:1.3;margin-bottom:14px">'+d.title+'</div>';
  html += '<div style="font-size:12px;font-weight:700;color:var(--gold);margin-bottom:14px;padding:8px 10px;background:rgba(200,168,75,.08);border-radius:8px;border:1px solid rgba(200,168,75,.15)">'+d.person+'</div>';
  var eventHtml = (d.event||'').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');

var REC_TABS = [
  {key:'appearances', label:'출전 & 관중'},
  {key:'goalscorers', label:'득점 기록'},
  {key:'scorelines',  label:'스코어라인'},
  {key:'firsts',      label:'최초 기록'},
  {key:'unbeaten49',  label:'49경기 무패'},
  {key:'nld',         label:'vs 토트넘'}
];
var _recTab = 'appearances';

function renderRecordsSection(){
  var DATA = window._recordsData || {};
  var html = '';
  // 서브 탭
  html += '<div class="rec-subnav" id="recSubnav">';
  REC_TABS.forEach(function(t){
    html += '<button class="rec-subnav-btn'+(_recTab===t.key?' active':'')+'" onclick="switchRecTab(\''+t.key+'\')">'+t.label+'</button>';
  });
  html += '</div>';
  html += '<div id="recSection">'+renderRecTab(_recTab, DATA)+'</div>';
  setTimeout(function(){ initDragScroll(document.getElementById('recSubnav')); }, 0);
  return html;
}

function switchRecTab(key){
  _recTab = key;
  document.querySelectorAll('.rec-subnav-btn').forEach(function(b){
    b.classList.toggle('active', b.textContent.trim() === REC_TABS.find(function(t){return t.key===key;}).label);
  });
  var DATA = window._recordsData || {};
  document.getElementById('recSection').innerHTML = renderRecTab(key, DATA);
  var nav = document.getElementById('recSubnav');
  if(nav) initDragScroll(nav);
}

function renderRecTab(key, DATA){
  var sec = DATA[key];
  if(!sec || !sec.groups || !sec.groups.length){
    return '<div style="padding:40px;text-align:center;color:var(--text-dim);font-size:13px;">준비 중...</div>';
  }
  var html = '<div style="padding-bottom:24px;">';
  sec.groups.forEach(function(g){
    html += '<div class="rec-group">';
    if(g.title) html += '<div class="rec-group-title">'+g.title+'</div>';
    (g.rows||[]).forEach(function(r){
      var cls = r.highlight ? 'rec-row rec-highlight' : 'rec-row';
      html += '<div class="'+cls+'">';
      html += '<div><div class="rec-label">'+r.label+'</div>';
      if(r.note) html += '<div class="rec-note">'+r.note+'</div>';
      html += '</div>';
      html += '<div class="rec-value">'+r.value+'</div>';
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div>';
  return html;
}

    html += '<div class="trophy-modal-keystat" style="margin:14px 0 0;"><span class="trophy-modal-keystat-icon">⭐</span>'+t.key_stat+'</div>';
  }

  if(t.year_groups && t.year_groups.length){

        html += '<span style="font-family:var(--fd);font-size:15px;font-weight:800;color:var(--red);min-width:52px;">'+y+'</span>';
        html += '</div>';
      });
      html += '</div>';
    });
  } else if(t.years_detail && t.years_detail.length){
    html += '<div class="trophy-modal-years-label" style="padding:14px 0 8px 0;">우승 연도</div>';
    html += '<div style="display:flex;flex-direction:column;gap:0;">';
    t.years_detail.forEach(function(d, i){
      var isLast = i === t.years_detail.length - 1;
      html += '<div style="display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid var(--border)'+(isLast?';border-bottom:none':'')+'">';
      html += '<span style="font-family:var(--fd);font-size:15px;font-weight:800;color:var(--red);min-width:36px;">'+d.year+'</span>';
      html += '<span style="font-size:12px;color:var(--text-muted);">'+d.final+'</span>';
      html += '</div>';
    });
    html += '</div>';
  } else if(t.years && t.years.length){
    html += '<div class="trophy-modal-years-label" style="padding:14px 0 8px 0;">우승 연도</div>';
    html += '<div class="trophy-years-chips" style="padding:0;">';
    var lastYear = t.years[t.years.length-1];
    t.years.forEach(function(y){
      html += '<span class="trophy-year-chip'+(y===lastYear?' latest':'')+'">'+y+'</span>';
    });
    html += '</div>';
  }

  if(t.link){
    html += '<a href="'+t.link+'" target="_blank" rel="noopener" style="display:block;margin-top:16px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--text-dim);text-decoration:none;text-align:center;">🔗 아스날 공식 히스토리 보기</a>';
  }

  html += '</div>';
  content.innerHTML = html;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
  window.history.pushState({modal:'hist'},'','#hist-modal');
  requestAnimationFrame(function(){ content.scrollTop = 0; });
}

function loadNews(){
  var el=document.getElementById('newsGrid');
  var badge=document.getElementById('newsBadge')||document.getElementById('mediaBadge');
  var mediaBadgeEl=document.getElementById('mediaBadge');
  apiFetch(FN+'/news').then(function(data){
    badge.textContent=data.source||'RSS';
    if(mediaBadgeEl) mediaBadgeEl.textContent='ESPN+';
    var articles=data.articles||[];
    if(!articles.length){el.innerHTML='<div class="loading-state">\uB274\uC2A4 \uC5C6\uC74C</div>';return;}
    el.innerHTML='';
    articles.forEach(function(a){
      var card=document.createElement('a');card.className='news-card';card.href=a.url||'#';card.target='_blank';card.rel='noopener';
      var imgDiv=document.createElement('div');imgDiv.className='news-img';
      var srcBdg=document.createElement('div');srcBdg.className='news-src-badge';srcBdg.textContent=a.source||'RSS';
      var validImg=(a.image||a.urlToImage)&&typeof (a.image||a.urlToImage)==='string'&&(a.image||a.urlToImage).startsWith('http');
      if(validImg){
        var img=document.createElement('img');img.src=a.image||a.urlToImage;img.alt='';
        img.onerror=function(){var ph=document.createElement('div');ph.className='news-img-ph';ph.textContent='📰';imgDiv.replaceChild(ph,this);imgDiv.appendChild(srcBdg);};
        imgDiv.appendChild(img);
      } else {
        var ph=document.createElement('div');ph.className='news-img-ph';ph.textContent='📰';imgDiv.appendChild(ph);
      }
      imgDiv.appendChild(srcBdg);
      var body=document.createElement('div');body.className='news-body';
      var hl=document.createElement('div');hl.className='news-hl';hl.textContent=a.title||'';
      var ex=document.createElement('div');ex.className='news-ex';ex.textContent=a.description||'';
      var ft=document.createElement('div');ft.className='news-foot';
      ft.innerHTML='<span>&#128336; '+(a.timeAgo||'')+'</span><span style="color:var(--red);font-weight:700">\uC77D\uAE30 \u2192</span>';
      body.appendChild(hl);body.appendChild(ex);body.appendChild(ft);
      card.appendChild(imgDiv);card.appendChild(body);el.appendChild(card);
    });
  }).catch(function(err){showErr(el,err.message);badge.textContent='\uC624\uB958';});
}

// ── SNS (Bluesky) ──
function loadSns(){
  var el=document.getElementById('snsGrid');
  var badge=document.getElementById('snsBadge')||document.getElementById('mediaBadge');
  apiFetch(FN+'/social').then(function(data){
    var posts=data.posts||[];
    if(badge) badge.textContent=posts.length+'개';
    if(!posts.length){el.innerHTML='<div class="loading-state">포스트 없음</div>';return;}
    el.innerHTML='';
    posts.forEach(function(p){
      var a=document.createElement('a');
      a.className='sns-post';
      a.href=p.url||'#';
      a.target='_blank';
      a.rel='noopener';

      // 헤더 (아바타 + 작성자 + 시간)
      var head=document.createElement('div');head.className='sns-post-head';
      var av=document.createElement('div');av.className='sns-avatar';
      av.textContent=(p.author.name||'?').charAt(0).toUpperCase();
      var authorDiv=document.createElement('div');authorDiv.className='sns-author';
      var nameEl=document.createElement('div');nameEl.className='sns-author-name';nameEl.textContent=p.author.name||'';
      var labelEl=document.createElement('div');labelEl.className='sns-author-label';labelEl.textContent=p.author.label||'';
      authorDiv.appendChild(nameEl);authorDiv.appendChild(labelEl);
      var timeEl=document.createElement('div');timeEl.className='sns-time';timeEl.textContent=p.timeAgo||'';
      head.appendChild(av);head.appendChild(authorDiv);head.appendChild(timeEl);

      // 본문
      var body=document.createElement('div');body.className='sns-body';
      var txt=document.createElement('div');txt.className='sns-text';txt.textContent=p.text||'';
      body.appendChild(txt);

      // 이미지
      var imgEl=null;
      if(p.image){
        imgEl=document.createElement('img');
        imgEl.className='sns-image';
        imgEl.src=p.image;
        imgEl.alt='';
        imgEl.onerror=function(){this.style.display='none';};
      }

      // 푸터 (좋아요, 리포스트, 댓글 + Bluesky 배지)
      var foot=document.createElement('div');foot.className='sns-foot';
      foot.innerHTML=
        '<span class="sns-stat">♥ '+p.likes+'</span>'+
        '<span class="sns-stat">↺ '+p.reposts+'</span>'+
        '<span class="sns-stat">💬 '+p.replies+'</span>'+
        '<span class="sns-bsky-badge">🦋 Bluesky</span>';

      a.appendChild(head);
      a.appendChild(body);
      if(imgEl) a.appendChild(imgEl);
      a.appendChild(foot);
      el.appendChild(a);
    });
  }).catch(function(err){
    el.innerHTML='<div class="loading-state">오류: '+err.message+'</div>';
    if(badge) badge.textContent='오류';
  });
}

function renderMatchModal(content, m, data){
  var h=data.homeTeam, a=data.awayTeam;
  var ARSENAL_ID='359';
  var isArsHome=(h.id===ARSENAL_ID||(h.name||'').includes('Arsenal'));
  var EVENT_ICON={goal:'⚽',pen_goal:'⚽(P)',own_goal:'🔴(OG)',red_card:'🟥'};
  var EVENT_ICON_AWAY={goal:'⚽',pen_goal:'(P)⚽',own_goal:'(OG)🔴',red_card:'🟥'};

  var scoreColor=isArsHome?(h.score>a.score?'#22C55E':h.score===a.score?'#F59E0B':'#EF4444'):(a.score>h.score?'#22C55E':a.score===h.score?'#F59E0B':'#EF4444');
