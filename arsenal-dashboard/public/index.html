    statKeys.forEach(function(k){
      if(!h.stats[k]&&!a.stats[k]) return;
      var hvStr=h.stats[k]||'0'; var avStr=a.stats[k]||'0';

      var rawH=parseFloat((hvStr+'').replace('%',''))||0;
      var rawA=parseFloat((avStr+'').replace('%',''))||0;
      var isPct=k==='possessionPct'||(hvStr+'').includes('%');
      var total=isPct?100:(rawH+rawA||1);
      var homePct=Math.round(rawH/total*100); var awayPct=100-homePct;
      html+=
        '<div class="mm-stat-val home">'+hvStr+'</div>'+
        '<div class="mm-stat-label">'+(STAT_LABELS[k]||k)+'</div>'+
        '<div class="mm-stat-val away">'+avStr+'</div>'+
        '<div class="mm-stat-bar-wrap">'+
          '<div class="mm-stat-bar-home" style="width:'+homePct+'%"></div>'+
          '<div class="mm-stat-bar-away" style="width:'+awayPct+'%"></div>'+
        '</div>';
    });
    html+='</div></div>';
  }

  // 선수 스탯 탭
  var hP=(data.players&&data.players.home)||[];
  var aP=(data.players&&data.players.away)||[];
  if(hP.length||aP.length){
    // 라인업 피치
    var hFormation=data.players.homeFormation||'';
    var aFormation=data.players.awayFormation||'';
    html+='<div class="mm-card"><div class="mm-card-title">라인업</div>';
    html+='<div class="mm-team-tabs">'+
      '<button class="mm-team-tab active" id="mm-tab-home" onclick="mmSwitchTab(&quot;home&quot;)">'+(h.crest?'<img src="'+h.crest+'" onerror="this.style.display=\'none\'">':'')+'<span>'+h.name+'</span></button>'+
      '<button class="mm-team-tab" id="mm-tab-away" onclick="mmSwitchTab(&quot;away&quot;)">'+(a.crest?'<img src="'+a.crest+'" onerror="this.style.display=\'none\'">':'')+'<span>'+a.name+'</span></button>'+
    '</div>';
    var hColor=(data.homeTeam&&data.homeTeam.color)||'#C8102E';
    var aColor=(data.awayTeam&&data.awayTeam.color)||'#1a3a6c';
    var hStarters=hP.filter(function(p){return p.starter&&p.formationPlace;});
    var aStarters=aP.filter(function(p){return p.starter&&p.formationPlace;});
    if(hStarters.length||aStarters.length){
      var hHeader='<div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:8px 14px;background:#1b4020;"><span style="font-size:11px;color:rgba(255,255,255,0.5);">라인업</span><span style="font-size:13px;font-weight:700;color:#fff;">'+hFormation+'</span><span></span></div>';
      var aHeader='<div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:8px 14px;background:#1b4020;"><span style="font-size:11px;color:rgba(255,255,255,0.5);">라인업</span><span style="font-size:13px;font-weight:700;color:#fff;">'+aFormation+'</span><span></span></div>';
      html+='<div style="margin:8px 14px 8px"><div class="mm-pitch-wrap" id="mm-pitch-home">'+hHeader+renderPitch(hStarters,hFormation,hColor,hP)+'</div></div>';
      html+='<div style="margin:0 14px 8px"><div class="mm-pitch-wrap" id="mm-pitch-away" style="display:none">'+aHeader+renderPitch(aStarters,aFormation,aColor,aP)+'</div></div>';
    }
    html+=renderPlayerTable('home',hP,true)+renderPlayerTable('away',aP,false);
    html+='</div>';
  }

  content.innerHTML=html;
}

function renderPitch(starters, formation, teamColor, allPlayers){
  var W=220, H=300;
  var FIRST_Y=29, LAST_Y=H-29;
  var r=11;
  var fillColor = teamColor||'#C8102E';
  // 유니폼 색 밝기 계산 → 밝은 색이면 검은 텍스트
  var _h=(fillColor||'').replace('#',''); if(_h.length===3)_h=_h[0]+_h[0]+_h[1]+_h[1]+_h[2]+_h[2];
  var _r=parseInt(_h.slice(0,2),16)/255,_g=parseInt(_h.slice(2,4),16)/255,_b=parseInt(_h.slice(4,6),16)/255;
  var lum=0.299*_r+0.587*_g+0.114*_b;
  var jerseyTextColor=lum>0.55?'#111':'#fff';
  var nameTextColor='rgba(255,255,255,0.85)';
  // 유니폼 색 밝기 계산 → 밝은 색이면 검은 텍스트
  function hexLuminance(hex){
    var h=(hex||'').replace('#','');
    if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    if(h.length!==6) return 0;
    var r=parseInt(h.slice(0,2),16)/255;
    var g=parseInt(h.slice(2,4),16)/255;
    var b=parseInt(h.slice(4,6),16)/255;
    // 상대 밝기 (0~1)
    return 0.299*r + 0.587*g + 0.114*b;
  }
  var lum = hexLuminance(fillColor);

  var POS_PRIORITY = {
    'G':0,'GK':0,
    'CB':10,'CD':10,'CD-L':10,'CD-R':10,'LB':10,'RB':10,'LWB':10,'RWB':10,'SW':10,'DC':10,
    'DM':20,'CDM':20,
    'CM':30,'CM-L':30,'CM-R':30,'LM':30,'RM':30,'MF':30,'ML':30,'MR':30,
    'AM':40,'AM-L':40,'AM-R':40,'LAM':40,'RAM':40,'SS':40,
    'CF-L':50,'CF-R':50,'RCF':50,'LCF':50,
    'F':60,'ST':60,'FW':60,'LW':60,'RW':60,'LF':60,'RF':60,'CF':60,
  };
  var POS_ORDER = {
    'LB':-3,'LWB':-3,'LM':-3,
    'CD-L':-2,'CM-L':-2,'AM-L':-2,'CF-L':-2,'LF':-2,'LW':-2,'LAM':-2,
    'CD':-1,'CM':-1,'DM':-1,'AM':-1,'F':-1,'ST':-1,'CF':-1,'G':-1,'GK':-1,
    'CD-R':2,'CM-R':2,'AM-R':2,'CF-R':2,'RCF':2,'RF':2,'RW':2,'RAM':2,
    'RB':3,'RWB':3,'RM':3,
  };

  var rows = formation ? formation.split('-').map(Number) : [4,4,2];
  var expected = [1].concat(rows);

  // ── 포메이션별 fp → {r:row, c:col} 슬롯 테이블 ──
  // r: 0=GK row(아래), 숫자 클수록 위(공격방향)
  // c: 0=왼쪽, 숫자 클수록 오른쪽
  var FORM_MAP = {
    '4-3-3': {
      1:{r:0,c:0},
      3:{r:1,c:0},6:{r:1,c:1},5:{r:1,c:2},2:{r:1,c:3},
      8:{r:2,c:0},4:{r:2,c:1},7:{r:2,c:2},
      11:{r:3,c:0},9:{r:3,c:1},10:{r:3,c:2}
    },
    '4-2-3-1': {
      1:{r:0,c:0},
      3:{r:1,c:0},6:{r:1,c:1},5:{r:1,c:2},2:{r:1,c:3},
      4:{r:2,c:0},8:{r:2,c:1},
      11:{r:3,c:0},10:{r:3,c:1},7:{r:3,c:2},
      9:{r:4,c:0}
    },
    '4-4-2': {
      1:{r:0,c:0},
      3:{r:1,c:0},6:{r:1,c:1},5:{r:1,c:2},2:{r:1,c:3},
      11:{r:2,c:0},4:{r:2,c:1},8:{r:2,c:2},7:{r:2,c:3},
      10:{r:3,c:0},9:{r:3,c:1}
    },
    '4-1-4-1': {
      1:{r:0,c:0},
      3:{r:1,c:0},6:{r:1,c:1},5:{r:1,c:2},2:{r:1,c:3},
      4:{r:2,c:0},
      11:{r:3,c:0},8:{r:3,c:1},10:{r:3,c:2},7:{r:3,c:3},
      9:{r:4,c:0}
    },
    // 3백 공통: CB fp=4(L),5(C),6(R) / LWB=fp3, RWB=fp2
    '3-5-2': {
      1:{r:0,c:0},
      4:{r:1,c:0},5:{r:1,c:1},6:{r:1,c:2},
      3:{r:2,c:0},8:{r:2,c:1},10:{r:2,c:2},7:{r:2,c:3},2:{r:2,c:4},
      11:{r:3,c:0},9:{r:3,c:1}
    },
    '3-4-3': {
      1:{r:0,c:0},
      4:{r:1,c:0},5:{r:1,c:1},6:{r:1,c:2},
      3:{r:2,c:0},8:{r:2,c:1},7:{r:2,c:2},2:{r:2,c:3},
      11:{r:3,c:0},9:{r:3,c:1},10:{r:3,c:2}
    },
    '3-4-2-1': {
      1:{r:0,c:0},
      4:{r:1,c:0},5:{r:1,c:1},6:{r:1,c:2},
      3:{r:2,c:0},8:{r:2,c:1},7:{r:2,c:2},2:{r:2,c:3},
      11:{r:3,c:0},10:{r:3,c:1},
      9:{r:4,c:0}
    },
    '4-3-2-1': {
      1:{r:0,c:0},
      3:{r:1,c:0},6:{r:1,c:1},5:{r:1,c:2},2:{r:1,c:3},
      4:{r:2,c:0},10:{r:2,c:1},8:{r:2,c:2},
      11:{r:3,c:0},7:{r:3,c:1},
      9:{r:4,c:0}
    },
    '5-3-2': {
      1:{r:0,c:0},
      3:{r:1,c:0},6:{r:1,c:1},5:{r:1,c:2},4:{r:1,c:3},2:{r:1,c:4},
      11:{r:2,c:0},8:{r:2,c:1},7:{r:2,c:2},
      10:{r:3,c:0},9:{r:3,c:1}
    },
    '4-5-1': {
      1:{r:0,c:0},
      3:{r:1,c:0},6:{r:1,c:1},5:{r:1,c:2},2:{r:1,c:3},
      11:{r:2,c:0},4:{r:2,c:1},8:{r:2,c:2},10:{r:2,c:3},7:{r:2,c:4},
      9:{r:3,c:0}
    }
  };

  var coords={};
  var formMap = formation ? FORM_MAP[formation] : null;

  if(formMap){
    // ── 포메이션 테이블로 직접 배치 ──
    // row별 col 수 계산
    var rowMeta={};
    Object.keys(formMap).forEach(function(fp){
      var pos=formMap[fp];
      if(!rowMeta[pos.r]) rowMeta[pos.r]={count:0};
      rowMeta[pos.r].count=Math.max(rowMeta[pos.r].count, pos.c+1);
    });
    var rowNums=Object.keys(rowMeta).map(Number).sort(function(a,b){return a-b;});
    var numRows=rowNums.length;

    starters.forEach(function(p){
      var fp=p.formationPlace;
      var slot=fp && formMap[fp];
      if(!slot) return;
      var ri=rowNums.indexOf(slot.r);
      var yRatio=numRows<=1?0:ri/(numRows-1);
      var cy=Math.round(LAST_Y-yRatio*(LAST_Y-FIRST_Y));
      var colCount=rowMeta[slot.r].count;
      var cx=Math.round((W/(colCount+1))*(slot.c+1));
      coords[fp]={x:cx,y:cy};
    });

  } else {
    // ── 폴백: 포메이션 테이블 없으면 POS_PRIORITY 기반 기존 방식 ──
    var sorted=starters.slice().sort(function(a,b){
      var pa=POS_PRIORITY[a.position]!=null?POS_PRIORITY[a.position]:35;
      var pb=POS_PRIORITY[b.position]!=null?POS_PRIORITY[b.position]:35;
      return pa-pb;
    });
    var finalLines=[],idx2=0;
    expected.forEach(function(cnt){
      finalLines.push(sorted.slice(idx2,idx2+cnt));
      idx2+=cnt;
    });
    var totalLines=finalLines.length;
    finalLines.forEach(function(line,li){
      if(!line.length) return;
      var yRatio=totalLines<=1?0:li/(totalLines-1);
      var cy=Math.round(LAST_Y-yRatio*(LAST_Y-FIRST_Y));
      line.forEach(function(p,ci){
        coords[p.formationPlace||('_'+ci)]={x:Math.round((W/(line.length+1))*(ci+1)),y:cy};
      });
    });
  }

  // 교체된 선수 맵 (subbedOut 선수 formationPlace 기준)
  var subbedOutMap={};
  if(allPlayers){
    allPlayers.forEach(function(p){
      if(p.subbedOut&&p.formationPlace) subbedOutMap[p.formationPlace]=true;
    });
  }

  var svg='<svg class="mm-pitch-svg" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  svg+='<rect width="'+W+'" height="'+H+'" fill="#2d5a27"/>';
  svg+='<line x1="0" y1="'+H/2+'" x2="'+W+'" y2="'+H/2+'" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
  svg+='<circle cx="'+W/2+'" cy="'+H/2+'" r="28" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
  svg+='<circle cx="'+W/2+'" cy="'+H/2+'" r="2" fill="rgba(255,255,255,0.4)"/>';
  var bw=W*0.55,bh=32,bx=(W-bw)/2;
  svg+='<rect x="'+bx+'" y="'+(H-bh)+'" width="'+bw+'" height="'+bh+'" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
  svg+='<rect x="'+bx+'" y="0" width="'+bw+'" height="'+bh+'" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
  var pr=18,pcx=W/2;
  // 페널티 반원: 박스 바깥으로, 약 1/3호 (시작/끝 x를 좁혀서 호 범위 제한)
  var arcR=18, arcW=arcR*0.85;
  // 하단 박스 바깥(아래)으로 호: sweep=1
  svg+='<path d="M '+(pcx-arcW)+' '+(H-bh)+' A '+arcR+' '+arcR+' 0 0 1 '+(pcx+arcW)+' '+(H-bh)+'" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
  // 상단 박스 바깥(위)으로 호: sweep=0
  svg+='<path d="M '+(pcx-arcW)+' '+bh+' A '+arcR+' '+arcR+' 0 0 0 '+(pcx+arcW)+' '+bh+'" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';


  starters.forEach(function(p){
    var c=coords[p.formationPlace]; if(!c) return;
    var lastName=(p.name||'').split(' ').pop();
    var wasSubbed=subbedOutMap[p.formationPlace];
    var isGK=p.position==='G'||p.position==='GK';
    var circleColor=isGK?'#888888':fillColor;
    var circleTextColor=isGK?'#fff':jerseyTextColor;
    // 원
    svg+='<circle cx="'+c.x+'" cy="'+c.y+'" r="'+r+'" fill="'+circleColor+'" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>';
    // 등번호
    svg+='<text x="'+c.x+'" y="'+c.y+'" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="700" fill="'+circleTextColor+'" font-family="sans-serif">'+p.jersey+'</text>';
    // 이름
    svg+='<text x="'+c.x+'" y="'+(c.y+r+8)+'" text-anchor="middle" font-size="7.5" font-weight="600" fill="'+nameTextColor+'" font-family="sans-serif">'+lastName+'</text>';
    // 교체 아이콘 (ESPN substitution icon)
    if(wasSubbed){
      var ix=c.x+r-1, iy=c.y-r+1;
      svg+='<circle cx="'+ix+'" cy="'+iy+'" r="4" fill="#EF0107" stroke="#fff" stroke-width="1"/>';
      svg+='<g transform="translate('+(ix-3.36)+','+(iy-3.36)+') scale(0.28)" stroke="#fff" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5l0 14"/><path d="M18 13l-6 6"/><path d="M6 13l6 6"/></g>';
    }
  });
  svg+='</svg>';
  return svg;
}
function getPosBadge(pos){
  var p=(pos||'').toUpperCase();
  if(/^(G|GK)/.test(p)) return '<span class="mm-pos-badge mm-pos-gk">GK</span>';
  if(/^(CB|CD|LB|RB|LWB|RWB|SW|DC)/.test(p)) return '<span class="mm-pos-badge mm-pos-df">DF</span>';
  if(/^(CM|DM|LM|RM|MF|ML|MR|AM)/.test(p)) return '<span class="mm-pos-badge mm-pos-mf">MF</span>';
  if(/^(F|ST|FW|LW|RW|LF|RF|CF|RCF|SS)/.test(p)) return '<span class="mm-pos-badge mm-pos-fw">FW</span>';
  return '<span class="mm-pos-badge mm-pos-sub">'+pos+'</span>';
}
function renderPlayerRow(p){
  var s=p.stats||{};
  // 교체 아웃 선수: 이름 아래에 교체 아이콘 + 시간 + 교체 선수 이름
  var nameCell=getPosBadge(p.position)+(p.name||'')+(p.jersey?' <span style="color:var(--text-dim);font-size:9px">#'+p.jersey+'</span>':'');
  if(p.subbedOut&&p.subTime){
    var subForName=p.subFor?p.subFor.name:'';
    var subForJersey=p.subFor&&p.subFor.jersey?p.subFor.jersey:'';
    nameCell+='<div style="display:flex;align-items:center;gap:4px;margin-top:3px;">'+
      '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M7 10h14l-4 -4" stroke="#4ADE80"/><path d="M17 14h-14l4 4" stroke="#F87171"/></svg>'+
      '<span style="font-size:9px;color:#FBBF24;font-weight:700;">'+p.subTime+'</span>'+
      (subForName?'<span style="font-size:9px;color:#fff;font-weight:700;"> '+subForName+'</span>':'')+
      (subForJersey?'<span style="font-size:9px;color:var(--text-dim);"> #'+subForJersey+'</span>':'')+
    '</div>';
  }
  return '<tr>'+
    '<td>'+nameCell+'</td>'+
    '<td>'+(s.goals||'-')+'</td>'+
    '<td>'+(s.assists||'-')+'</td>'+
    '<td>'+(s.shots||'-')+'</td>'+
    '<td>'+(s.shotsOnTarget||'-')+'</td>'+
    '<td>'+(s.fouls||'-')+'</td>'+
    '<td>'+(function(s){var y=parseInt(s.yellowCards)||0;var r=parseInt(s.redCards)||0;return r?'🟥':y?'🟨':'-';})(s)+'</td>'+
  '</tr>';
}
function renderPlayerTable(side, players, visible){
  if(!players||!players.length) return '';
  var style=visible?'margin-top:10px':'margin-top:10px;display:none';
  var starters=players.filter(function(p){return p.starter;});
  var subs=players.filter(function(p){return !p.starter;});
  var colgroup='<colgroup><col><col style="width:1%"><col style="width:1%"><col style="width:1%"><col style="width:1%"><col style="width:1%"><col style="width:1%"></colgroup>';
  var thead='<thead><tr><th>선수</th><th>골</th><th>도움</th><th>슈팅</th><th>유효</th><th>파울</th><th>경고</th></tr></thead>';
  var html='<div class="mm-section mm-players-'+side+'" style="'+style+'">';
  // 선발
  html+='<div class="mm-lineup-block"><div class="mm-lineup-block-title">선발</div>';
  html+='<table class="mm-player-table">'+colgroup+thead+'<tbody>';
  starters.forEach(function(p){ html+=renderPlayerRow(p); });
  html+='</tbody></table></div>';
  // 교체
  if(subs.length){
    html+='<div class="mm-lineup-block" style="margin-top:10px;"><div class="mm-lineup-block-title">교체</div>';
    html+='<table class="mm-player-table">'+colgroup+thead+'<tbody>';
    subs.forEach(function(p){ html+=renderPlayerRow(p); });
    html+='</tbody></table></div>';
  }
  html+='</div>';
  return html;
}

function mmSwitchTab(side){
  document.querySelectorAll('.mm-team-tab').forEach(function(b){b.classList.remove('active');});
  var tb=document.getElementById('mm-tab-'+side);
  if(tb) tb.classList.add('active');
  // 피치 토글
  var ph=document.getElementById('mm-pitch-home');
  var pa=document.getElementById('mm-pitch-away');
  if(ph) ph.style.display=side==='home'?'':'none';
  if(pa) pa.style.display=side==='away'?'':'none';
  document.querySelectorAll('.mm-players-home,.mm-players-away').forEach(function(el){el.style.display='none';});
  var el=document.querySelector('.mm-players-'+side);
  if(el) el.style.display='block';
}


function closeMatchModal(e){
  if(e && e.target !== document.getElementById('matchModal')) return;
  var overlay=document.getElementById('matchModal');
  overlay.classList.remove('open');
  document.body.style.overflow='';
  var h = location.hash;
  if(h.includes('match') || h.includes('hist-modal')) window.history.replaceState(null,'',location.href.split('#')[0]);
}

var VALID_SECS = ['fixtures','squad','injuries','media','history'];
var loaded={fixtures:true};
function showSec(id,btn){
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById(id).classList.add('active');

var _liveExpandTimers = {}; // matchId → {timer, progressTimer, startTime}
var LIVE_REFRESH_SEC = 30;

function openLiveExpand(m, panel){
  loadLiveExpand(m, panel);
}

function loadLiveExpand(m, panel){
  // 프로그레스바 + 매치 상세 로드
  var comp = m.competition&&m.competition.short || 'PL';
  var slug = comp==='UCL'?'uefa.champions':comp==='FAC'?'eng.fa':comp==='EFL'?'eng.league_cup':'eng.1';

  // 현재 활성 탭 기억
  var activeTab = 'events';
  var existing = document.getElementById('live-detail-'+m.id);
  if(existing){
    var activeBtn = existing.querySelector('.mm-tab.active');
    if(activeBtn){
      var tabMap={'골&이벤트':'events','팀 스탯':'stats','라인업':'lineup','선수 스탯':'players','코멘터리':'commentary'};
      activeTab = tabMap[activeBtn.textContent] || 'events';
    }
  }

  // 기존 콘텐츠 없을 때만 로딩 스피너 표시
  if(!document.getElementById('live-detail-'+m.id)){
    panel.innerHTML = '<div id="live-detail-'+m.id+'"><div style="color:var(--text-dim);font-size:11px;text-align:center;padding:16px">로딩 중...</div></div>';
  }

  var matchApiUrl = FN+'/match?id='+m.id+'&slug='+slug;
  (window.apiFetch||apiFetch)(matchApiUrl).then(function(data){
    var el = document.getElementById('live-detail-'+m.id);
    if(!el) return;
    el.innerHTML = buildLiveDetail(data);
    if(activeTab !== 'events'){
      var btn = el.querySelector('[data-tab="'+activeTab+'"]');
      if(btn) liveSwitchTab(btn, activeTab);
    }
    // 카드의 venue 영역에 주심·관중수 업데이트
    var venueEl = document.getElementById('fix-venue-'+m.id);
    if(venueEl && (data.referee || data.venue || data.attendance)){
      var html = '';
      if(data.referee)    html += '<span style="display:block;font-size:9px;margin-bottom:2px;">🟨 주심 '+data.referee+'</span>';
      if(data.venue)      html += '<span style="display:block;">📍 '+data.venue+'</span>';
      if(data.attendance) html += '<span style="display:block;font-size:9px;margin-top:2px;">👥 '+Number(data.attendance).toLocaleString()+'명</span>';
      venueEl.innerHTML = html;
    }
  }).catch(function(){
    // 실패 시 기존 콘텐츠 유지 (있으면), 없으면 조용히 대기
  });

}

function startProgressBar(matchId){
  var state = _liveExpandTimers[matchId];
  if(!state) return;
  if(state.progressTimer) clearInterval(state.progressTimer);
  state.startTime = Date.now();
  state.progressTimer = setInterval(function(){
    var barEl = document.getElementById('lpb-'+matchId);
    var lblEl = document.getElementById('lpl-'+matchId);
    if(!barEl || !lblEl){ return; }
    var elapsed = (Date.now() - state.startTime) / 1000;
    var remaining = Math.max(0, LIVE_REFRESH_SEC - elapsed);
    var pct = (remaining / LIVE_REFRESH_SEC) * 100;
    barEl.style.width = pct + '%';
    lblEl.textContent = Math.ceil(remaining) + 's';
  }, 500);
}

function startLiveExpandPolling(m, panel){
  // 기존 detail 폴링 타이머만 제거, progress bar 건드리지 않음
  var st = _liveExpandTimers[m.id];
  if(st && st.timer){ clearInterval(st.timer); st.timer = null; }
  if(!st){ _liveExpandTimers[m.id] = {}; startProgressBar(m.id); }
  var timer = setInterval(function(){
    var p = document.getElementById('live-expand-'+m.id);
    if(!p || !p.classList.contains('open')){
      stopLiveExpandPolling(m.id); return;
    }
    if(document.hidden) return;
    var comp = m.competition&&m.competition.short || 'PL';
    var slug = comp==='UCL'?'uefa.champions':comp==='FAC'?'eng.fa':comp==='EFL'?'eng.league_cup':comp==='CS'?'eng.charity':comp==='FR'?'club.friendly':'eng.1';
    // 매치 상세 갱신
    var elPoll = document.getElementById('live-detail-'+m.id);
    var activeTabPoll = 'events';
    var activeSidePoll = 'home';
    if(elPoll){
      var ab = elPoll.querySelector('.mm-tab.active');
      if(ab){ activeTabPoll = ab.getAttribute('data-tab') || 'events'; }
      var activePanel2 = elPoll.querySelector('.live-tab-panel:not([style*="none"])') || elPoll.querySelector('.live-tab-panel');
      if(activePanel2){
        var asb = activePanel2.querySelector('.mm-tab.active[data-side]');
        if(asb) activeSidePoll = asb.getAttribute('data-side') || 'home';
      }
    }
    (window.apiFetch||apiFetch)(FN+'/match?id='+m.id+'&slug='+slug+'&nocache=1').then(function(data){
      var el = document.getElementById('live-detail-'+m.id);
      if(!el) return;
      el.innerHTML = buildLiveDetail(data);
      if(activeTabPoll !== 'events'){
        var btn = el.querySelector('[data-tab="'+activeTabPoll+'"]');
        if(btn) liveSwitchTab(btn, activeTabPoll);
      }
      if(activeSidePoll === 'away'){
        setTimeout(function(){
          var activePanel = el.querySelector('.live-tab-panel:not([style*="none"]),.live-tab-panel:not([style])');
          if(activePanel){
            var sideBtn = activePanel.querySelector('[data-side="away"]');
            if(sideBtn) sideBtn.click();
          }
        }, 50);
      }
    }).catch(function(){});
    // 프로그레스바 리셋
    startProgressBar(m.id);
  }, LIVE_REFRESH_SEC * 1000);
  _liveExpandTimers[m.id].timer = timer;
}

function stopLiveExpandPolling(matchId){
  var state = _liveExpandTimers[matchId];
  if(state){
    if(state.timer) clearInterval(state.timer);
    if(state.progressTimer) clearInterval(state.progressTimer);
    delete _liveExpandTimers[matchId];
  }
}

function buildLiveDetail(data){
  if(!data) return '<div style="color:var(--text-dim);font-size:11px;text-align:center;padding:16px">데이터 없음</div>';

  var h = '';


  // ── 탭: 이벤트 / 스탯 / 라인업 ──
  h += '<div style="display:flex;gap:6px;margin-bottom:0;padding-top:4px;flex-wrap:wrap;">';
  h += '<button class="mm-tab active" data-tab="events" onclick="liveSwitchTab(this,&quot;events&quot;)">골&이벤트</button>';
  h += '<button class="mm-tab" data-tab="stats" onclick="liveSwitchTab(this,&quot;stats&quot;)">팀 스탯</button>';
  h += '<button class="mm-tab" data-tab="lineup" onclick="liveSwitchTab(this,&quot;lineup&quot;)">라인업</button>';
  h += '<button class="mm-tab" data-tab="players" onclick="liveSwitchTab(this,&quot;players&quot;)">선수 스탯</button>';
  h += '<button class="mm-tab" data-tab="commentary" onclick="liveSwitchTab(this,&quot;commentary&quot;)">코멘터리</button>';
  h += '</div>';

  // ── 이벤트 패널 ──
  h += '<div class="live-tab-panel" id="live-panel-events" style="padding-top:10px;">';
  var events = data.events||[];
  if(events.length){
    h += '<div style="padding:4px 0">';
    events.forEach(function(ev){
      var icon = (ev.type==='goal'||ev.type==='pen_goal')?'⚽':ev.type==='own_goal'?'🔴':ev.type==='yellowCard'?'🟨':ev.type==='red_card'||ev.type==='redCard'?'🟥':ev.type==='substitution'?'🔄':'📌';
      var isHome = (ev.homeAway||ev.team)==='home';
      var min = ev.minute || ev.time || '';
      h += '<div style="display:flex;align-items:center;padding:5px 0;">';
      // 홈 (좌측)
      h += '<div style="flex:1;text-align:right;padding-right:8px;">';
      if(isHome) h += '<span style="font-size:11px;color:#fff;">'+ev.player+'</span>';
      h += '</div>';
      // 중앙 시간+아이콘
      h += '<div style="display:flex;align-items:center;gap:4px;min-width:60px;justify-content:center;">';
      h += '<span style="font-size:10px;color:rgba(255,255,255,0.5);">'+min+'</span>';
      h += '<span style="font-size:13px;">'+icon+'</span>';
      h += '</div>';
      // 어웨이 (우측)
      h += '<div style="flex:1;text-align:left;padding-left:8px;">';
      if(!isHome) h += '<span style="font-size:11px;color:#fff;">'+ev.player+'</span>';
      h += '</div>';
      h += '</div>';
    });
    h += '</div>';
  } else {
    h += '<div style="color:var(--text-dim);font-size:11px;text-align:center;padding:12px">이벤트 없음</div>';
  }
  h += '</div>';

  // ── 스탯 패널 ──
  h += '<div class="live-tab-panel" id="live-panel-stats" style="display:none;padding-top:10px;">';
  var stats = data.teamStats||[];
  if(stats.length){
    h += '<div style="padding:4px 0">';
    stats.forEach(function(s){
      var hv=s.home||0, av=s.away||0;
      var tot=(parseFloat(hv)||0)+(parseFloat(av)||0);
      var hp=tot>0?Math.round((parseFloat(hv)||0)/tot*100):50;
      h += '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;">';
      h += '<span style="width:36px;text-align:right;font-size:12px;font-weight:600;color:#fff;">'+hv+'</span>';
      h += '<div style="flex:1;">';
      h += '<div style="font-size:10px;color:rgba(255,255,255,0.5);text-align:center;margin-bottom:3px;">'+s.label+'</div>';
      h += '<div style="height:4px;background:rgba(255,255,255,0.1);border-radius:2px;position:relative;">';
      h += '<div style="position:absolute;left:0;top:0;height:100%;width:'+hp+'%;background:#EF0107;border-radius:2px;"></div>';
      h += '</div></div>';
      h += '<span style="width:36px;text-align:left;font-size:12px;font-weight:600;color:#fff;">'+av+'</span>';
      h += '</div>';
    });
    h += '</div>';
  } else {
    h += '<div style="color:var(--text-dim);font-size:11px;text-align:center;padding:12px">스탯 없음</div>';
  }
  h += '</div>';

  // ── 라인업 패널 ──
  // ── 라인업 패널 ──
  h += '<div class="live-tab-panel" id="live-panel-lineup" style="display:none;padding-top:10px;">';
  if(data.players){
    var hP=data.players.home||[], aP=data.players.away||[];
    var hS=hP.filter(function(p){return p.starter&&p.formationPlace;});
    var aS=aP.filter(function(p){return p.starter&&p.formationPlace;});
    var hF=data.players.homeFormation||'', aF=data.players.awayFormation||'';
    var hColor=(data.homeTeam&&data.homeTeam.color)||'#C8102E';
    var aColor=(data.awayTeam&&data.awayTeam.color)||'#1a3a6c';
    // 홈/어웨이 탭 버튼
    h += '<div style="display:flex;gap:6px;padding:10px 0 6px;">';
    h += '<button class="mm-tab active" data-side="home" onclick="liveSwitchSide(this,\'lineup\',\'home\')">'+(data.homeTeam&&data.homeTeam.name||'홈')+'</button>';
    h += '<button class="mm-tab" data-side="away" onclick="liveSwitchSide(this,\'lineup\',\'away\')">'+(data.awayTeam&&data.awayTeam.name||'어웨이')+'</button>';
    h += '</div>';
    // 피치
    // 교체 목록 렌더 함수
    function renderSubList(players){
      var subs = players.filter(function(p){ return p.starter && p.subbedOut && p.subTime; });
      if(!subs.length) return '';
      var s = '<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px;">';
      s += '<div style="font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px;">교체</div>';
      subs.forEach(function(p){
        var inName = p.subFor ? p.subFor.name : '?';
        s += '<div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px;">';
        s += '<span style="color:var(--text-dim);min-width:30px;">'+p.subTime+'</span>';
        s += '<span style="color:#F87171;">↓ '+p.name+'</span>';
        s += '<span style="color:var(--text-dim);margin:0 2px;">→</span>';
        s += '<span style="color:#4ADE80;">↑ '+inName+'</span>';
        s += '</div>';
      });
      s += '</div>';
      return s;
    }
    h += '<div class="live-side-panel" data-suffix="lineup-home">'+renderPitch(hS,hF,hColor,hP)+renderSubList(hP)+'</div>';
    h += '<div class="live-side-panel" data-suffix="lineup-away" style="display:none">'+renderPitch(aS,aF,aColor,aP)+renderSubList(aP)+'</div>';
  } else {
    h += '<div style="color:var(--text-dim);font-size:11px;text-align:center;padding:12px">라인업 없음</div>';
  }
  h += '</div>';

  // ── 선수 스탯 패널 ──
  h += '<div class="live-tab-panel" id="live-panel-players" style="display:none;padding-top:10px;">';
  if(data.players){
    var hP2=data.players.home||[], aP2=data.players.away||[];
    // 홈/어웨이 탭 버튼
    h += '<div style="display:flex;gap:6px;padding:10px 0 6px;">';
    h += '<button class="mm-tab active" data-side="home" onclick="liveSwitchSide(this,\'players\',\'home\')">'+(data.homeTeam&&data.homeTeam.name||'홈')+'</button>';
    h += '<button class="mm-tab" data-side="away" onclick="liveSwitchSide(this,\'players\',\'away\')">'+(data.awayTeam&&data.awayTeam.name||'어웨이')+'</button>';
    h += '</div>';
    h += '<div class="live-side-panel" data-suffix="players-home">'+renderPlayerTable('home',hP2,true)+'</div>';
    h += '<div class="live-side-panel" data-suffix="players-away" style="display:none">'+renderPlayerTable('away',aP2,true)+'</div>';
  } else {
    h += '<div style="color:var(--text-dim);font-size:11px;text-align:center;padding:12px">데이터 없음</div>';
  }
  h += '</div>';

  // ── 코멘터리 패널 ──
  h += '<div class="live-tab-panel" id="live-panel-commentary" style="display:none;padding-top:10px;">';
  var commentary = data.commentary||[];
  if(commentary.length){
    h += '<div style="max-height:360px;overflow-y:auto;">';
    commentary.forEach(function(c){
      h += '<div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);">';
      h += '<span style="flex-shrink:0;min-width:32px;font-size:10px;color:rgba(255,255,255,0.4);font-family:var(--fm);">'+(c.minute||'')+'</span>';
      h += '<span style="font-size:11px;color:rgba(255,255,255,0.85);line-height:1.5;">'+c.text+'</span>';
      h += '</div>';
    });
    h += '</div>';
  } else {
    h += '<div style="color:var(--text-dim);font-size:11px;text-align:center;padding:12px">코멘터리 없음</div>';
  }
  h += '</div>';

  return h;
}

function liveSwitchSide(btn, panelId, side){
  var tabRow = btn.parentElement;
  tabRow.querySelectorAll('.mm-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  // 부모 live-tab-panel 찾기
  var panel = tabRow;
  while(panel && !panel.classList.contains('live-tab-panel')) panel = panel.parentElement;
  if(!panel) return;
  panel.querySelectorAll('.live-side-panel').forEach(function(p){
    var suffix = p.getAttribute('data-suffix')||'';
    p.style.display = suffix.endsWith('-'+side) ? '' : 'none';
  });
}

function liveSwitchTab(btn, panel){
  var tabRow = btn.parentElement;
  var container = tabRow.parentElement;
  // 탭 버튼 active 토글
  tabRow.querySelectorAll('.mm-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  // 패널 표시 토글 (탭 행 다음 형제들)
  var panels = container.querySelectorAll('.live-tab-panel');
  var idx = ['events','stats','lineup','players','commentary'].indexOf(panel);
  panels.forEach(function(p,i){p.style.display=(i===idx)?'':'none';});
}

var _liveTimer = null;
function startLivePolling(){
  if(_liveTimer) return;
  _liveTimer = setInterval(function(){
    if(document.hidden) return; // 백그라운드면 스킵
    apiFetch(FN+'/football?type=fixtures&nocache=1').then(function(data){
      var hasLive = (data.matches||[]).some(function(m){return m.status==='IN_PLAY';});
      // 라이브 카드만 clock · score 부분 업데이트 (전체 재빌드 안 함)
      (data.matches||[]).filter(function(m){return m.status==='IN_PLAY';}).forEach(function(m){
        // clock
        var clkEl = document.querySelector('#fix-card-'+m.id+' .fix-live-clock');
        if(clkEl) clkEl.textContent = m.isHT ? 'HT' : (m.clock||'');
        // score
        var scoreEl = document.querySelector('#fix-card-'+m.id+' .fix-score');
        var hs = m.score&&m.score.fullTime?m.score.fullTime.home:0;
        var as_ = m.score&&m.score.fullTime?m.score.fullTime.away:0;
        if(scoreEl) scoreEl.textContent = (hs||0)+' : '+(as_||0);
      });
      // 라이브 → 종료로 바뀐 경기가 있으면 전체 리스트 갱신
      if(!hasLive){
        var upEl = document.getElementById('upcomingList');
        var fnEl = document.getElementById('finishedList');
        if(upEl && fnEl){
          var finishedAll = (data.finished||[]).slice().reverse();
          var upcomingAll = data.upcoming||[];
          renderList(upEl, upcomingAll.slice(0,3), upcomingAll);
          renderList(fnEl, finishedAll.slice(0,3), finishedAll);
          renderDday(upcomingAll);
        }
        stopLivePolling();
      }
    }).catch(function(){});
  }, 30000);
}
function stopLivePolling(){
  if(_liveTimer){clearInterval(_liveTimer);_liveTimer=null;}
}

var _mockLiveActive = false;

var _mockClickTimer = null;
window.toggleMockLive = function(){
  var badge = document.getElementById('fixBadge');
  if(!_mockLiveActive){
    _mockClickCount++;
    clearTimeout(_mockClickTimer);
    _mockClickTimer = setTimeout(function(){ _mockClickCount = 0; }, 1500);
    if(_mockClickCount < 3) return;
    _mockClickCount = 0;
    _mockLiveActive = true;
    if(badge){ badge.textContent = '🔴 MOCK ON'; badge.style.background = 'rgba(239,1,7,0.25)'; badge.style.color = '#ff6b6b'; }
    window.testLiveMatch();
  } else {
    _mockLiveActive = false;
    if(badge){ badge.textContent = 'ESPN'; badge.style.background = ''; badge.style.color = ''; }
    window.testLiveStop();
  }
};

// 시즌 자동계산 (8월 이후면 새 시즌)
function getCurrentSeason() {
  var now = new Date();
  var year = now.getFullYear();
  var month = now.getMonth() + 1;
  var startYear = month >= 8 ? year : year - 1;
  var short1 = String(startYear).slice(2);
  var short2 = String(startYear + 1).slice(2);
  return short1 + '-' + short2;
}
var SEASON = getCurrentSeason();
document.getElementById('seasonLabel').textContent = SEASON;

// Fotmob 좌표는 0~100 정규화가 아니라 실제 피치 크기(미터) 기준으로 내려온다
var PITCH_LEN=105, PITCH_WID=68;

// 페널티박스 중심으로 확대한 세로형(골대가 위) 슈팅맵 배경
function boxSVGBackground(VW, VH, xMin, xMax, yMin, yMax){
  var lc='rgba(255,255,255,0.5)';
  var toSX=function(y){ return (y-yMin)/(yMax-yMin)*VW; };
  var toSY=function(x){ return (xMax-x)/(xMax-xMin)*VH; };
  var goalDepth=2.6;
  var s='<rect x="0" y="'+(-goalDepth)+'" width="'+VW+'" height="'+(VH+goalDepth)+'" fill="#0d2818" rx="3"/>';
  // 잔디결 줄무늬 (은은하게)
  var stripes=7;
  for(var i=0;i<stripes;i++){
    if(i%2===0) continue;
    var sy=VH/stripes*i;
    s+='<rect x="0" y="'+sy.toFixed(2)+'" width="'+VW+'" height="'+(VH/stripes).toFixed(2)+'" fill="rgba(255,255,255,0.025)"/>';
  }
  // 페널티 박스 (16.5m x 40.32m) — 골(y=0)에 붙어 아래로 뻗는 형태
  // depth(x)는 toSY, 폭(y)은 toSX
  var pbY1=toSY(105-16.5), pbX1=toSX(34-20.16), pbX2=toSX(34+20.16);
  s+='<rect x="'+pbX1.toFixed(2)+'" y="0" width="'+(pbX2-pbX1).toFixed(2)+'" height="'+pbY1.toFixed(2)+'" fill="none" stroke="'+lc+'" stroke-width="0.5"/>';
  // 골에어리어 (5.5m x 18.32m)
  var gbY1=toSY(105-5.5), gbX1=toSX(34-9.16), gbX2=toSX(34+9.16);
  s+='<rect x="'+gbX1.toFixed(2)+'" y="0" width="'+(gbX2-gbX1).toFixed(2)+'" height="'+gbY1.toFixed(2)+'" fill="none" stroke="'+lc+'" stroke-width="0.5"/>';
  // 아크 (박스 바깥쪽으로 볼록: 페널티 스팟 중심 원이 박스 선과 만나는 두 점 사이만 그림,
  // 반원이 아니라 박스 선까지 잘린 활 모양이 실제 규격과 맞음)
  var spotDepth=105-11, boxEdgeDepth=105-16.5, arcRadiusM=9.15;
  var halfChordM=Math.sqrt(arcRadiusM*arcRadiusM-(spotDepth-boxEdgeDepth)*(spotDepth-boxEdgeDepth));
  var arcP1x=toSX(34-halfChordM), arcP2x=toSX(34+halfChordM), arcY=toSY(boxEdgeDepth);
  var arcR=arcRadiusM*(VW/(yMax-yMin));
  s+='<path d="M '+arcP1x.toFixed(2)+' '+arcY.toFixed(2)+' A '+arcR.toFixed(2)+' '+arcR.toFixed(2)+' 0 0 0 '+arcP2x.toFixed(2)+' '+arcY.toFixed(2)+'" fill="none" stroke="'+lc+'" stroke-width="0.5"/>';
  // 골문 (골라인 뒤 네트 프레임)
  var goalW=7.32;
  var gx1=toSX(34-goalW/2), gx2=toSX(34+goalW/2);
  s+='<rect x="'+gx1.toFixed(2)+'" y="'+(-goalDepth).toFixed(2)+'" width="'+(gx2-gx1).toFixed(2)+'" height="'+goalDepth.toFixed(2)+'" fill="rgba(255,255,255,0.07)" stroke="'+lc+'" stroke-width="0.6"/>';
  s+='<line x1="'+gx1.toFixed(2)+'" y1="0" x2="'+gx2.toFixed(2)+'" y2="0" stroke="#fff" stroke-width="0.9"/>';
  return s;
}

function renderShotmapSVG(shots){
  // 박스 + 그 주변 슛 몇 개 정도만 보이도록 확대
  // xMax는 실제 골라인(105)과 정확히 맞춰야 슛 도착점이 골대 그림에 딱 닿는다
  // (전엔 106이라 ~1.8 유닛만큼 선이 골대 앞에서 끊겨 보였음)
  var xMin=68, xMax=105, yMin=6, yMax=62;
  var VW=100, VH=VW*(xMax-xMin)/(yMax-yMin);
  // 골대를 아래→위로 옮기는 건 세로축만 뒤집는 반사가 아니라 180도 회전이라
  // 가로축(y)도 같이 뒤집어야 한다
  var toSX=function(y){ return VW - (Math.min(yMax,Math.max(yMin,y))-yMin)/(yMax-yMin)*VW; };
  var toSY=function(x){ return (xMax-Math.min(xMax,Math.max(xMin,x)))/(xMax-xMin)*VH; };

  var dots='', lines='';
  shots.forEach(function(s, i){
    var cx=toSX(s.y||0), cy=toSY(s.x||0);
    var isGoal = s.event==='goal';
    var r='1.6'; // Fotmob처럼 xG와 무관하게 전부 동일한 크기
    var strokeColor, fillStyle;
    if(isGoal){                     strokeColor='var(--gold)'; }
    else if(s.event==='ownGoal'){   strokeColor='#EF4444'; fillStyle='fill="#EF4444" fill-opacity="0.85" stroke="#fff" stroke-width="0.25"'; }
    else if(s.event==='onTarget'){  strokeColor='#60A5FA'; fillStyle='fill="#60A5FA" fill-opacity="0.85" stroke="#fff" stroke-width="0.2"'; }
    else if(s.event==='blocked'){   strokeColor='rgba(255,255,255,0.55)'; fillStyle='fill="rgba(255,255,255,0.35)" stroke="none"'; }
    else{                           strokeColor='rgba(255,255,255,0.55)'; fillStyle='fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="0.4"'; }

    // 점(아이콘/하이라이트 링) 반지름을 먼저 정해서, 방향선이 중심이 아니라
    // 그 원 가장자리에서 시작하도록 한다
    var fs, hlR, ringR;
    if(isGoal){
      fs=(1.8+parseFloat(r)*0.65).toFixed(2);
      hlR=(parseFloat(fs)*0.4).toFixed(2);
      ringR=(parseFloat(hlR)+0.9).toFixed(2); // 공 아이콘이랑 겹치지 않게 간격을 둠
    } else {
      hlR=r;
      ringR=(parseFloat(r)+1).toFixed(2);
    }

    if(s.endX!=null && s.endY!=null){
      var ex=toSX(s.endY), ey=toSY(s.endX);
      var dx=ex-cx, dy=ey-cy;
      var dist=Math.sqrt(dx*dx+dy*dy)||0.01;
      var ux=dx/dist, uy=dy/dist;
      // 골대 바로 앞 슛은 원점-도착점이 거의 붙어있어 선이 안 보이므로
      // 방향은 유지한 채 최소 길이를 보장해 도착점을 늘린다.
      // 블록된 슛은 실제로 막힌 지점에서 멈추고, 나머지(빗나감/유효슈팅/골)는
      // 골라인에서 멈추지 않고 네트 쪽으로 좀 더 뻗어나가게 그린다.
      var minLen=(parseFloat(hlR)+4);
      var drawDist=Math.max(dist, minLen);
      if(s.event!=='blocked') drawDist+=3;
      var startX=cx+ux*parseFloat(hlR);
      var startY=cy+uy*parseFloat(hlR);
      var endX2=Math.min(VW,Math.max(0,cx+ux*drawDist));
      var endY2=Math.min(VH,Math.max(-3,cy+uy*drawDist));
      lines+='<line id="shotline_'+i+'" class="shot-line" x1="'+startX.toFixed(2)+'" y1="'+startY.toFixed(2)+'" x2="'+endX2.toFixed(2)+'" y2="'+endY2.toFixed(2)+'" stroke="'+strokeColor+'" stroke-width="0.5"/>';
    }
    var title='<title>'+(s.min!=null?s.min+"'":'')+' · xG '+(s.xg||0).toFixed(2)+'</title>';
    // fill="none"인 원(빗나감)은 가운데 빈 공간이 기본적으로 클릭 안 되므로
    // pointer-events="all"로 원 전체 영역을 히트박스로 만든다
    var tap='onclick="toggleShotLine('+i+')" style="cursor:pointer" pointer-events="all"';
    if(isGoal){
      // 흰색 배경 원 — 공 이모지의 흰 부분이 짙은 배경에 묻히지 않게
      dots+='<circle cx="'+cx.toFixed(2)+'" cy="'+cy.toFixed(2)+'" r="'+hlR+'" fill="#fff"></circle>';
      dots+='<text '+tap+' x="'+cx.toFixed(2)+'" y="'+cy.toFixed(2)+'" font-size="'+fs+'" text-anchor="middle" dominant-baseline="central">⚽'+title+'</text>';
    } else {
      dots+='<circle '+tap+' cx="'+cx.toFixed(2)+'" cy="'+cy.toFixed(2)+'" r="'+r+'" '+fillStyle+'>'+title+'</circle>';
    }
    // 탭해서 선택한 슛을 표시하는 하이라이트 링 (기본은 투명, 슈팅라인과 동일한 굵기)
    dots+='<circle id="shothl_'+i+'" class="shot-highlight" cx="'+cx.toFixed(2)+'" cy="'+cy.toFixed(2)+'" r="'+ringR+'" fill="none" stroke="#fff" stroke-width="0.5"/>';
  });
  return '<svg viewBox="0 -3 '+VW+' '+(VH+3)+'" style="width:100%;height:auto;display:block;border-radius:8px;">'+boxSVGBackground(VW,VH,xMin,xMax,yMin,yMax)+lines+dots+'</svg>';
}

function toggleShotLine(idx){
  document.querySelectorAll('.shot-line.active, .shot-highlight.active').forEach(function(el){ el.classList.remove('active'); });
  var line=document.getElementById('shotline_'+idx);
  var hl=document.getElementById('shothl_'+idx);
  if(line) line.classList.add('active');
  if(hl) hl.classList.add('active');
  var panel=document.getElementById('shotDetailPanel');
  if(panel){
    var list=window._pmCurrentShots||[];
    panel.innerHTML=shotDetailHTML(list[idx]||null);
  }
}

// ── 터치 히트맵 (캔버스 기반 부드러운 열분포) ──
function drawPitchLinesOnCanvas(ctx, W, H){
  ctx.fillStyle='#0d2818';
  ctx.fillRect(0,0,W,H);
  var lc='rgba(255,255,255,0.35)';
  ctx.strokeStyle=lc; ctx.lineWidth=1;
  ctx.strokeRect(1,1,W-2,H-2);
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
  ctx.beginPath();ctx.arc(W/2,H/2,H*0.15,0,Math.PI*2);ctx.stroke();
  var bw=W*0.16, bh=H*0.6, by=(H-bh)/2;
  ctx.strokeRect(0,by,bw,bh); ctx.strokeRect(W-bw,by,bw,bh);
  var bw2=W*0.055, bh2=H*0.28, by2=(H-bh2)/2;
  ctx.strokeRect(0,by2,bw2,bh2); ctx.strokeRect(W-bw2,by2,bw2,bh2);
}

function drawHeatmapCanvas(canvasId, points){
  var canvas=document.getElementById(canvasId);
  if(!canvas) return;
  var W=canvas.width, H=canvas.height;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  drawPitchLinesOnCanvas(ctx, W, H);

  // 점마다 부드러운 방사형 그라디언트를 가산 합성해 밀도(alpha)를 누적
  var heat=document.createElement('canvas');
  heat.width=W; heat.height=H;
  var hctx=heat.getContext('2d');
  hctx.globalCompositeOperation='lighter';
  var radius=Math.max(14, Math.min(W,H)*0.075);
  // 점이 많은 선수(시즌 전체 수천 개)는 겹치는 원이 너무 많아 알파 채널이
  // 금방 255로 포화돼(=화면 전체가 붉게) 밀도 차이가 안 보이게 된다.
  // 점 개수에 반비례해 점당 알파를 낮춰 포화를 방지한다.
  var perPointAlpha=Math.max(0.02, Math.min(0.12, 60/Math.max(1,points.length)));
  points.forEach(function(p){
    var x=Math.min(PITCH_LEN,Math.max(0,p.x||0))/PITCH_LEN*W;
    var y=Math.min(PITCH_WID,Math.max(0,p.y||0))/PITCH_WID*H;
    var grad=hctx.createRadialGradient(x,y,0,x,y,radius);
    grad.addColorStop(0,'rgba(255,255,255,'+perPointAlpha+')');
    grad.addColorStop(1,'rgba(255,255,255,0)');
    hctx.fillStyle=grad;
    hctx.beginPath();hctx.arc(x,y,radius,0,Math.PI*2);hctx.fill();
  });

  // 누적된 밀도를 색상 램프(파랑→초록→노랑→빨강)로 변환
  var img=hctx.getImageData(0,0,W,H);
  var d=img.data;
  var maxA=1;
  for(var i=3;i<d.length;i+=4){ if(d[i]>maxA) maxA=d[i]; }
  var stops=[
    {t:0.00,r:13, g:40, b:60, a:0},
    {t:0.15,r:59, g:130,b:246,a:110},
    {t:0.40,r:34, g:197,b:94, a:170},
    {t:0.65,r:245,g:158,b:11, a:215},
    {t:1.00,r:239,g:68, b:68, a:235},
  ];
  function colorAt(t){
    for(var k=0;k<stops.length-1;k++){
      var a=stops[k], b=stops[k+1];
      if(t>=a.t && t<=b.t){
        var f=(t-a.t)/((b.t-a.t)||1);
        return {r:a.r+(b.r-a.r)*f, g:a.g+(b.g-a.g)*f, b:a.b+(b.b-a.b)*f, a:a.a+(b.a-a.a)*f};
      }
    }
    return stops[stops.length-1];
  }
  for(var j=0;j<d.length;j+=4){
    var alpha=d[j+3];
    if(alpha<=0){ d[j+3]=0; continue; }
    var t=Math.min(1, alpha/maxA);
    var c=colorAt(t);
    d[j]=c.r; d[j+1]=c.g; d[j+2]=c.b; d[j+3]=c.a;
  }
  hctx.putImageData(img,0,0);
  ctx.drawImage(heat,0,0);
}

// ── Fotmob 스타일 6각형 레이더 ──
function drawFotmobRadar(canvasId, items){
  var canvas = document.getElementById(canvasId);
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  var W=canvas.width, H=canvas.height;
  // 라벨 공간 확보를 위해 중심 약간 위로
  var cx=W/2, cy=H/2;
  var r=Math.min(W,H)/2-50;
  var n=items.length;
  ctx.clearRect(0,0,W,H);

  var gridC='rgba(255,255,255,0.1)';

  // 배경 동심 다각형 (4단계)
  [0.25,0.5,0.75,1].forEach(function(s){
    ctx.beginPath();
    for(var i=0;i<n;i++){
      var a=(i/n)*Math.PI*2-Math.PI/2;
      i===0?ctx.moveTo(cx+Math.cos(a)*r*s,cy+Math.sin(a)*r*s):ctx.lineTo(cx+Math.cos(a)*r*s,cy+Math.sin(a)*r*s);
    }
    ctx.closePath();
    ctx.strokeStyle=gridC;ctx.lineWidth=s===1?1.5:1;ctx.stroke();
    if(s===1){ctx.fillStyle='rgba(255,255,255,0.02)';ctx.fill();}
  });

  // 축
  for(var i=0;i<n;i++){
    var a=(i/n)*Math.PI*2-Math.PI/2;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    ctx.strokeStyle=gridC;ctx.lineWidth=1;ctx.stroke();
  }

  // 데이터 영역
  ctx.beginPath();
  for(var i=0;i<n;i++){
    var a=(i/n)*Math.PI*2-Math.PI/2;
    var v=Math.min(1,Math.max(0,(items[i].value||0)/100));
    i===0?ctx.moveTo(cx+Math.cos(a)*r*v,cy+Math.sin(a)*r*v)
         :ctx.lineTo(cx+Math.cos(a)*r*v,cy+Math.sin(a)*r*v);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(189,5,16,0.4)';ctx.fill();
  ctx.strokeStyle='#EF4444';ctx.lineWidth=2;ctx.stroke();

  // 데이터 점
  for(var i=0;i<n;i++){
    var a=(i/n)*Math.PI*2-Math.PI/2;
    var v=Math.min(1,Math.max(0,(items[i].value||0)/100));
    ctx.beginPath();
    ctx.arc(cx+Math.cos(a)*r*v,cy+Math.sin(a)*r*v,4,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
    ctx.strokeStyle='#EF4444';ctx.lineWidth=2;ctx.stroke();
  }

  // 라벨 (% 수치 크게 + 설명 작게) - Fotmob 스타일
  for(var i=0;i<n;i++){
    var a=(i/n)*Math.PI*2-Math.PI/2;
    var labelR = r+28;
    var lx=cx+Math.cos(a)*labelR;
    var ly=cy+Math.sin(a)*labelR;
    var pct=items[i].value||0;
    var col=pct>=75?'#22C55E':pct>=50?'#fff':'rgba(255,255,255,0.6)';

    ctx.textAlign='center';
    ctx.textBaseline='middle';

    // % 수치 (크게)
    ctx.font='bold 13px sans-serif';
    ctx.fillStyle=col;
    ctx.fillText(pct+'%', lx, ly-7);

    // 라벨 (작게)
    ctx.font='10px sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.5)';
    // 긴 라벨 줄바꿈 처리
    var title=items[i].title||'';
    if(title.length>12){
      var words=title.split(' ');
      var mid=Math.ceil(words.length/2);
      var line1=words.slice(0,mid).join(' ');
      var line2=words.slice(mid).join(' ');
      ctx.fillText(line1,lx,ly+6);
      ctx.fillText(line2,lx,ly+17);
    } else {
      ctx.fillText(title,lx,ly+7);
    }
  }
}

function getPctStats(fotStats, pos){
  var keys = pos==='GK'
    ? ['goals_conceded_per_90','saves','clean_sheets']
    : pos==='DF'
    ? ['goals','assists','chances_created','tackles','interceptions']
    : pos==='MF'
    ? ['goals','assists','chances_created','shots','accurate_passes','tackles']
    : ['goals','assists','shots','expected_goals','chances_created','touches_in_opposition_box'];
  var result=[];
  keys.forEach(function(k){
    var s=fotStats[k];
    if(s && s.percentile!=null){
      result.push({label:s.title||k, pct:s.percentile});
    }
  });
  return result.slice(0,6);
}

function switchPMComp(btn){
  var content=document.getElementById('modalContent');
  var comp=btn.getAttribute('data-comp');
  document.getElementById('statCompTabs').querySelectorAll('.pm-comp-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  content.querySelectorAll('.comp-stat-panel').forEach(function(panel){
    panel.style.display=panel.getAttribute('data-comp')===comp?'':'none';
  });

  // 슈팅맵/히트맵도 같은 대회 선택을 따라간다
  var shots=(window._pmShotmapAll||[]).filter(function(s){return s.comp===comp;});
  var heats=(window._pmHeatmapAll||[]).filter(function(hp){return hp.comp===comp;});
  window._pmCurrentShots=shots;
  var shotmapSection=document.getElementById('shotmapSection');
  if(shotmapSection) shotmapSection.style.display = shots.length ? '' : 'none';
  var chart=document.getElementById('shotmapChart');
  if(chart) chart.innerHTML = shots.length ? renderShotmapSVG(shots) : '';
  var statsRow=document.getElementById('shotStatsRow');
  if(statsRow) statsRow.innerHTML=shotStatsRowHTML(shots);
  var defaultIdx=mostRecentShotIndex(shots);
  if(defaultIdx>=0){
    var dLine=document.getElementById('shotline_'+defaultIdx);
    var dHl=document.getElementById('shothl_'+defaultIdx);
    if(dLine) dLine.classList.add('active');
    if(dHl) dHl.classList.add('active');
  }
  var detailPanel=document.getElementById('shotDetailPanel');
  if(detailPanel) detailPanel.innerHTML=shotDetailHTML(shots[defaultIdx]||null);
  var heatmapSection=document.getElementById('heatmapSection');
  if(heatmapSection) heatmapSection.style.display = heats.length ? '' : 'none';
  var canvas=document.getElementById('heatmap_canvas');
  if(canvas){
    if(heats.length){
      drawHeatmapCanvas('heatmap_canvas', heats);
    } else {
      canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    }
  }
}

// Fotmob과 동일하게: 슛/득점/xG/유효% 4분할 요약
function shotStatsRowHTML(list){
  list = list||[];
  var goals=list.filter(function(s){return s.event==='goal';}).length;
  var xgSum=list.reduce(function(a,s){return a+(s.xg||0);},0);
  var onTarget=list.filter(function(s){return s.event==='goal'||s.event==='onTarget';}).length;
  var pct=list.length?Math.round(onTarget/list.length*100):0;
  return '<div class="fotmob-stat-grid shot-stat-grid" style="margin-top:12px;">'+
         makeFMStat(list.length,'슛','')+makeFMStat(goals,'득점','#22C55E')+makeFMStat(xgSum.toFixed(2),'xG','')+makeFMStat(pct+'%','유효','')+
         '</div>';
}

// 선택한 슛 1개의 상세 정보 (경기/슛 유형/상황/결과/xG)
function fotmobCrest(teamId){
  return teamId ? 'https://images.fotmob.com/image_resources/logo/teamlogo/'+teamId+'.png' : '';
}

function shotDetailHTML(s){
  if(!s){
    return '<div style="font-size:11px;color:var(--text-dim);text-align:center;padding:14px 0;">슛을 선택하면 상세 정보가 여기에 표시됩니다</div>';
  }
  var m=s.match||{};
  var hs=m.homeScore!=null?m.homeScore:'-';
  var as=m.awayScore!=null?m.awayScore:'-';
  var dateStr='';
  if(m.date){
    var d=new Date(m.date);
    if(!isNaN(d)) dateStr=d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
  }
  var h='';
  // 팀/스코어 헤더 — 다른 섹션과 동일하게 배경/테두리 없이, 전부 중앙 정렬
  h+='<div style="display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 10px 4px;text-align:center;">';
  h+='<div style="flex:1;min-width:0;font-size:11px;font-weight:600;color:#fff;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+(m.home||'')+'</div>';
  if(m.homeId) h+='<img src="'+fotmobCrest(m.homeId)+'" style="width:18px;height:18px;object-fit:contain;flex-shrink:0;" onerror="this.style.display=\'none\'">';
  h+='<div style="font-size:16px;font-weight:900;color:#fff;flex-shrink:0;padding:0 4px;">'+hs+' - '+as+'</div>';
  if(m.awayId) h+='<img src="'+fotmobCrest(m.awayId)+'" style="width:18px;height:18px;object-fit:contain;flex-shrink:0;" onerror="this.style.display=\'none\'">';
  h+='<div style="flex:1;min-width:0;font-size:11px;font-weight:600;color:#fff;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+(m.away||'')+'</div>';
  h+='</div>';
  h+='<div style="text-align:center;font-size:10px;color:var(--text-dim);padding-bottom:10px;">'+dateStr+(s.min!=null?' · '+s.min+"'":'')+'</div>';
  // 슛 유형 / 상황 / 결과 / xG / xGOT — 위 "대회별 스탯"과 동일한 그리드 스타일
  h+='<div class="fotmob-stat-grid overall-stat-grid">';
  h+=makeFMStat(SHOT_TYPE_LABEL[s.shotType]||s.shotType||'-','슛 유형','');
  h+=makeFMStat(SITUATION_LABEL[s.situation]||s.situation||'-','상황','');
  h+=makeFMStat(SHOT_EVENT_LABEL[s.event]||s.event,'결과',SHOT_EVENT_COLOR[s.event]);
  h+=makeFMStat((s.xg||0).toFixed(2),'xG','');
  h+=makeFMStat(s.xgot!=null?s.xgot.toFixed(2):'-','xGOT','');
  h+='</div>';
  return h;
}

function mostRecentShotIndex(list){
  if(!list || !list.length) return -1;
  var bestIdx=0, bestTime=-Infinity;
  list.forEach(function(s,i){
    var t = (s.match && s.match.date) ? new Date(s.match.date).getTime() : 0;
    if(isNaN(t)) t=0;
    t += (s.min||0)*60000; // 같은 날짜면 후반 슛을 더 최근으로
    if(t>=bestTime){ bestTime=t; bestIdx=i; }
  });
  return bestIdx;
}

function makeFMStat(val, lbl, color){
  var style = color ? ' style="color:'+color+'"' : '';
  return '<div class="fm-stat-cell">'
    +'<div class="fm-stat-val"'+style+'>'+val+'</div>'
    +'<div class="fm-stat-lbl">'+lbl+'</div>'
    +'</div>';
}

function makeStatBox(val,lbl,sub,color){
  var style=color?' style="color:'+color+'"':'';
  return '<div class="stat-box"><div class="stat-box-val"'+style+'>'+val+'</div>'
    +'<div class="stat-box-lbl">'+lbl+'</div>'
    +(sub?'<div class="stat-box-sub">'+sub+'</div>':'')
    +'</div>';
}
