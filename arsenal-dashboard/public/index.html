var _liveTimer = null;
function startLivePolling(){
  if(_liveTimer) return;
  _liveTimer = setInterval(function(){
    if(document.hidden) return; // 백그라운드면 스킵
    apiFetch(FN+'/football?type=fixtures&nocache=1').then(function(data){
      var hasLive = (data.matches||[]).some(function(m){return m.status==='IN_PLAY';});
      var upEl = document.getElementById('upcomingList');
      var fnEl = document.getElementById('finishedList');
      if(upEl && fnEl){
        var finishedAll = (data.finished||[]).slice().reverse();
        var upcomingAll = data.upcoming||[];
        // PL 라운드 재계산
        var allPL=[...(data.finished||[]),...(data.upcoming||[])]
          .filter(function(m){return m.competition&&m.competition.short==='PL';})
          .sort(function(a,b){return new Date(a.utcDate)-new Date(b.utcDate);});
        var round=1;
        allPL.forEach(function(m){
          if(m.tbd==='postponed'||m.tbd==='canceled'){m.round=null;return;}
          m.round='pl'+round; ROUND_LABEL['pl'+round]=round+'라운드'; round++;
        });
        renderList(upEl, upcomingAll.slice(0,3), upcomingAll);
        renderList(fnEl, finishedAll.slice(0,5), finishedAll);
      }
      if(!hasLive) stopLivePolling();
    }).catch(function(){});
  }, 30000);
}
function stopLivePolling(){
  if(_liveTimer){clearInterval(_liveTimer);_liveTimer=null;}
}

function filterSq(f,btn){
  document.querySelectorAll('.f-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');renderSq(f);
}

function getCurrentSeason() {
  var now = new Date();
  var year = now.getFullYear();
  var month = now.getMonth() + 1;
  var startYear = month >= 8 ? year : year - 1;
  var short1 = String(startYear).slice(2);
  var short2 = String(startYear + 1).slice(2);
  return short1 + '-' + short2;
}

  // ── 대회별 스탯 탭 ──
  if(compKeys.length > 0){
    h += '<div class="stat-section">';
    h += '<div class="stat-section-title">\ub300\ud68c\ubcc4 \uc2a4\ud0ef</div>';
    h += '<div class="pm-comp-tabs">';
    compKeys.forEach(function(k,i){
      h += '<button class="pm-comp-tab'+(i===0?' active':'')+'" data-comp="'+k+'" onclick="switchPMComp(this)">'+(compLabels[k]||k)+'</button>';
    });
    h += '</div>';

    compKeys.forEach(function(k, i){
      var c = competitions[k];
      var hidden = i===0 ? '' : 'display:none';
      h += '<div class="comp-stat-panel" data-comp="'+k+'" style="'+hidden+'">';
      var mins=c.minutesPlayed||0;
      var minsStr=mins>0?mins:'-';
      var rating=c.avgRating?c.avgRating.toFixed(1):'-';
      var ratingColor=c.avgRating>=8?'#22C55E':c.avgRating>=7?'#84CC16':c.avgRating>=6?'#F59E0B':'rgba(255,255,255,0.7)';
      h += '<div class="fotmob-stat-grid">';
      if(pos==='GK'){
        var csVal=c.cleanSheets!=null?c.cleanSheets:'-';
        var gcVal=c.goalsConceded!=null?c.goalsConceded:'-';
        h+=makeFMStat(csVal,'클린시트',parseInt(csVal)>0?'#22C55E':'');
        h+=makeFMStat(gcVal,'실점',parseInt(gcVal)===0?'#22C55E':'#EF4444');
        h+=makeFMStat(rating,'평점',ratingColor);
        h+=makeFMStat(c.appearances||0,'경기','');
        h+=makeFMStat(minsStr,'출전시간','');
        h+=makeFMStat(c.yellowCards||0,'경고',c.yellowCards>0?'#F59E0B':'');
        h+=makeFMStat(c.redCards||0,'퇴장',c.redCards>0?'#EF4444':'');
        h+=makeFMStat('','','');
      } else {
        h+=makeFMStat(c.goals||0,'득점','#22C55E');
        h+=makeFMStat(c.assists||0,'어시스트','#60A5FA');
        h+=makeFMStat(c.starts!=null?c.starts:'-','선발','');
        h+=makeFMStat(c.appearances||0,'경기','');
        h+=makeFMStat(minsStr,'출전시간','');
        h+=makeFMStat(rating,'평균평점',ratingColor);
        h+=makeFMStat(c.yellowCards||0,'경고',c.yellowCards>0?'#F59E0B':'');
        h+=makeFMStat(c.redCards||0,'퇴장',c.redCards>0?'#EF4444':'');
      }
      h += '</div>';
      h += '</div>';
    });
    h += '</div>'; // stat-section
  }

  // ── 선수 특성 레이더 (Fotmob traits) ──
  if(traits && traits.items && traits.items.length){
    h += '<div class="pm-traits" style="border-top:1px solid rgba(255,255,255,.06)">';
    h += '<div class="pm-section-title">\uc120\uc218 \ud2b9\uc131</div>';
    h += '<div class="pm-section-sub">'+traits.title+'</div>';
    h += '<div class="pm-radar-wrap">';
    h += '<canvas id="radar_traits" width="240" height="220"></canvas>';
    h += '</div>';
    h += '</div>';
  }

  // ── 경력 ──
  if(career && career.length){
    h += '<div style="padding:14px 0 0">';
    h += '<div style="font-size:13px;font-weight:700;color:#fff;padding:0 16px 10px">\uacbd\ub825</div>';
    career.forEach(function(c){
      var period = c.startDate ? c.startDate.slice(0,4) : '';
      if(c.endDate) period += ' - '+c.endDate.slice(0,4);
      else if(c.active) period += ' - \ud604\uc7ac';
      var statStr = '';
      if(c.appearances) statStr += c.appearances+'\uacbd\uae30';
      if(c.goals) statStr += ' '+c.goals+'\uace8';
      h += '<div class="pm-career-row">';
      h += '<div><div class="pm-career-team">'+c.team+'</div><div class="pm-career-period">'+period+'</div></div>';
      h += '<div class="pm-career-stat">'+statStr+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  content.innerHTML = h;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
  history.pushState({modal:'player'},'',' #player');
  requestAnimationFrame(function(){ content.scrollTop = 0; });

  // 레이더 차트
  setTimeout(function(){
    if(traits && traits.items && traits.items.length){
      var translated = traits.items.map(function(item){
        return {key: item.key, title: TRAIT_LABELS[item.key]||item.title, value: item.value};
      });
      drawFotmobRadar('radar_traits', translated);
    }
  }, 60);
}

// ── Fotmob 스타일 6각형 레이더 ──
function drawFotmobRadar(canvasId, items){
  var canvas = document.getElementById(canvasId);
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  var W=canvas.width, H=canvas.height;
  // 라벨 공간 확보를 위해 중심 약간 위로
  var cx=W/2, cy=H/2;
  var r=Math.min(W,H)/2-50;
  var n=items.length;
  ctx.clearRect(0,0,W,H);

  var gridC='rgba(255,255,255,0.1)';

  // 배경 동심 다각형 (4단계)
  [0.25,0.5,0.75,1].forEach(function(s){
    ctx.beginPath();
    for(var i=0;i<n;i++){
      var a=(i/n)*Math.PI*2-Math.PI/2;
      i===0?ctx.moveTo(cx+Math.cos(a)*r*s,cy+Math.sin(a)*r*s):ctx.lineTo(cx+Math.cos(a)*r*s,cy+Math.sin(a)*r*s);
    }
    ctx.closePath();
    ctx.strokeStyle=gridC;ctx.lineWidth=s===1?1.5:1;ctx.stroke();
    if(s===1){ctx.fillStyle='rgba(255,255,255,0.02)';ctx.fill();}
  });

  // 축
  for(var i=0;i<n;i++){
    var a=(i/n)*Math.PI*2-Math.PI/2;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    ctx.strokeStyle=gridC;ctx.lineWidth=1;ctx.stroke();
  }

  // 데이터 영역
  ctx.beginPath();
  for(var i=0;i<n;i++){
    var a=(i/n)*Math.PI*2-Math.PI/2;
    var v=Math.min(1,Math.max(0,(items[i].value||0)/100));
    i===0?ctx.moveTo(cx+Math.cos(a)*r*v,cy+Math.sin(a)*r*v)
         :ctx.lineTo(cx+Math.cos(a)*r*v,cy+Math.sin(a)*r*v);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(189,5,16,0.4)';ctx.fill();
  ctx.strokeStyle='#EF4444';ctx.lineWidth=2;ctx.stroke();

  // 데이터 점
  for(var i=0;i<n;i++){
    var a=(i/n)*Math.PI*2-Math.PI/2;
    var v=Math.min(1,Math.max(0,(items[i].value||0)/100));
    ctx.beginPath();
    ctx.arc(cx+Math.cos(a)*r*v,cy+Math.sin(a)*r*v,4,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
    ctx.strokeStyle='#EF4444';ctx.lineWidth=2;ctx.stroke();
  }

  // 라벨 (% 수치 크게 + 설명 작게) - Fotmob 스타일
  for(var i=0;i<n;i++){
    var a=(i/n)*Math.PI*2-Math.PI/2;
    var labelR = r+28;
    var lx=cx+Math.cos(a)*labelR;
    var ly=cy+Math.sin(a)*labelR;
    var pct=items[i].value||0;
    var col=pct>=75?'#22C55E':pct>=50?'#fff':'rgba(255,255,255,0.6)';

    ctx.textAlign='center';
    ctx.textBaseline='middle';

    // % 수치 (크게)
    ctx.font='bold 13px sans-serif';
    ctx.fillStyle=col;
    ctx.fillText(pct+'%', lx, ly-7);

    // 라벨 (작게)
    ctx.font='10px sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.5)';
    // 긴 라벨 줄바꿈 처리
    var title=items[i].title||'';
    if(title.length>12){
      var words=title.split(' ');
      var mid=Math.ceil(words.length/2);
      var line1=words.slice(0,mid).join(' ');
      var line2=words.slice(mid).join(' ');
      ctx.fillText(line1,lx,ly+6);
      ctx.fillText(line2,lx,ly+17);
    } else {
      ctx.fillText(title,lx,ly+7);
    }
  }
}

function getPctStats(fotStats, pos){
  var keys = pos==='GK'
    ? ['goals_conceded_per_90','saves','clean_sheets']
    : pos==='DF'
    ? ['goals','assists','chances_created','tackles','interceptions']
    : pos==='MF'
    ? ['goals','assists','chances_created','shots','accurate_passes','tackles']
    : ['goals','assists','shots','expected_goals','chances_created','touches_in_opposition_box'];
  var result=[];
  keys.forEach(function(k){
    var s=fotStats[k];
    if(s && s.percentile!=null){
      result.push({label:s.title||k, pct:s.percentile});
    }
  });
  return result.slice(0,6);
}

function switchPMComp(btn){
  var content=document.getElementById('modalContent');
  var comp=btn.getAttribute('data-comp');
  content.querySelectorAll('.pm-comp-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  content.querySelectorAll('.comp-stat-panel').forEach(function(panel){
    panel.style.display=panel.getAttribute('data-comp')===comp?'':'none';
  });
}

function makeFMStat(val, lbl, color){
  var style = color ? ' style="color:'+color+'"' : '';
  return '<div class="fm-stat-cell">'
    +'<div class="fm-stat-val"'+style+'>'+val+'</div>'
    +'<div class="fm-stat-lbl">'+lbl+'</div>'
    +'</div>';
}

function makeStatBox(val,lbl,sub,color){
  var style=color?' style="color:'+color+'"':'';
  return '<div class="stat-box"><div class="stat-box-val"'+style+'>'+val+'</div>'
    +'<div class="stat-box-lbl">'+lbl+'</div>'
    +(sub?'<div class="stat-box-sub">'+sub+'</div>':'')
    +'</div>';
}

function closePlayerModal(fromHash){
  document.getElementById('playerModal').classList.remove('open');
  document.body.style.overflow='';
  if(!fromHash && location.hash.includes('player')) history.replaceState(null,'',location.href.split('#')[0]);
}
function closeModal(e){
  if(e.target===document.getElementById('playerModal'))closePlayerModal();
}
